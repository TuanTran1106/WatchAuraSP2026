<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận đơn hàng</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f4f4f4; padding:20px;">

<div style="max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:8px;">

    <h2 style="color:#333;">Xác nhận đơn hàng</h2>

    <p>Xin chào <b th:text="${hoaDon.tenKhachHang}">Khách</b>,</p>
    <p>Cảm ơn bạn đã đặt hàng tại WatchAura.</p>

    <hr>

    <p><b>Mã đơn:</b> <span th:text="${hoaDon.maDonHang}"></span></p>
    <p><b>Ngày đặt:</b> <span th:text="${orderDate}"></span></p>

    <hr>

    <h3>Sản phẩm</h3>

    <table width="100%" border="1" cellspacing="0" cellpadding="8">
        <thead>
        <tr style="background:#eee;">
            <th>Tên</th>
            <th>Số lượng</th>
            <th>Đơn giá</th>
            <th>Thành tiền</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="item : ${hoaDon.chiTietList}">
            <td th:text="${item.sanPhamChiTiet != null && item.sanPhamChiTiet.sanPham != null
                ? item.sanPhamChiTiet.sanPham.tenSanPham
                : 'Sản phẩm'}"></td>

            <td th:text="${item.soLuong}">1</td>

            <td th:text="${item.donGia != null
                ? #numbers.formatDecimal(item.donGia,0,'COMMA',0,'POINT') + ' ₫'
                : '0 ₫'}"></td>

            <td th:text="${item.donGia != null && item.soLuong != null
                ? #numbers.formatDecimal(item.donGia * item.soLuong,0,'COMMA',0,'POINT') + ' ₫'
                : '0 ₫'}"></td>
        </tr>
        </tbody>
    </table>

    <hr>

    <h3>Tổng tiền</h3>
    <p style="font-size:18px;color:red;">
        <b th:text="${totalFormatted}">0 ₫</b>
    </p>

    <hr>

    <h4>Thông tin giao hàng</h4>
    <p>
        Tên: <span th:text="${hoaDon.tenKhachHang}"></span><br>
        SĐT: <span th:text="${hoaDon.sdtKhachHang}"></span><br>
        Địa chỉ: <span th:text="${hoaDon.diaChi}"></span>
    </p>

    <hr>

    <p style="font-size:12px;color:#777;">
        Đây là email tự động, vui lòng không trả lời.
    </p>

</div>

</body>
</html>
