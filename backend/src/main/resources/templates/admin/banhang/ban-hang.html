<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Bán hàng tại quầy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background:#1a1a2e;
            color:white;
            font-family:Segoe UI;
        }

        .product-card{
            background:#16213e;
            border-radius:10px;
            padding:10px;
            cursor:pointer;
            transition:0.2s;
            height:100%;
        }

        .product-card:hover{
            transform:scale(1.03);
        }

        .product-img{
            height:150px;
            object-fit:contain;
        }

        .product-price{
            color:#ffc107;
            font-weight:bold;
        }

        .cart-section{
            background:#16213e;
            border-radius:10px;
            padding:15px;
            height:90vh;
            display:flex;
            flex-direction:column;
        }

        .cart-items{
            flex:1;
            overflow-y:auto;
        }

        .cart-item{
            background:#1a1a2e;
            padding:10px;
            border-radius:8px;
            margin-bottom:10px;
        }

        .total-amount{
            font-size:22px;
            font-weight:bold;
            color:#ffc107;
        }

        .stock{
            font-size:12px;
        }

        .modal-content img{
            display:block;
            margin:auto;
        }

    </style>

</head>

<body>

<div class="container-fluid mt-3">

    <div class="row">

        <!-- DANH SÁCH SẢN PHẨM -->

        <div class="col-lg-8">

            <h4 class="mb-3">
                <i class="bi bi-watch"></i> Danh sách đồng hồ
            </h4>

            <div class="row g-3">

                <div class="col-md-3"
                     th:each="sp : ${sanPhamList}">

                    <div class="product-card"
                         th:onclick="'addToCart(' + ${sp.id} + ')'">

<span class="badge bg-success stock"
      th:text="'Còn ' + ${sp.soLuongTon}">
</span>

                        <img class="product-img w-100"
                             th:src="${sp.sanPham.hinhAnh}">

                        <div class="mt-2">

                            <p class="small mb-1"
                               th:text="${sp.sanPham.thuongHieu.tenThuongHieu}">
                            </p>

                            <b th:text="${sp.sanPham.tenSanPham}">
                            </b>

                            <br>

                            <span class="product-price"
                                  th:text="${#numbers.formatDecimal(sp.giaBan,0,'COMMA',0,'POINT')} + ' ₫'">
</span>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- GIỎ HÀNG -->

        <div class="col-lg-4">

            <div class="cart-section">

                <input type="hidden" id="hoaDonId" th:value="${hoaDonId}">

                <h5 class="mb-3">
                    <i class="bi bi-cart"></i> Giỏ hàng
                </h5>

                <!-- VOUCHER -->

                <div class="mb-3">

                    <input type="text"
                           id="voucherCode"
                           class="form-control"
                           placeholder="Nhập mã voucher">

                    <button class="btn btn-info w-100 mt-2"
                            onclick="apDungVoucher()">
                        Áp dụng voucher
                    </button>

                </div>

                <!-- CART -->

                <div class="cart-items" id="cartItems">
                </div>

                <hr>

                <div class="d-flex justify-content-between">
                    <span>Tạm tính:</span>
                    <span id="tamTinh">0 ₫</span>
                </div>

                <div class="d-flex justify-content-between">
                    <span>Giảm giá:</span>
                    <span id="giamGia">0 ₫</span>
                </div>

                <div class="d-flex justify-content-between">
                    <span>Tổng thanh toán:</span>
                    <span id="tongThanhToan">0 ₫</span>
                </div>

                <button class="btn btn-warning w-100"
                        onclick="thanhToanTienMat()">

                    Thanh toán tiền mặt

                </button>

                <button class="btn btn-outline-success w-100 mt-2"
                        onclick="moQR()">

                    Thanh toán QR

                </button>

            </div>

        </div>

    </div>

</div>

<!-- MODAL QR -->

<div class="modal fade" id="qrModal">

    <div class="modal-dialog">

        <div class="modal-content p-3 text-center">

            <h5>Quét mã để thanh toán</h5>

            <img id="qrImg" style="width:250px">

            <br>

            <button class="btn btn-success mt-3"
                    onclick="xacNhanQR()">

                Đã thanh toán

            </button>

        </div>

    </div>

</div>

<script>

    function addToCart(productId){

        let hoaDonId=document.getElementById("hoaDonId").value;

        fetch("/ban-hang/them-san-pham",{

            method:"POST",

            headers:{
                'Content-Type':'application/x-www-form-urlencoded'
            },

            body:"hoaDonId="+hoaDonId+"&sanPhamChiTietId="+productId

        })
            .then(()=>loadCart())

    }

    function loadCart(){

        let hoaDonId=document.getElementById("hoaDonId").value

        fetch("/ban-hang/cart/"+hoaDonId)

            .then(res=>res.json())

            .then(data=>{

                let cart=document.getElementById("cartItems")

                cart.innerHTML=""

                let total=0

                data.items.forEach(item=>{

                    let thanhTien=item.donGia*item.soLuong

                    total+=thanhTien

                    cart.innerHTML+=`

<div class="cart-item">

<b>${item.sanPhamChiTiet.sanPham.tenSanPham}</b>

<br>

${item.donGia.toLocaleString()} ₫

<br>

<div class="d-flex align-items-center gap-2 mt-1">

<button class="btn btn-sm btn-danger"
onclick="giamSL(${item.id})">-</button>

<span>${item.soLuong}</span>

<button class="btn btn-sm btn-success"
onclick="tangSL(${item.id})">+</button>

<button class="btn btn-sm btn-outline-danger ms-3"
onclick="xoaSP(${item.id})">

<i class="bi bi-trash"></i>

</button>

</div>

<b class="mt-1 d-block">
${thanhTien.toLocaleString()} ₫
</b>

</div>

`

                })

                document.getElementById("tamTinh").innerText =
                    Number(data.tamTinh).toLocaleString() + " ₫";

                document.getElementById("giamGia").innerText =
                    Number(data.giamGia).toLocaleString() + " ₫";

                document.getElementById("tongThanhToan").innerText =
                    Number(data.tongThanhToan).toLocaleString() + " ₫";
            })

    }

    window.onload=function(){

        loadCart()

    }

    function tangSL(id){

        fetch("/ban-hang/tang-so-luong",{

            method:"POST",

            headers:{
                'Content-Type':'application/x-www-form-urlencoded'
            },

            body:"id="+id

        }).then(()=>loadCart())

    }

    function giamSL(id){

        fetch("/ban-hang/giam-so-luong",{

            method:"POST",

            headers:{
                'Content-Type':'application/x-www-form-urlencoded'
            },

            body:"id="+id

        }).then(()=>loadCart())

    }

    function xoaSP(id){

        fetch("/ban-hang/xoa-san-pham",{

            method:"POST",

            headers:{
                'Content-Type':'application/x-www-form-urlencoded'
            },

            body:"id="+id

        }).then(()=>loadCart())

    }

    function thanhToanTienMat(){

        let hoaDonId=document.getElementById("hoaDonId").value

        fetch("/ban-hang/thanh-toan",{

            method:"POST",

            headers:{
                'Content-Type':'application/x-www-form-urlencoded'
            },

            body:"hoaDonId="+hoaDonId+"&phuongThuc=TIEN_MAT"

        })

            .then(()=>{

                alert("Thanh toán thành công!")

                location.reload()

            })

    }

    function moQR(){

        let total=document.getElementById("tongTien").innerText

        let soTien=total.replace(/\D/g,'')

        let qrURL="https://img.vietqr.io/image/MB-019211908888-compact.png?amount="+soTien+"&addInfo=ThanhToanDonHang"

        document.getElementById("qrImg").src=qrURL

        let modal=new bootstrap.Modal(document.getElementById('qrModal'))

        modal.show()

    }

    function xacNhanQR(){

        let hoaDonId=document.getElementById("hoaDonId").value

        fetch("/ban-hang/thanh-toan",{

            method:"POST",

            headers:{
                'Content-Type':'application/x-www-form-urlencoded'
            },

            body:"hoaDonId="+hoaDonId+"&phuongThuc=QR"

        })

            .then(()=>{

                alert("Thanh toán thành công!")

                location.reload()

            })

    }

    function apDungVoucher(){

        let code=document.getElementById("voucherCode").value

        let hoaDonId=document.getElementById("hoaDonId").value

        fetch("/ban-hang/ap-dung-voucher",{

            method:"POST",

            headers:{
                'Content-Type':'application/x-www-form-urlencoded'
            },

            body:"maVoucher="+code+"&hoaDonId="+hoaDonId

        })

            .then(res=>res.text())

            .then(data=>{

                alert(data)

                loadCart()

            })

    }

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
