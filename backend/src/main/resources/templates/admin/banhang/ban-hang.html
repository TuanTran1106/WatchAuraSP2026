<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bán hàng tại quầy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --border: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -2px rgba(0, 0, 0, 0.15);
        }

        body {
            background: var(--bg-page);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar-banhang {
            background: var(--bg-card) !important;
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
        }
        .navbar-banhang .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text) !important;
        }
        .navbar-banhang .navbar-brand i { color: var(--accent); }
        .navbar-banhang .nav-link {
            color: var(--text-muted) !important;
            font-weight: 500;
            border-radius: var(--radius-sm);
            padding: 0.5rem 0.75rem !important;
        }
        .navbar-banhang .nav-link:hover {
            color: var(--text) !important;
            background: var(--bg-card-hover);
        }
        .navbar-banhang .nav-link.active {
            color: var(--accent) !important;
            background: rgba(59, 130, 246, 0.12);
        }
        .navbar-banhang .btn-outline-light {
            border-color: var(--border);
            color: var(--text-muted);
        }
        .navbar-banhang .btn-outline-light:hover {
            background: var(--bg-card-hover);
            border-color: var(--border);
            color: var(--text);
        }
        .navbar-banhang .navbar-user-name {
            font-weight: 600;
            color: var(--text) !important;
        }

        /* Main */
        .pos-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.25rem 1.5rem 2rem;
        }

        .section-title {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .section-title i { color: var(--accent); }

        /* Product grid */
        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
            overflow: hidden;
        }
        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            border-color: var(--accent);
        }
        .product-img-wrap {
            background: #334155;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .product-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .product-img-wrap .bi-image {
            font-size: 3rem;
            color: var(--text-muted);
        }
        .product-card .card-body {
            padding: 1rem;
        }
        .product-card .badge {
            font-size: 0.7rem;
            font-weight: 600;
            background: var(--success) !important;
            color: #0f172a;
        }
        .product-card .badge-discount {
            background: #ef4444 !important;
            color: #fff !important;
            margin-left: 0.35rem;
        }
        .product-card .brand {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }
        .product-card .name {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9375rem;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
        }
        .product-variants {
            font-size: 0.8125rem;
            color: var(--text-muted);
            line-height: 1.4;
            margin-top: 0.4rem;
        }
        .product-variants .variant-row {
            display: flex;
            gap: 0.35rem;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .product-variants .variant-row + .variant-row {
            margin-top: 0.15rem;
        }
        .product-variants .v-label {
            font-weight: 600;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .product-variants .v-label::after {
            content: ":";
            margin-left: 1px;
        }
        .product-card .price {
            font-weight: 700;
            color: var(--success);
            font-size: 1rem;
            margin-top: 0.5rem;
        }
        .product-card .price-old {
            display: block;
            font-size: 0.8125rem;
            color: var(--text-muted);
            text-decoration: line-through;
            margin-top: 0.35rem;
        }

        /* Cart sidebar */
        .cart-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            height: calc(100vh - 120px);
            min-height: 420px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }
        .cart-section .form-control {
            background: var(--bg-page);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
        }
        .cart-section .form-control::placeholder { color: var(--text-muted); }
        .cart-section .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            color: var(--text);
        }
        .btn-voucher {
            background: var(--accent);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: var(--radius-sm);
        }
        .btn-voucher:hover {
            background: var(--accent-hover);
            color: white;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            min-height: 120px;
        }
        .cart-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            text-align: center;
        }
        .cart-empty i {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.7;
        }
        .cart-item {
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            margin-bottom: 0.75rem;
        }
        .cart-item .item-name {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9375rem;
            line-height: 1.35;
            word-break: break-word;
        }
        .cart-item .item-variant {
            font-size: 0.8125rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
            line-height: 1.35;
            word-break: break-word;
        }
        .cart-item .item-price {
            color: var(--text-muted);
            font-size: 0.8125rem;
        }
        .cart-item .item-total {
            font-weight: 700;
            color: var(--success);
            font-size: 0.9375rem;
        }
        .cart-item .btn-group-cart .btn {
            width: 28px;
            height: 28px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
        }
        .cart-summary {
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            margin-top: 0.5rem;
        }
        .cart-summary .row-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9375rem;
        }
        .cart-summary .row-line.total {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--success);
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }
        .btn-create-invoice {
            background: var(--accent);
            border: none;
            color: white;
            font-weight: 700;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
        }
        .btn-create-invoice:hover {
            background: var(--accent-hover);
            color: white;
        }
        .btn-qr {
            background: transparent;
            border: 2px solid var(--success);
            color: var(--success);
            font-weight: 600;
            padding: 0.65rem 1rem;
            border-radius: var(--radius-sm);
        }
        .btn-qr:hover {
            background: var(--success);
            color: #0f172a;
        }

        /* Modal QR */
        .modal-pos .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
        }
        .modal-pos .modal-header {
            border-bottom: 1px solid var(--border);
        }
        .modal-pos .btn-close { filter: invert(1); opacity: 0.8; }
        .modal-pos .modal-body { padding: 1.5rem; }

        /* Toast thông báo */
        #toastContainer {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast-pos {
            pointer-events: auto;
            min-width: 320px;
            max-width: 420px;
            padding: 1rem 1.25rem;
            border-radius: var(--radius);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: toastIn 0.35s ease;
            border: 1px solid;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .toast-pos .toast-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .toast-pos .toast-body {
            flex: 1;
        }
        .toast-pos .toast-title {
            font-weight: 700;
            font-size: 0.9375rem;
            margin-bottom: 2px;
        }
        .toast-pos .toast-msg {
            font-size: 0.875rem;
            opacity: 0.95;
        }
        .toast-pos.toast-warning {
            background: #1e293b;
            border-color: #f59e0b;
            color: #fef3c7;
        }
        .toast-pos.toast-warning .toast-icon { color: #f59e0b; }
        .toast-pos.toast-success {
            background: #1e293b;
            border-color: #10b981;
            color: #d1fae5;
        }
        .toast-pos.toast-success .toast-icon { color: #10b981; }
        .toast-pos.toast-error {
            background: #1e293b;
            border-color: #ef4444;
            color: #fecaca;
        }
        .toast-pos.toast-error .toast-icon { color: #ef4444; }
        .toast-pos.toast-info {
            background: #1e293b;
            border-color: #3b82f6;
            color: #dbeafe;
        }
        .toast-pos.toast-info .toast-icon { color: #3b82f6; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tabs đơn hàng */
        .tabs-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem 1rem 0;
            margin-bottom: 1rem;
        }
        .tabs-list {
            display: flex;
            gap: 0.35rem;
            overflow-x: auto;
            padding-bottom: 0.75rem;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .tabs-list::-webkit-scrollbar {
            height: 4px;
        }
        .tabs-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        .tab-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.85rem;
            border-radius: var(--radius-sm);
            background: var(--bg-page);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .tab-item:hover {
            border-color: var(--accent);
            color: var(--text);
        }
        .tab-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }
        .tab-item .tab-badge {
            background: var(--success);
            color: #0f172a;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }
        .tab-item.active .tab-badge {
            background: var(--accent);
            color: white;
        }
        .tab-item .tab-close {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.15s;
            padding: 0;
        }
        .tab-item .tab-close:hover {
            background: #ef4444;
            color: white;
        }
        .tab-add {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            background: var(--accent);
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .tab-add:hover {
            background: var(--accent-hover);
        }
        .tab-info {
            font-size: 0.75rem;
            color: var(--text-muted);
            padding-left: 0.25rem;
        }
    </style>
</head>
<body>

<div id="toastContainer" aria-live="polite"></div>

<nav class="navbar navbar-expand-lg navbar-dark navbar-banhang mb-0">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <i class="bi bi-shop"></i> WatchAura
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: var(--border);">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/ban-hang">
                        <i class="bi bi-cart-plus"></i> Bán hàng
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/ban-hang/don-hang">
                        <i class="bi bi-list-check"></i> Quản lý đơn hàng
                    </a>
                </li>
            </ul>
            <span class="navbar-text me-2 d-flex align-items-center gap-2">
                <i class="bi bi-person-circle" style="color: var(--accent);"></i>
                <span class="navbar-user-name" th:text="${tenNhanVien}">Nhân viên</span>
            </span>
            <a href="/dang-xuat" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> Đăng xuất
            </a>
        </div>
    </div>
</nav>

<div class="pos-container">
    <!-- Tabs đơn hàng -->
    <div class="tabs-container">
        <div class="tabs-list" id="tabsList">
            <!-- Các tab sẽ được load bằng JS -->
        </div>
    </div>

    <div class="row g-4">
        <!-- Danh sách sản phẩm -->
        <div class="col-lg-8">
            <h2 class="section-title">
                <i class="bi bi-watch"></i> Danh sách đồng hồ
            </h2>
            <div class="row g-3">
                <div class="col-6 col-md-4 col-xl-3" th:each="sp : ${sanPhamList}">
                    <div class="product-card" th:onclick="'addToCart(' + ${sp.id} + ')'">
                        <div class="product-img-wrap">
                            <th:block th:if="${sp.sanPham != null && sp.sanPham.hinhAnh != null}">
                                <img class="product-img" th:src="${#strings.startsWith(sp.sanPham.hinhAnh, '/') ? sp.sanPham.hinhAnh : '/uploads/' + sp.sanPham.hinhAnh}" th:alt="${sp.sanPham.tenSanPham}">
                            </th:block>
                            <th:block th:unless="${sp.sanPham != null && sp.sanPham.hinhAnh != null}">
                                <i class="bi bi-image"></i>
                            </th:block>
                        </div>
                        <div class="card-body">
                            <span class="badge bg-success"
                                  th:text="'Còn ' + ${sp.soLuongKhaDung}"></span>
                            <span class="badge badge-discount"
                                  th:if="${kmGiaMap[sp.id] != null and kmGiaMap[sp.id].coKhuyenMai and kmGiaMap[sp.id].loaiGiamApDung != null and kmGiaMap[sp.id].loaiGiamApDung.name() == 'PHAN_TRAM' and kmGiaMap[sp.id].phanTramHienThi > 0}"
                                  th:text="${'-' + #numbers.formatDecimal(kmGiaMap[sp.id].phanTramHienThi, 1, 'COMMA', 0, 'POINT') + '%'}">-20%</span>
                            <span class="badge badge-discount"
                                  th:if="${kmGiaMap[sp.id] != null and kmGiaMap[sp.id].coKhuyenMai and kmGiaMap[sp.id].loaiGiamApDung != null and kmGiaMap[sp.id].loaiGiamApDung.name() == 'TIEN' and kmGiaMap[sp.id].soTienGiam > 0}"
                                  th:text="${'-' + #numbers.formatDecimal(kmGiaMap[sp.id].soTienGiam, 0, 'COMMA', 0, 'POINT') + ' ₫'}">-50.000 ₫</span>
                            <p class="brand mb-0"
                               th:text="${sp.sanPham != null && sp.sanPham.thuongHieu != null ? sp.sanPham.thuongHieu.tenThuongHieu : 'N/A'}"></p>
                            <p class="name mb-0"
                               th:attr="title=${sp.sanPham != null && sp.sanPham.tenSanPham != null ? sp.sanPham.tenSanPham : 'N/A'}"
                               th:text="${sp.sanPham != null ? sp.sanPham.tenSanPham : 'N/A'}"></p>
                            <div class="product-variants"
                                 th:if="${sp.mauSac != null or sp.kichThuoc != null or sp.chatLieuDay != null or (sp.sanPham != null and sp.sanPham.loaiMay != null)}">
                                <div th:if="${sp.mauSac != null}" class="variant-row">
                                    <span class="v-label">Màu</span>
                                    <span th:text="${sp.mauSac.tenMauSac}">—</span>
                                </div>
                                <div th:if="${sp.kichThuoc != null}" class="variant-row">
                                    <span class="v-label">Kích cỡ</span>
                                    <span th:text="${sp.kichThuoc.tenKichThuoc}">—</span>
                                </div>
                                <div th:if="${sp.chatLieuDay != null}" class="variant-row">
                                    <span class="v-label">Dây</span>
                                    <span th:text="${sp.chatLieuDay.tenChatLieu}">—</span>
                                </div>
                                <div th:if="${sp.sanPham != null and sp.sanPham.loaiMay != null}" class="variant-row">
                                    <span class="v-label">Loại máy</span>
                                    <span th:text="${sp.sanPham.loaiMay.tenLoaiMay}">—</span>
                                </div>
                            </div>
                            <p class="price-old mb-0"
                               th:if="${kmGiaMap[sp.id] != null and kmGiaMap[sp.id].coKhuyenMai}"
                               th:text="${#numbers.formatDecimal(sp.giaBan,0,'COMMA',0,'POINT') + ' ₫'}"></p>
                            <p class="price mb-0"
                               th:text="${#numbers.formatDecimal((kmGiaMap[sp.id] != null ? kmGiaMap[sp.id].giaSauGiam : sp.giaBan),0,'COMMA',0,'POINT') + ' ₫'}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Giỏ hàng -->
        <div class="col-lg-4">
            <div class="cart-section">
                <input type="hidden" id="hoaDonId" th:value="${hoaDonId}">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <h5 class="mb-0">
                        <i class="bi bi-cart3"></i> Giỏ hàng
                    </h5>
                    <span class="tab-info" id="tabInfo"></span>
                </div>

                <div class="mb-3">
                    <input type="text" id="voucherCode" class="form-control" placeholder="Nhập mã voucher">
                    <button class="btn btn-voucher w-100 mt-2" type="button" onclick="apDungVoucher()">
                        <i class="bi bi-tag"></i> Áp dụng voucher
                    </button>
                </div>

                <div class="cart-items" id="cartItems">
                    <div class="cart-empty">
                        <i class="bi bi-cart-x"></i>
                        <span>Chưa có sản phẩm nào</span>
                    </div>
                </div>

                <div class="cart-summary">
                    <div class="row-line">
                        <span>Tạm tính</span>
                        <span id="tamTinh">0 ₫</span>
                    </div>
                    <div class="row-line">
                        <span>Giảm giá</span>
                        <span id="giamGia">0 ₫</span>
                    </div>
                    <div class="row-line total">
                        <span>Tổng thanh toán</span>
                        <span id="tongThanhToan">0 ₫</span>
                    </div>

                    <button class="btn btn-create-invoice w-100 mt-3" type="button" onclick="thanhToanTienMat()">
                        <i class="bi bi-receipt"></i> Thêm vào hóa đơn
                    </button>
                    <button class="btn btn-qr w-100 mt-2" type="button" onclick="moQR()">
                        <i class="bi bi-qr-code-scan"></i> Thanh toán QR
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal QR -->
<div class="modal fade modal-pos" id="qrModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-qr-code"></i> Quét mã để thanh toán</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
            </div>
            <div class="modal-body text-center">
                <img id="qrImg" alt="QR thanh toán" style="max-width: 260px; border-radius: 8px;">
                <div class="mt-3">
                    <button class="btn btn-success px-4" type="button" onclick="xacNhanQR()">
                        <i class="bi bi-check-circle"></i> Đã thanh toán
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    var currentTabId = null;
    var pendingTabId = 0; // ID tạm thời cho tab mới chưa có hóa đơn

    function formatMoney(num) {
        return (num || 0).toLocaleString('vi-VN') + ' ₫';
    }

    function formatTenDon(maDon) {
        if (!maDon) return 'Đơn mới';
        return maDon.length > 12 ? '...' + maDon.slice(-10) : maDon;
    }

    function renderTabs(tabs) {
        var list = document.getElementById('tabsList');
        if (!list) return;
        list.innerHTML = '';

        tabs.forEach(function(tab) {
            var isActive = tab.id === currentTabId;
            var el = document.createElement('div');
            el.className = 'tab-item' + (isActive ? ' active' : '');
            el.setAttribute('data-id', tab.id);
            el.setAttribute('title', tab.maDonHang + ' — ' + tab.tenTrangThai);
            el.innerHTML =
                '<span>' + formatTenDon(tab.maDonHang) + '</span>' +
                '<span class="tab-badge">' + tab.soSanPham + '</span>' +
                '<button class="tab-close" onclick="event.stopPropagation(); closeTab(' + tab.id + ')">×</button>';
            el.onclick = function() { switchTab(tab.id); };
            list.appendChild(el);
        });

        var addBtn = document.createElement('button');
        addBtn.className = 'tab-add';
        addBtn.setAttribute('title', 'Tạo đơn mới');
        addBtn.innerHTML = '+';
        addBtn.onclick = function() { taoDonMoi(); };
        list.appendChild(addBtn);
    }

    function switchTab(hoaDonId) {
        if (currentTabId === hoaDonId) return;
        currentTabId = hoaDonId;
        // Với tab đã có hóa đơn (id > 0), lưu id thực vào input
        // Với tab mới chưa có hóa đơn (id < 0), đặt input về 0
        document.getElementById('hoaDonId').value = (hoaDonId > 0) ? hoaDonId : 0;
        
        // Nếu là tab mới (chưa có hóa đơn), hiển thị giỏ trống
        if (hoaDonId < 0) {
            var cart = document.getElementById('cartItems');
            cart.innerHTML = '<div class="cart-empty"><i class="bi bi-cart-x"></i><span>Chưa có sản phẩm nào</span></div>';
            document.getElementById('tamTinh').innerText = '0 ₫';
            document.getElementById('giamGia').innerText = '0 ₫';
            document.getElementById('tongThanhToan').innerText = '0 ₫';
            document.getElementById('tabInfo').innerHTML = 'Đang soạn · 0 ₫';
        } else {
            loadCart();
            // Cập nhật thông tin tab
            var activeTab = (window._tabsData || []).find(function(t) { return t.id === hoaDonId; });
            if (activeTab) {
                document.getElementById('tabInfo').innerHTML = activeTab.tenTrangThai + ' · ' + formatMoney(activeTab.tongTien);
            }
        }
    }

    function taoDonMoi() {
        // Tạo tab mới ở frontend trước, không gọi API tạo hóa đơn
        // Hóa đơn sẽ được tạo khi thêm sản phẩm đầu tiên
        var newId = --pendingTabId; // Dùng ID âm tạm thời cho tab mới
        var newTab = {
            id: newId,
            maDonHang: 'Đơn mới',
            trangThai: 'NEW',
            tenTrangThai: 'Đang soạn',
            tongTien: 0,
            soSanPham: 0,
            ngayDat: new Date().toISOString()
        };
        
        if (!window._tabsData) window._tabsData = [];
        window._tabsData.unshift(newTab);
        currentTabId = newId;
        document.getElementById('hoaDonId').value = 0;
        renderTabs(window._tabsData);
        
        // Hiển thị giỏ hàng trống
        var cart = document.getElementById('cartItems');
        cart.innerHTML = '<div class="cart-empty"><i class="bi bi-cart-x"></i><span>Chưa có sản phẩm nào</span></div>';
        document.getElementById('tamTinh').innerText = '0 ₫';
        document.getElementById('giamGia').innerText = '0 ₫';
        document.getElementById('tongThanhToan').innerText = '0 ₫';
        document.getElementById('tabInfo').innerHTML = 'Đang soạn · 0 ₫';
    }

    function closeTab(hoaDonId, event) {
        if (event) event.preventDefault();
        var tabs = window._tabsData || [];
        var idx = tabs.findIndex(function(t) { return t.id === hoaDonId; });
        tabs.splice(idx, 1);
        if (currentTabId === hoaDonId) {
            var next = tabs[idx] || tabs[idx - 1];
            currentTabId = next ? next.id : null;
            // Với tab đã có hóa đơn thực (id > 0), lưu vào input
            // Với tab mới chưa có hóa đơn (id <= 0), đặt về 0
            document.getElementById('hoaDonId').value = (currentTabId && currentTabId > 0) ? currentTabId : 0;
        }
        renderTabs(tabs);
        if (currentTabId && currentTabId > 0) {
            loadCart();
        } else {
            currentTabId = null;
            var cart = document.getElementById('cartItems');
            if (cart) cart.innerHTML = '<div class="cart-empty"><i class="bi bi-cart-x"></i><span>Chưa có sản phẩm nào</span></div>';
            document.getElementById('tamTinh').innerText = '0 ₫';
            document.getElementById('giamGia').innerText = '0 ₫';
            document.getElementById('tongThanhToan').innerText = '0 ₫';
            document.getElementById('tabInfo').innerHTML = '';
        }
    }

    function loadDonDangMo() {
        fetch('/ban-hang/api/don-dang-mo')
            .then(function(res) { return res.json(); })
            .then(function(tabs) {
                // Giữ lại các tab mới tạo ở frontend (id < 0)
                var localTabs = (window._tabsData || []).filter(function(t) { return t.id < 0; });
                // Ghép tab mới phía trước danh sách từ server
                window._tabsData = localTabs.concat(tabs);
                renderTabs(window._tabsData);
                
                var activeTab = window._tabsData.find(function(t) { return t.id === currentTabId; });
                var infoEl = document.getElementById('tabInfo');
                if (infoEl) {
                    if (activeTab) {
                        infoEl.innerHTML = activeTab.tenTrangThai + ' · ' + formatMoney(activeTab.tongTien);
                    } else {
                        infoEl.innerHTML = '';
                    }
                }
            });
    }

    function posFormatVariant(spct) {
        if (!spct) return "";
        var parts = [];
        if (spct.mauSac && spct.mauSac.tenMauSac) parts.push("Màu: " + spct.mauSac.tenMauSac);
        if (spct.kichThuoc && spct.kichThuoc.tenKichThuoc) parts.push("Kích cỡ: " + spct.kichThuoc.tenKichThuoc);
        if (spct.chatLieuDay && spct.chatLieuDay.tenChatLieu) parts.push("Dây: " + spct.chatLieuDay.tenChatLieu);
        if (spct.sanPham && spct.sanPham.loaiMay && spct.sanPham.loaiMay.tenLoaiMay) parts.push("Loại máy: " + spct.sanPham.loaiMay.tenLoaiMay);
        return parts.join(" · ");
    }

    function showToast(message, type) {
        type = type || "info";
        var titles = { warning: "Thông báo", success: "Thành công", error: "Lỗi", info: "Thông báo" };
        var icons = { warning: "bi-exclamation-triangle", success: "bi-check-circle", error: "bi-x-circle", info: "bi-info-circle" };
        var container = document.getElementById("toastContainer");
        var el = document.createElement("div");
        el.className = "toast-pos toast-" + type;
        el.setAttribute("role", "alert");
        el.innerHTML = '<span class="toast-icon bi ' + icons[type] + '"></span>' +
            '<div class="toast-body"><div class="toast-title">' + titles[type] + '</div><div class="toast-msg">' + message + '</div></div>';
        container.appendChild(el);
        setTimeout(function() {
            el.style.opacity = "0";
            el.style.transform = "translateY(-8px)";
            setTimeout(function() { el.remove(); }, 300);
        }, 3500);
    }

    function addToCart(productId) {
        var hoaDonId = document.getElementById("hoaDonId").value;
        fetch("/ban-hang/them-san-pham", {
            method: "POST",
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: "hoaDonId=" + hoaDonId + "&sanPhamChiTietId=" + productId
        })
            .then(function(res) { return res.text(); })
            .then(function(data) {
                if (data.startsWith("NEW:")) {
                    var realId = parseInt(data.substring(4));
                    document.getElementById("hoaDonId").value = realId;
                    currentTabId = realId;
                    
                    // Cập nhật tab mới với ID thực từ server
                    var tabs = window._tabsData || [];
                    var newTabIdx = tabs.findIndex(function(t) { return t.id < 0; });
                    if (newTabIdx !== -1) {
                        tabs[newTabIdx].id = realId;
                        tabs[newTabIdx].maDonHang = 'HD' + realId;
                        tabs[newTabIdx].trangThai = 'DRAFT_OFFLINE';
                        tabs[newTabIdx].tenTrangThai = 'Đang soạn';
                    }
                    renderTabs(tabs);
                } else if (data !== "OK") {
                    showToast(data, "error");
                    return;
                }
                loadCart();
                loadDonDangMo();
            })
            .catch(function() { showToast("Có lỗi xảy ra", "error"); });
    }

    function loadCart() {
        var hoaDonId = document.getElementById("hoaDonId").value;
        fetch("/ban-hang/cart/" + hoaDonId)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var cart = document.getElementById("cartItems");
                cart.innerHTML = "";

                if (!data.items || data.items.length === 0) {
                    cart.innerHTML = '<div class="cart-empty"><i class="bi bi-cart-x"></i><span>Chưa có sản phẩm nào</span></div>';
                    document.getElementById("tamTinh").innerText = "0 ₫";
                    document.getElementById("giamGia").innerText = "0 ₫";
                    document.getElementById("tongThanhToan").innerText = "0 ₫";
                    return;
                }

                data.items.forEach(function(item) {
                    var tenSanPham = (item.sanPhamChiTiet && item.sanPhamChiTiet.sanPham)
                        ? item.sanPhamChiTiet.sanPham.tenSanPham : "Sản phẩm";
                    var bienThe = posFormatVariant(item.sanPhamChiTiet);
                    var giaGoc = (item.sanPhamChiTiet && item.sanPhamChiTiet.giaBan) ? Number(item.sanPhamChiTiet.giaBan) : Number(item.donGia || 0);
                    var donGia = Number(item.donGia || 0);
                    var coKhuyenMai = giaGoc > donGia;
                    var thanhTien = item.donGia * item.soLuong;

                    var div = document.createElement("div");
                    div.className = "cart-item";
                    div.innerHTML =
                        '<div class="item-name">' + tenSanPham + '</div>' +
                        (bienThe ? '<div class="item-variant">' + bienThe + '</div>' : '') +
                        (coKhuyenMai
                            ? '<div class="item-price"><span style="text-decoration:line-through;opacity:.8;">' + giaGoc.toLocaleString() + ' ₫</span> <span style="color:#10b981;font-weight:700;margin-left:6px;">' + donGia.toLocaleString() + ' ₫</span></div>'
                            : '<div class="item-price">' + donGia.toLocaleString() + ' ₫</div>') +
                        '<div class="d-flex align-items-center justify-content-between mt-2">' +
                        '<div class="d-flex align-items-center gap-1 btn-group-cart">' +
                        '<button class="btn btn-sm btn-outline-secondary" onclick="giamSL(' + item.id + ')">−</button>' +
                        '<span class="px-2" style="min-width:24px;text-align:center">' + item.soLuong + '</span>' +
                        '<button class="btn btn-sm btn-outline-secondary" onclick="tangSL(' + item.id + ')">+</button>' +
                        '<button class="btn btn-sm btn-outline-danger ms-2" onclick="xoaSP(' + item.id + ')" title="Xóa"><i class="bi bi-trash"></i></button>' +
                        '</div>' +
                        '<span class="item-total">' + thanhTien.toLocaleString() + ' ₫</span>' +
                        '</div>';
                    cart.appendChild(div);
                });

                document.getElementById("tamTinh").innerText = Number(data.tamTinh).toLocaleString() + " ₫";
                document.getElementById("giamGia").innerText = Number(data.giamGia).toLocaleString() + " ₫";
                document.getElementById("tongThanhToan").innerText = Number(data.tongThanhToan).toLocaleString() + " ₫";
            });
    }

    window.onload = function() {
        // Dọn dẹp hóa đơn trống trước
        fetch('/ban-hang/api/cleanup-empty', { method: 'POST' })
            .then(function(res) { return res.text(); })
            .catch(function() {});
        
        var hoaDonIdVal = document.getElementById("hoaDonId").value;
        if (hoaDonIdVal && hoaDonIdVal !== "0" && hoaDonIdVal !== "null") {
            currentTabId = parseInt(hoaDonIdVal);
        }
        loadDonDangMo();
        
        // Nếu không có tab nào active (không có hoaDonId), hiển thị giỏ trống
        if (!currentTabId) {
            var cart = document.getElementById('cartItems');
            cart.innerHTML = '<div class="cart-empty"><i class="bi bi-cart-x"></i><span>Chưa có sản phẩm nào</span></div>';
            document.getElementById('tamTinh').innerText = '0 ₫';
            document.getElementById('giamGia').innerText = '0 ₫';
            document.getElementById('tongThanhToan').innerText = '0 ₫';
        } else {
            loadCart();
        }
    };

    function tangSL(id) {
        fetch("/ban-hang/tang-so-luong", { method: "POST", headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: "id=" + id })
            .then(function(res) { return res.text(); })
            .then(function(data) {
                if (data === "HOA_DON_DA_CHOT") {
                    showToast("Hóa đơn đã thanh toán. Không thể thay đổi.", "warning");
                    return;
                }
                loadCart();
                loadDonDangMo();
            });
    }

    function giamSL(id) {
        fetch("/ban-hang/giam-so-luong", { method: "POST", headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: "id=" + id })
            .then(function(res) { return res.text(); })
            .then(function(data) {
                if (data === "HOA_DON_DA_CHOT") {
                    showToast("Hóa đơn đã thanh toán. Không thể thay đổi.", "warning");
                    return;
                }
                if (data === "CART_EMPTY") {
                    // Xóa hóa đơn thành công - cập nhật UI và không gọi loadCart
                    currentTabId = null;
                    document.getElementById("hoaDonId").value = "0";
                    // Xóa tab khỏi danh sách local
                    var tabs = window._tabsData || [];
                    var idx = tabs.findIndex(function(t) { return t.id === id; }); // Tìm tab đang active
                    // Cần tìm hóa đơn chứa chi tiết này - nhưng ở đây id là chi tiết, không phải hóa đơn
                    // Đơn giản: chuyển sang tab tiếp theo hoặc reset
                    loadDonDangMo();
                    var cart = document.getElementById('cartItems');
                    cart.innerHTML = '<div class="cart-empty"><i class="bi bi-cart-x"></i><span>Chưa có sản phẩm nào</span></div>';
                    document.getElementById('tamTinh').innerText = '0 ₫';
                    document.getElementById('giamGia').innerText = '0 ₫';
                    document.getElementById('tongThanhToan').innerText = '0 ₫';
                    document.getElementById('tabInfo').innerHTML = '';
                    return;
                }
                loadCart();
                loadDonDangMo();
            });
    }

    function xoaSP(id) {
        fetch("/ban-hang/xoa-san-pham", { method: "POST", headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: "id=" + id })
            .then(function(res) { return res.text(); })
            .then(function(data) {
                if (data === "HOA_DON_DA_CHOT") {
                    showToast("Hóa đơn đã thanh toán. Không thể xóa.", "warning");
                    return;
                }
                if (data === "CART_EMPTY") {
                    // Xóa hóa đơn thành công - cập nhật UI
                    currentTabId = null;
                    document.getElementById("hoaDonId").value = "0";
                    loadDonDangMo();
                    var cart = document.getElementById('cartItems');
                    cart.innerHTML = '<div class="cart-empty"><i class="bi bi-cart-x"></i><span>Chưa có sản phẩm nào</span></div>';
                    document.getElementById('tamTinh').innerText = '0 ₫';
                    document.getElementById('giamGia').innerText = '0 ₫';
                    document.getElementById('tongThanhToan').innerText = '0 ₫';
                    document.getElementById('tabInfo').innerHTML = '';
                    return;
                }
                loadCart();
                loadDonDangMo();
            });
    }

    function thanhToanTienMat() {
        var total = document.getElementById("tongThanhToan").innerText;
        var tongTien = parseFloat(total.replace(/[^\d]/g, ""));
        if (!tongTien || tongTien <= 0) {
            showToast("Giỏ hàng trống! Vui lòng thêm sản phẩm trước khi tạo hóa đơn.", "warning");
            return;
        }
        var hoaDonId = document.getElementById("hoaDonId").value;
        fetch("/ban-hang/chot-hoa-don", { method: "POST", headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: "hoaDonId=" + hoaDonId })
            .then(function(res) { return res.text(); })
            .then(function(data) {
                if (data !== "OK") {
                    if (data.indexOf("KHONG_DU_TON_KHO:") === 0) {
                        showToast("Tồn kho không đủ! " + data.replace("KHONG_DU_TON_KHO:", ""), "warning");
                    } else {
                        showToast(data, "error");
                    }
                    return;
                }
                showToast("Đã tạo hóa đơn — chờ thanh toán. Tồn kho sẽ trừ khi xác nhận đã thanh toán.", "success");
                loadDonDangMo();
                loadCart();
            })
            .catch(function() { showToast("Có lỗi xảy ra", "error"); });
    }

    function moQR() {
        var hoaDonId = document.getElementById("hoaDonId").value;
        var total = document.getElementById("tongThanhToan").innerText;
        var soTien = total.replace(/\D/g, "");
        document.getElementById("qrImg").src = "https://img.vietqr.io/image/MB-019211908888-compact.png?amount=" + soTien + "&addInfo=ThanhToanDonHang";
        new bootstrap.Modal(document.getElementById("qrModal")).show();
    }

    function xacNhanQR() {
        var total = document.getElementById("tongThanhToan").innerText;
        var tongTien = parseFloat(total.replace(/[^\d]/g, ""));
        if (!tongTien || tongTien <= 0) {
            showToast("Giỏ hàng trống! Vui lòng thêm sản phẩm trước khi thanh toán.", "warning");
            return;
        }
        var hoaDonId = document.getElementById("hoaDonId").value;
        fetch("/ban-hang/thanh-toan", { method: "POST", headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: "hoaDonId=" + hoaDonId + "&phuongThuc=QR" })
            .then(function(res) { return res.text(); })
            .then(function(data) {
                if (data !== "OK") {
                    if (data.indexOf("KHONG_DU_TON_KHO:") === 0) {
                        showToast("Tồn kho không đủ! " + data.replace("KHONG_DU_TON_KHO:", ""), "warning");
                    } else {
                        showToast(data, "error");
                    }
                    return;
                }
                showToast("Thanh toán thành công!", "success");
                loadDonDangMo();
                loadCart();
            })
            .catch(function() { showToast("Có lỗi xảy ra", "error"); });
    }

    function apDungVoucher() {
        var code = document.getElementById("voucherCode").value;
        var hoaDonId = document.getElementById("hoaDonId").value;
        fetch("/ban-hang/ap-dung-voucher", { method: "POST", headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: "maVoucher=" + encodeURIComponent(code) + "&hoaDonId=" + hoaDonId })
            .then(function(res) { return res.text(); })
            .then(function(data) { showToast(data, "info"); loadCart(); loadDonDangMo(); });
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
