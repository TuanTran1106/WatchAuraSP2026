<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Loại Máy - Watch Aura</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div th:fragment="content">
        <style>
            /* REDESIGN ONLY - no logic changed */
            .content *{box-sizing:border-box}.content .container,.container{max-width:1400px;margin:0 auto;padding:20px}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;min-height:100vh;padding:0;color:#1a1a1a;background:#f7f7f5}.content-section{background:#fff;border:1px solid #ebebeb;border-radius:12px;box-shadow:0 10px 28px rgba(20,20,20,.04);overflow:hidden}.section-title{display:flex;align-items:center;gap:10px;padding:16px 24px;margin:0;border-bottom:1px solid #f0f0f0;font-size:18px;font-weight:700;color:#1a1a1a}.section-title i{color:#534ab7}.actions{display:flex;gap:6px}.loading{text-align:center;padding:40px;color:#999}.spinner{border:4px solid #f0f0f0;border-top:4px solid #534ab7;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto 20px}@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
            .modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);animation:fadeIn .25s ease}.modal.show{display:flex;align-items:center;justify-content:center}@keyframes fadeIn{from{opacity:0}to{opacity:1}}
            .modal-content{background:#fff;padding:24px;border-radius:12px;box-shadow:0 20px 50px rgba(0,0,0,.18);max-width:560px;width:min(95%,560px);animation:slideIn .25s ease}@keyframes slideIn{from{transform:translateY(-18px);opacity:0}to{transform:translateY(0);opacity:1}}
            .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #f0f0f0}.modal-header h2{font-size:20px;color:#1a1a1a;margin:0}.modal-close{background:none;border:none;font-size:28px;color:#999;cursor:pointer}
            .form-group{display:flex;flex-direction:column;margin-bottom:16px}.form-group label{font-weight:500;margin-bottom:6px;color:#555;font-size:13px}.form-group input{height:36px;padding:0 11px;border:1px solid #e0e0e0;border-radius:8px;background:#f5f5f5;font-size:13px;font-family:inherit;transition:border-color .16s ease,box-shadow .16s ease,background .16s ease}.form-group input:focus{outline:none;border-color:#7f77dd;box-shadow:0 0 0 3px rgba(127,119,221,.12);background:#fff}.form__error{display:block;margin-top:5px;color:#c2410c;font-size:12px;line-height:1.35}
            .modal-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0}.modal-actions button{flex:1;height:34px;padding:0 20px;border:1px solid transparent;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}.btn-save{background:#534ab7;color:#fff;border-color:#534ab7}.btn-cancel{background:transparent;color:#555;border-color:#ccc}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px 14px;border-bottom:1px solid #f0f0f0}.table th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#999;font-weight:700}.table td{font-size:13px;color:#1a1a1a}.table tr:hover td{background:#fafafa}.btn{height:30px;width:30px;border-radius:8px;border:0;background:transparent;color:#666;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none}.btn:hover{background:#f0f0f0;color:#1a1a1a}
            .toast{display:flex;align-items:flex-start;gap:10px;min-width:300px;max-width:420px;padding:12px 14px;border-radius:10px;border:1px solid;background:#fff;box-shadow:0 8px 20px rgba(15,23,42,.14)}.toast.success{border-color:#86efac;background:#f0fdf4}.toast.error{border-color:#fca5a5;background:#fef2f2}.toast.warning{border-color:#fcd34d;background:#fffbeb}.toast.info{border-color:#93c5fd;background:#eff6ff}.toast-icon{width:20px}.toast-content{flex:1}.toast-title{margin:0 0 2px;font-size:13px;font-weight:700}.toast-message{margin:0;font-size:13px;color:#334155}.toast-close{border:none;background:transparent;cursor:pointer;font-size:18px;color:#64748b}
            @media (max-width:768px){.section-title{font-size:18px;flex-wrap:wrap}.modal-content{max-width:92%}}
        </style>
        <div id="toastContainer"
            style="position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px;">
        </div>
        <div class="container">
            <div class="content-section">
                <div class="section-title">
                    <i class="fas fa-cogs"></i>
                    Danh sách loại máy
                    <button class="btn btn--primary" onclick="openAddModal()" style="margin-left: auto;">
                        <i class="fas fa-plus"></i> Thêm loại máy
                    </button>
                </div>

                <div class="table-wrapper">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Tên loại máy</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="loaiMayTableBody">
                            <tr>
                                <td colspan="3" class="loading">
                                    <div class="spinner"></div>
                                    Đang tải dữ liệu...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="loaiMayModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Thêm mới loại máy</h2>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>

                <form id="loaiMayForm">
                    <input type="hidden" id="loaiMayId">

                    <div class="form-group">
                        <label for="tenLoaiMay">Tên loại máy *</label>
                        <input type="text" id="tenLoaiMay" required>
                        <span class="form__error" id="tenLoaiMayError" aria-live="polite"></span>
                    </div>

                    <div class="modal-actions">
                        <button type="submit" class="btn-save">
                            <i class="fas fa-save"></i> Lưu
                        </button>
                        <button type="button" class="btn-cancel" onclick="closeModal()">
                            <i class="fas fa-times"></i> Hủy
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            const API_URL = 'http://localhost:8080/api';
            let isEditing = false;

            function showToast(message, type = 'info', title = '') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icons = { success: '<i class="fas fa-check-circle"></i>', error: '<i class="fas fa-exclamation-circle"></i>', warning: '<i class="fas fa-exclamation-triangle"></i>', info: '<i class="fas fa-info-circle"></i>' };
                toast.innerHTML = `<div class="toast-icon">${icons[type] || icons.info}</div><div class="toast-content">${title ? `<p class="toast-title">${title}</p>` : ''}<p class="toast-message">${message}</p></div><button class="toast-close" onclick="this.closest('.toast').remove()">&times;</button>`;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            }

            async function showConfirmPopup({ title = 'Xác nhận', message = 'Bạn có chắc chắn muốn thực hiện thao tác này?', confirmText = 'Xác nhận', cancelText = 'Hủy', tone = 'danger' } = {}) {
                if (typeof window.confirmModal === 'function') return await window.confirmModal({ title, message, confirmText, cancelText, tone });
                return window.confirm(message);
            }

            function openAddModal() {
                resetModal();
                document.getElementById('loaiMayModal').classList.add('show');
                document.getElementById('modalTitle').textContent = 'Thêm mới loại máy';
                isEditing = false;
            }

            function closeModal() {
                document.getElementById('loaiMayModal').classList.remove('show');
                resetModal();
            }

            window.onclick = function (event) {
                const modal = document.getElementById('loaiMayModal');
                if (event.target === modal) {
                    closeModal();
                }
            }

            function resetModal() {
                document.getElementById('loaiMayForm').reset();
                document.getElementById('loaiMayId').value = '';
            }

            async function loadLoaimay() {
                try {
                    const response = await fetch(`${API_URL}/loai-may`);

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const items = await response.json();

                    const tbody = document.getElementById('loaiMayTableBody');

                    if (items.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3" class="loading">Không có dữ liệu</td></tr>';
                        return;
                    }

                    let htmlRows = '';
                    items.forEach(item => {
                        htmlRows += `
                        <tr>
                            <td><strong>${item.id}</strong></td>
                            <td>${item.tenLoaiMay || '-'}</td>
                            <td>
                                <div class="actions">
                                    <button class="btn btn--secondary" onclick="editLoaimay(${item.id})">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn btn--danger" onclick="deleteLoaimay(${item.id})">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                    });

                    tbody.innerHTML = htmlRows;
                } catch (error) {
                    console.error('Lỗi:', error);
                    document.getElementById('loaiMayTableBody').innerHTML = '<tr><td colspan="3" class="loading" style="color: #dc3545;"><i class="fas fa-exclamation-circle"></i> Lỗi khi tải dữ liệu: ' + error.message + '</td></tr>';
                }
            }

            function setFieldError(fieldId, message) {
                const el = document.getElementById(fieldId + 'Error');
                if (el) el.textContent = message || '';
            }

            document.getElementById('loaiMayForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                setFieldError('tenLoaiMay', '');
                const id = document.getElementById('loaiMayId').value;
                const data = {
                    tenLoaiMay: document.getElementById('tenLoaiMay').value
                };

                try {
                    const confirmed = await showConfirmPopup({
                        title: isEditing ? 'Xác nhận cập nhật loại máy' : 'Xác nhận thêm loại máy',
                        message: isEditing ? 'Bạn có chắc chắn muốn lưu thay đổi loại máy này?' : 'Bạn có chắc chắn muốn thêm loại máy mới?',
                        confirmText: isEditing ? 'Cập nhật' : 'Thêm mới',
                        cancelText: 'Hủy',
                        tone: 'info'
                    });
                    if (!confirmed) return;

                    let response;

                    if (isEditing && id) {
                        response = await fetch(`${API_URL}/loai-may/${id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });
                    } else {
                        response = await fetch(`${API_URL}/loai-may`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });
                    }

                    if (response.ok) {
                        showToast(isEditing ? 'Cập nhật loại máy thành công!' : 'Thêm loại máy thành công!', 'success');
                        closeModal();
                        loadLoaimay();
                    } else {
                        const errText = await response.text();
                        try {
                            const payload = JSON.parse(errText);
                            if (payload && payload.errors && payload.errors.tenLoaiMay) {
                                setFieldError('tenLoaiMay', payload.errors.tenLoaiMay);
                            }
                            showToast(payload.message || 'Lỗi lưu loại máy', 'error');
                        } catch (_) {
                            showToast('Lỗi: ' + errText, 'error');
                        }
                    }
                } catch (error) {
                    console.error('Lỗi:', error);
                    showToast('Có lỗi xảy ra!', 'error');
                }
            });

            async function editLoaimay(id) {
                try {
                    const response = await fetch(`${API_URL}/loai-may/${id}`);
                    const item = await response.json();

                    document.getElementById('loaiMayId').value = item.id;
                    document.getElementById('tenLoaiMay').value = item.tenLoaiMay;

                    document.getElementById('modalTitle').innerText = 'Cập nhật loại máy';
                    isEditing = true;

                    document.getElementById('loaiMayModal').classList.add('show');
                } catch (error) {
                    console.error('Lỗi:', error);
                    showToast('Không thể tải thông tin', 'error');
                }
            }

            async function deleteLoaimay(id) {
                const confirmed = await showConfirmPopup({
                    title: 'Xác nhận xóa loại máy',
                    message: 'Bạn có chắc chắn muốn xóa loại máy này?',
                    confirmText: 'Xóa',
                    cancelText: 'Hủy',
                    tone: 'danger'
                });
                if (!confirmed) {
                    return;
                }

                try {
                    const response = await fetch(`${API_URL}/loai-may/${id}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        showToast('Xóa loại máy thành công!', 'success');
                        loadLoaimay();
                    } else {
                        showToast('Lỗi: ' + await response.text(), 'error');
                    }
                } catch (error) {
                    console.error('Lỗi:', error);
                    showToast('Có lỗi xảy ra khi xóa!', 'error');
                }
            }

            window.addEventListener('DOMContentLoaded', function () {
                loadLoaimay();
            });
        </script>
    </div>
</body>

</html>
