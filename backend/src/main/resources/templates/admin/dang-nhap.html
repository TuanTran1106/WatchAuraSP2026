<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Đăng nhập Admin - WatchAura</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/auth-login-card.css">
</head>
<body class="wa-login-page">
    <div class="admin-login-wrapper">
        <div class="admin-login-card">
            <div class="admin-login__brand">
                <div class="admin-login__logo">WA</div>
                <div class="admin-login__brand-text">
                    <span class="admin-login__brand-name">WatchAura</span>
                    <span class="admin-login__brand-role">Admin Panel</span>
                </div>
            </div>

            <h1 class="admin-login__title">Đăng nhập Quản trị</h1>
            <p class="admin-login__subtitle">Vui lòng nhập thông tin tài khoản admin</p>

            <div th:if="${errorMessage}" class="admin-login__alert admin-login__alert--error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${errorMessage}">Lỗi đăng nhập</span>
            </div>

            <div th:if="${successMessage}" class="admin-login__alert admin-login__alert--success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${successMessage}">Thành công</span>
            </div>

            <form class="admin-login__form" th:action="@{/admin/dang-nhap}" method="post">
                <div class="admin-login__field">
                    <label class="admin-login__label">
                        <i class="fas fa-envelope"></i>
                        Email <span class="required">*</span>
                    </label>
                    <div class="admin-login__input-wrap">
                        <input type="email" class="admin-login__input" name="email"
                               required placeholder="admin@watchaura.com"
                               autocomplete="email"
                               th:value="${param.email != null ? param.email[0] : ''}">
                    </div>
                </div>

                <div class="admin-login__field">
                    <label class="admin-login__label">
                        <i class="fas fa-lock"></i>
                        Mật khẩu <span class="required">*</span>
                    </label>
                    <div class="admin-login__input-wrap admin-login__password-wrap">
                        <input type="password" class="admin-login__input" id="adminMatKhau"
                               name="matKhau" required placeholder="Nhập mật khẩu"
                               autocomplete="current-password">
                        <button type="button" class="admin-login__toggle-pass"
                                onclick="toggleAdminPassword()" aria-label="Hiện hoặc ẩn mật khẩu">
                            <i class="fas fa-eye" id="adminEyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="admin-login__submit">
                    <i class="fas fa-sign-in-alt"></i>
                    Đăng nhập Admin
                </button>
            </form>

            <div class="admin-login__divider">hoặc</div>

            <a th:href="@{/nhan-vien-login}" class="admin-login__back-link">
                <i class="fas fa-user-tie"></i>
                Đăng nhập tài khoản nhân viên
            </a>

            <div class="admin-login__footer">
                <a th:href="@{/home}">
                    <i class="fas fa-home"></i> Quay về trang chủ
                </a>
            </div>
        </div>
    </div>

    <script>
        function toggleAdminPassword() {
            var passwordInput = document.getElementById('adminMatKhau');
            var eyeIcon = document.getElementById('adminEyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
