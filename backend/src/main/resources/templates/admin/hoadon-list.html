<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <p th:if="${message}" class="message" th:text="${message}"></p>
    <p th:if="${warning}" class="message message--warning" th:text="${warning}"></p>
    <p th:if="${error}" class="message message--error" th:text="${error}"></p>

    <section class="card card--full" id="listHoaDon">
        <h2 class="card__title">Danh sách hóa đơn</h2>

        <form th:action="@{/admin/hoa-don}" method="get" class="toolbar toolbar--search-row js-admin-ajax-form" data-ajax="true">
            <input type="text" name="q" th:value="${searchKeyword}" placeholder="Tìm theo mã hoặc tên..." class="toolbar__input" />
            <button type="submit" class="btn btn--primary toolbar__btn"><i class="fa-solid fa-search"></i> Tìm kiếm</button>
            <a th:href="@{/admin/hoa-don}" class="btn btn--secondary toolbar__btn" title="Xóa bộ lọc"><i class="fa-solid fa-times"></i> Clear</a>
            <label class="toolbar__label">Trạng thái:</label>
            <select name="trangThai" class="toolbar__select" onchange="this.form.submit()">
                <option value="" th:selected="${filterTrangThai == null or filterTrangThai == ''}">Tất cả</option>
                <option value="CAN_XU_LY" th:selected="${filterTrangThai == 'CAN_XU_LY'}" th:text="'Cần xử lý'">Cần xử lý</option>
                <option value="CHO_THANH_TOAN" th:selected="${filterTrangThai == 'CHO_THANH_TOAN'}" th:text="'Chờ thanh toán (tại quầy)'">Chờ thanh toán (tại quầy)</option>
                <option value="CHO_XAC_NHAN" th:selected="${filterTrangThai == 'CHO_XAC_NHAN'}" th:text="'Chờ xác nhận'">Chờ xác nhận</option>
                <option value="DA_XAC_NHAN" th:selected="${filterTrangThai == 'DA_XAC_NHAN'}" th:text="'Đã xác nhận'">Đã xác nhận</option>
                <option value="DANG_GIAO" th:selected="${filterTrangThai == 'DANG_GIAO'}" th:text="'Đang giao'">Đang giao</option>
                <option value="DA_GIAO" th:selected="${filterTrangThai == 'DA_GIAO'}" th:text="'Đã giao'">Đã giao</option>
                <option value="DA_THANH_TOAN" th:selected="${filterTrangThai == 'DA_THANH_TOAN'}" th:text="'Đã thanh toán'">Đã thanh toán</option>
                <option value="DA_HUY" th:selected="${filterTrangThai == 'DA_HUY'}" th:text="'Đã hủy'">Đã hủy</option>
            </select>
        </form>
        <form th:action="@{/admin/hoa-don/bao-cao/pdf}" method="get" class="toolbar toolbar--search-row">
            <label class="toolbar__label">Từ ngày:</label>
            <input type="date" name="fromDate" class="toolbar__input toolbar__input--date" />
            <label class="toolbar__label">Đến ngày:</label>
            <input type="date" name="toDate" class="toolbar__input toolbar__input--date" />
            <input type="hidden" name="status" value="DA_GIAO" />
            <button type="submit" class="btn btn--secondary toolbar__btn">
                <i class="fa-solid fa-file-pdf"></i> Xuất báo cáo doanh thu
            </button>
        </form>

        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Mã đơn</th>
                    <th>Khách hàng</th>
                    <th>Ngày đặt</th>
                    <th>Tổng thanh toán</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${list}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.maDonHang}"></td>
                    <td th:text="${item.tenKhachHang != null ? item.tenKhachHang : '—'}"></td>
                    <td th:text="${item.ngayDat != null ? #temporals.format(item.ngayDat, 'dd/MM/yyyy HH:mm') : '—'}"></td>
                    <td th:text="${item.tongTienThanhToan != null ? #numbers.formatDecimal(item.tongTienThanhToan, 1, 'POINT', 0, 'COMMA') : '—'}"></td>
                    <td>
                        <!-- Bán tại quầy (OFFLINE): chờ thanh toán / đã thanh toán / đã hủy -->
                        <form th:if="${item.loaiHoaDon == 'OFFLINE'}"
                              th:action="@{/admin/hoa-don/{id}/trang-thai(id=${item.id})}"
                              method="post"
                              style="display:inline;"
                              class="status-form js-admin-ajax-form"
                              data-ajax="true"
                              data-confirm="Bạn có chắc chắn muốn đổi trạng thái hóa đơn này?"
                              data-confirm-title="Đổi trạng thái hóa đơn"
                              data-confirm-ok="Đổi trạng thái"
                              data-confirm-cancel="Hủy"
                              data-confirm-tone="info">
                            <input type="hidden" name="page" th:value="${page != null ? page.number : 0}" />
                            <input type="hidden" name="q" th:value="${searchKeyword != null ? searchKeyword : ''}" />
                            <input type="hidden" name="trangThaiFilter" th:value="${filterTrangThai != null ? filterTrangThai : ''}" />
                            <select name="trangThai" class="form__select form__select--sm table-status-select" onchange="(this.form.requestSubmit ? this.form.requestSubmit() : this.form.submit())" title="Đổi trạng thái hóa đơn tại quầy"
                                    th:with="raw=${item.trangThaiDonHang},
                                             cur=${raw != null and !#strings.isEmpty(raw) ? raw : 'CHO_THANH_TOAN'},
                                             isCho=${cur == 'CHO_THANH_TOAN' or cur == 'DRAFT_OFFLINE' or cur == 'CHO_XAC_NHAN'},
                                             isPaid=${cur == 'DA_THANH_TOAN' or cur == 'DA THANH TOAN'},
                                             isHuy=${cur == 'DA_HUY'},
                                             isCanXuLy=${cur == 'CAN_XU_LY'}"
                                    th:classappend="${isCanXuLy ? 'status--can-xu-ly' : (isHuy ? 'status--da-huy' : (isPaid ? 'status--da-giao' : 'status--cho-xac-nhan'))}">
                                <th:block th:if="${isCho}">
                                    <option value="CHO_THANH_TOAN" th:selected="${cur == 'CHO_THANH_TOAN' or cur == 'DRAFT_OFFLINE' or cur == 'CHO_XAC_NHAN'}" th:text="'Chờ thanh toán'">Chờ thanh toán</option>
                                    <option value="DA_THANH_TOAN" th:text="'Đã thanh toán'">Đã thanh toán</option>
                                    <option value="DA_HUY" th:text="'Đã hủy'">Đã hủy</option>
                                </th:block>
                                <th:block th:if="${isPaid}">
                                    <option value="DA_THANH_TOAN" th:selected="true" th:text="'Đã thanh toán'">Đã thanh toán</option>
                                </th:block>
                                <th:block th:if="${isHuy and !isCho and !isPaid}">
                                    <option value="DA_HUY" th:selected="true" th:text="'Đã hủy'">Đã hủy</option>
                                </th:block>
                                <th:block th:if="${isCanXuLy}">
                                    <option value="CAN_XU_LY" th:selected="true" th:text="'Cần xử lý'">Cần xử lý</option>
                                    <option value="DA_THANH_TOAN" th:text="'Đã thanh toán'">Đã thanh toán</option>
                                    <option value="DA_HUY" th:text="'Đã hủy'">Đã hủy</option>
                                </th:block>
                            </select>
                        </form>
                        <!-- Đơn online / giao hàng: luồng trạng thái cũ -->
                        <form th:unless="${item.loaiHoaDon == 'OFFLINE'}"
                              th:action="@{/admin/hoa-don/{id}/trang-thai(id=${item.id})}"
                              method="post"
                              style="display:inline;"
                              class="status-form js-admin-ajax-form"
                              data-ajax="true"
                              data-confirm="Bạn có chắc chắn muốn đổi trạng thái đơn hàng này?"
                              data-confirm-title="Đổi trạng thái đơn hàng"
                              data-confirm-ok="Đổi trạng thái"
                              data-confirm-cancel="Hủy"
                              data-confirm-tone="info">
                            <input type="hidden" name="page" th:value="${page != null ? page.number : 0}" />
                            <input type="hidden" name="q" th:value="${searchKeyword != null ? searchKeyword : ''}" />
                            <input type="hidden" name="trangThaiFilter" th:value="${filterTrangThai != null ? filterTrangThai : ''}" />
                            <!-- cur = trạng thái hiện tại (coi null/trống là Chờ xác nhận); chỉ hiện các bước chuyển hợp lệ -->
                            <select name="trangThai" class="form__select form__select--sm table-status-select" onchange="(this.form.requestSubmit ? this.form.requestSubmit() : this.form.submit())"
                                    th:with="cur=${item.trangThaiDonHang != null and !#strings.isEmpty(item.trangThaiDonHang) ? item.trangThaiDonHang : 'CHO_XAC_NHAN'}"
                                    th:title="${cur == 'DA_GIAO'} ? 'Đơn đã giao, không đổi trạng thái' : 'Đổi trạng thái đơn hàng'"
                                    th:disabled="${cur == 'DA_GIAO'}"
                                    th:classappend="${cur == 'CAN_XU_LY' ? 'status--can-xu-ly' : (cur == 'CHO_XAC_NHAN' ? 'status--cho-xac-nhan' : (cur == 'DA_XAC_NHAN' ? 'status--da-xac-nhan' : (cur == 'DANG_GIAO' ? 'status--dang-giao' : (cur == 'DA_GIAO' ? 'status--da-giao' : 'status--da-huy'))))}">
                                <option th:if="${cur == 'CAN_XU_LY'}" th:value="CAN_XU_LY" th:selected="${cur == 'CAN_XU_LY'}" th:text="'Cần xử lý'">Cần xử lý</option>
                                <option th:if="${cur == 'CHO_XAC_NHAN'}" th:value="CHO_XAC_NHAN" th:selected="${cur == 'CHO_XAC_NHAN'}" th:text="'Chờ xác nhận'">Chờ xác nhận</option>
                                <option th:if="${cur == 'CHO_XAC_NHAN' or cur == 'DA_XAC_NHAN' or cur == 'CAN_XU_LY'}" th:value="DA_XAC_NHAN" th:selected="${cur == 'DA_XAC_NHAN'}" th:text="'Đã xác nhận'">Đã xác nhận</option>
                                <option th:if="${cur == 'DA_XAC_NHAN' or cur == 'DANG_GIAO'}" th:value="DANG_GIAO" th:selected="${cur == 'DANG_GIAO'}" th:text="'Đang giao'">Đang giao</option>
                                <option th:if="${cur == 'DANG_GIAO' or cur == 'DA_GIAO'}" th:value="DA_GIAO" th:selected="${cur == 'DA_GIAO'}" th:text="'Đã giao'">Đã giao</option>
                                <option th:if="${cur == 'DA_THANH_TOAN'}" th:value="DA_THANH_TOAN" th:selected="${cur == 'DA_THANH_TOAN'}" th:text="'Đã thanh toán'">Đã thanh toán</option>
                                <option th:if="${cur == 'CHO_XAC_NHAN' or cur == 'DA_XAC_NHAN' or cur == 'DANG_GIAO' or cur == 'DA_HUY' or cur == 'CAN_XU_LY' or cur == 'DA_THANH_TOAN'}" th:value="DA_HUY" th:selected="${cur == 'DA_HUY'}" th:text="'Đã hủy'">Đã hủy</option>
                            </select>
                        </form>
                    </td>
                    <td>
                        <div class="table-actions">
                            <a class="btn-icon btn-icon--edit" th:href="@{/admin/hoa-don/{id}(id=${item.id})}" title="Chi tiết"><i class="fa-solid fa-eye"></i></a>
                            <a class="btn-icon" th:href="@{/admin/hoa-don/{id}/pdf(id=${item.id})}" target="_blank" title="Xuất PDF"><i class="fa-solid fa-file-pdf"></i></a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
        <nav class="pagination" th:if="${page != null and page.totalPages > 1}" aria-label="Phân trang">
            <ul class="pagination__list">
                <li th:if="${page.first}"><span class="pagination__link pagination__link--disabled"><i class="fa-solid fa-angles-left" aria-hidden="true"></i></span></li>
                <li th:unless="${page.first}"><a class="pagination__link" th:href="@{/admin/hoa-don(page=0, q=${searchKeyword != null ? searchKeyword : ''}, trangThai=${filterTrangThai != null ? filterTrangThai : ''})}" title="Trang đầu"><i class="fa-solid fa-angles-left" aria-hidden="true"></i></a></li>
                <li th:if="${page.first}"><span class="pagination__link pagination__link--disabled"><i class="fa-solid fa-chevron-left" aria-hidden="true"></i></span></li>
                <li th:unless="${page.first}"><a class="pagination__link pagination__link--prev" th:href="@{/admin/hoa-don(page=${page.number - 1}, q=${searchKeyword != null ? searchKeyword : ''}, trangThai=${filterTrangThai != null ? filterTrangThai : ''})}" title="Trước"><i class="fa-solid fa-chevron-left" aria-hidden="true"></i></a></li>
                <li th:each="pi : ${paginationItems}">
                    <span th:if="${pi.ellipsis}" class="pagination__ellipsis" aria-hidden="true">&hellip;</span>
                    <a th:unless="${pi.ellipsis}"
                       class="pagination__link"
                       th:classappend="${pi.pageIndex == page.number} ? 'pagination__link--active'"
                       th:href="@{/admin/hoa-don(page=${pi.pageIndex}, q=${searchKeyword != null ? searchKeyword : ''}, trangThai=${filterTrangThai != null ? filterTrangThai : ''})}"
                       th:text="${pi.pageIndex + 1}">1</a>
                </li>
                <li th:if="${page.last}"><span class="pagination__link pagination__link--disabled"><i class="fa-solid fa-chevron-right" aria-hidden="true"></i></span></li>
                <li th:unless="${page.last}"><a class="pagination__link pagination__link--next" th:href="@{/admin/hoa-don(page=${page.number + 1}, q=${searchKeyword != null ? searchKeyword : ''}, trangThai=${filterTrangThai != null ? filterTrangThai : ''})}" title="Sau"><i class="fa-solid fa-chevron-right" aria-hidden="true"></i></a></li>
                <li th:if="${page.last}"><span class="pagination__link pagination__link--disabled"><i class="fa-solid fa-angles-right" aria-hidden="true"></i></span></li>
                <li th:unless="${page.last}"><a class="pagination__link" th:href="@{/admin/hoa-don(page=${page.totalPages - 1}, q=${searchKeyword != null ? searchKeyword : ''}, trangThai=${filterTrangThai != null ? filterTrangThai : ''})}" title="Trang cuối"><i class="fa-solid fa-angles-right" aria-hidden="true"></i></a></li>
            </ul>
        </nav>
    </section>

    <script>
    (function () {
        // For each non-OFFLINE status form, intercept select change for DA_XAC_NHAN
        document.querySelectorAll('form[action*="/trang-thai"]:not([enctype])').forEach(function (form) {
            var select = form.querySelector('select[name="trangThai"]');
            if (!select) return;
            var originalOnChange = select.getAttribute('onchange');

            select.addEventListener('change', function () {
                var newVal = select.value;
                // Intercept transitions that require inventory check:
                // - online/online orders: DA_XAC_NHAN
                // - OFFLINE orders from CAN_XU_LY: DA THANH TOAN (online payment)
                var needCheck = (newVal === 'DA_XAC_NHAN') ||
                    (newVal === 'DA THANH TOAN' || newVal === 'DA_THANH_TOAN');
                if (!needCheck) {
                    if (originalOnChange) select.setAttribute('onchange', originalOnChange);
                    return;
                }

                // Extract hoaDonId from form action: /admin/hoa-don/{id}/trang-thai
                var actionParts = (form.getAttribute('action') || '').split('/');
                var idIdx = actionParts.indexOf('hoa-don');
                var hoaDonId = idIdx >= 0 ? actionParts[idIdx + 1] : null;
                if (!hoaDonId) return;

                // Check inventory via API first
                fetch('/api/hoa-don/' + hoaDonId + '/check-ton-kho')
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        if (data.du) {
                            // OK – let the normal confirm-modal flow continue
                            if (originalOnChange) {
                                select.setAttribute('onchange', originalOnChange);
                            }
                            select.setAttribute('data-confirm-prev', select.querySelector('option[th\\:selected]') ?
                                select.querySelector('option[th\\:selected]').value :
                                (select.getAttribute('data-confirm-prev') || select.options[0].value));
                            // trigger default submit
                            if (form.requestSubmit) {
                                form.requestSubmit();
                            } else {
                                form.submit();
                            }
                        } else {
                            // Not enough inventory – revert and show warning
                            var prev = select.getAttribute('data-confirm-prev') ||
                                select.querySelector('option[th\\:selected]') ?
                                select.querySelector('option[th\\:selected]').value :
                                (select.options[0] ? select.options[0].value : '');
                            if (prev) select.value = prev;

                            var missingItems = data.items.filter(function (i) { return !i.du; })
                                .map(function (i) {
                                    return i.tenSanPham + ': cần ' + i.soLuongCan + ', còn ' + i.soLuongTon;
                                });
                            var msg = 'Số lượng không đủ! Vui lòng nhập thêm hàng để bán.\n\n' +
                                missingItems.join('\n');

                            if (window.confirmModal) {
                                window.confirmModal({
                                    title: 'Cảnh báo tồn kho',
                                    message: msg,
                                    confirmText: 'Đóng',
                                    cancelText: null,
                                    tone: 'danger'
                                });
                            } else {
                                alert(msg);
                            }
                        }
                    })
                    .catch(function () {
                        // On error, allow normal flow
                        if (originalOnChange) {
                            select.setAttribute('onchange', originalOnChange);
                        }
                    });

                // Prevent default while async check runs
                return false;
            });
        });
    })();
    </script>
</div>
</body>
</html>
