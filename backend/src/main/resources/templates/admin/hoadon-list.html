<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="content">
    <style>
        .badge--payment-pending {
            background: #ffffff !important;
            border: 1px solid #d1d5db !important;
            color: #b45309 !important;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 14.4px;
            font-family: Arial;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 150px;
        }

        .customer-name,
        .customer-phone {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .customer-name i,
        .customer-phone i {
            font-size: 11px;
            color: #777;
        }

        .hoa-don-filters {
            display: grid;
            gap: 0.95rem;
            padding: 1.1rem 1.15rem 1.15rem;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(255,255,255,0.97), rgba(248,250,252,0.95));
            border: 1px solid #dbe3ee;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
            margin-bottom: 1rem;
        }

        .hoa-don-filters__row {
            display: grid;
            gap: 0.75rem;
            align-items: end;
        }

        .hoa-don-filters__row--primary {
            grid-template-columns: minmax(0, 7fr) minmax(180px, 3fr);
        }

        .hoa-don-filters__row--secondary {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .hoa-don-filter-field {
            display: grid;
            gap: 0.4rem;
        }

        .hoa-don-filter-field__label {
            font-size: 0.82rem;
            font-weight: 800;
            color: #475569;
            letter-spacing: 0.02em;
        }

        .hoa-don-filters .toolbar__input,
        .hoa-don-filters .toolbar__select {
            min-height: 46px;
            border-radius: 14px;
            border: 1px solid #d7e0ea;
            background: #fff;
            padding: 0.78rem 1rem;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        .hoa-don-filters .toolbar__input:focus,
        .hoa-don-filters .toolbar__select:focus {
            outline: none;
            border-color: #1e3a5f;
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.12);
        }

        .hoa-don-filters .toolbar__btn {
            min-height: 46px;
            border-radius: 14px;
            padding: 0 1rem;
            white-space: nowrap;
            background: #1f3b5b;
            border-color: #1f3b5b;
            box-shadow: 0 8px 18px rgba(31, 59, 91, 0.18);
        }

        .hoa-don-filters .toolbar__btn:hover {
            background: #172c43;
            border-color: #172c43;
        }

        .table {
            border-collapse: separate;
            border-spacing: 0;
        }

        .table thead th {
            background: #f8fafc;
            color: #475569;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.9rem 0.85rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .table tbody tr:nth-child(even) { background: #fcfdff; }
        .table tbody tr:hover { background: #f6f9fc; }
        .table tbody td {
            padding: 0.8rem 0.85rem;
            vertical-align: middle;
            border-bottom: 1px solid #edf2f7;
        }

        .table tbody td:nth-child(1), .table tbody td:nth-child(8) { text-align: center; }
        .table tbody td:nth-child(2) { font-family: Consolas, 'Courier New', monospace; color: #0f172a; }
        .table tbody td:nth-child(5) { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
        .table tbody td:nth-child(3) { min-width: 190px; }

        .table-actions {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            justify-content: center;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            border: 1px solid #dbe3ee;
            background: #fff;
            color: #334155;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        .btn-icon--edit { color: #0f766e; }
        .btn-icon--pdf { color: #b91c1c; }

        .table-status-stack {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            justify-content: center;
            margin-bottom: 0.3rem;
            flex-wrap: wrap;
        }

        .table-status-stack--payment { margin-bottom: 0; }

        .table-status-badge,
        .payment-status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 86px;
            padding: 0.34rem 0.62rem;
            border-radius: 999px;
            border: 1px solid transparent;
            font-weight: 700;
            font-size: 0.72rem;
            line-height: 1.15;
            white-space: nowrap;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
        }

        .status--cho-xac-nhan,
        .status--can-xu-ly { background: #fff7ed; border-color: #fdba74; color: #9a3412; }
        .status--da-xac-nhan,
        .status--dang-giao { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
        .status--da-giao,
        .status--hoan-thanh { background: #dcfce7; border-color: #86efac; color: #166534; }
        .status--da-thanh-toan { background: #dbeafe; border-color: #93c5fd; color: #1d4ed8; }
        .status--da-huy,
        .status--thanh-toan-loi { background: #fee2e2; border-color: #fca5a5; color: #b91c1c; }
        .status--chua-thanh-toan { background: #e5e7eb; border-color: #d1d5db; color: #6b7280; }

        .table-status-select,
        .payment-status-select {
            min-height: 30px;
            padding: 0.22rem 0.55rem;
            border-radius: 999px;
            border: 1px solid #dbe3ee;
            background: #fff;
            font-size: 0.74rem;
            max-width: 102px;
        }

        .status-form--inline { display: inline-flex; align-items: center; }

        .table-actions {
            display: flex;
            flex-direction: row;
            gap: 0.35rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-icon {
            width: 28px;
            height: 28px;
            border-radius: 10px;
            border: 1px solid #dbe3ee;
            background: #fff;
            color: #334155;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
            font-size: 0.78rem;
        }

        .btn-icon--edit { color: #8b6b4f; }
        .btn-icon--pdf { color: #9a3412; }

        @media (max-width: 992px) {
            .hoa-don-filters__row--primary,
            .hoa-don-filters__row--secondary { grid-template-columns: 1fr; }
            .table { min-width: 1040px; }
        }
    </style>

    <div th:if="${message}" class="admin-toast-payload" th:attr="data-admin-toast-message=${message}, data-admin-toast-type='success'" aria-hidden="true"></div>

    <div th:if="${warning}" class="admin-toast-payload" th:attr="data-admin-toast-message=${warning}, data-admin-toast-type='warning'" aria-hidden="true"></div>

    <div th:if="${error}" class="admin-toast-payload" th:attr="data-admin-toast-message=${error}, data-admin-toast-type='error'" aria-hidden="true"></div>

    <section class="card card--full" id="listHoaDon">

        <h2 class="card__title">Danh sách hóa đơn</h2>

        <div class="hoa-don-filters">
            <form th:action="@{/admin/hoa-don}" method="get" class="js-admin-ajax-form hoa-don-filters__row hoa-don-filters__row--primary" data-ajax="true">
                <div class="hoa-don-filter-field">
                    <label class="hoa-don-filter-field__label" for="hoaDonSearch">Tìm kiếm</label>
                    <input id="hoaDonSearch" type="text" name="q" th:value="${searchKeyword}" placeholder="Tìm theo mã hoặc tên hóa đơn..." class="toolbar__input" />
                </div>
                <button type="submit" class="btn btn--primary toolbar__btn"><i class="fa-solid fa-search"></i> Tìm kiếm</button>
            </form>

            <form th:action="@{/admin/hoa-don}" method="get" class="js-admin-ajax-form hoa-don-filters__row hoa-don-filters__row--secondary" data-ajax="true">
                <div class="hoa-don-filter-field">
                    <label class="hoa-don-filter-field__label" for="hoaDonTrangThai">Trạng thái</label>
                    <select id="hoaDonTrangThai" name="trangThai" class="toolbar__select" onchange="this.form.submit()">
                        <option value="">Tất cả</option>
                        <option value="CAN_XU_LY" th:text="'Cần xử lý'" th:selected="${filterTrangThai == 'CAN_XU_LY'}">Cần xử lý</option>
                        <option value="CHO_XAC_NHAN" th:text="'Chờ xác nhận'" th:selected="${filterTrangThai == 'CHO_XAC_NHAN'}">Chờ xác nhận</option>
                        <option value="DA_XAC_NHAN" th:text="'Đã xác nhận'" th:selected="${filterTrangThai == 'DA_XAC_NHAN'}">Đã xác nhận</option>
                        <option value="DANG_GIAO" th:text="'Đang giao'" th:selected="${filterTrangThai == 'DANG_GIAO'}">Đang giao</option>
                        <option value="DA_GIAO" th:text="'Đã giao'" th:selected="${filterTrangThai == 'DA_GIAO'}">Đã giao</option>
                        <option value="DA_THANH_TOAN" th:text="'Hoàn thành'" th:selected="${filterTrangThai == 'DA_THANH_TOAN'}">Hoàn thành</option>
                        <option value="DA_HUY" th:text="'Đã hủy'" th:selected="${filterTrangThai == 'DA_HUY'}">Đã hủy</option>
                    </select>
                </div>

                <div class="hoa-don-filter-field">
                    <label class="hoa-don-filter-field__label" for="hoaDonLoaiDon">Loại đơn</label>
                    <select id="hoaDonLoaiDon" name="loaiDon" class="toolbar__select" onchange="this.form.submit()">
                        <option value="">Tất cả</option>
                        <option value="OFFLINE" th:selected="${filterLoaiDon == 'OFFLINE'}">Tại quầy</option>
                        <option value="ONLINE" th:selected="${filterLoaiDon == 'ONLINE'}">Online</option>
                    </select>
                </div>

                <div class="hoa-don-filter-field">
                    <label class="hoa-don-filter-field__label" for="hoaDonThanhToan">Thanh toán</label>
                    <select id="hoaDonThanhToan" name="phuongThucThanhToan" class="toolbar__select" onchange="this.form.submit()">
                        <option value="">Tất cả</option>
                        <option value="COD" th:selected="${filterPhuongThucThanhToan == 'COD'}">COD</option>
                        <option value="VNPAY" th:selected="${filterPhuongThucThanhToan == 'VNPAY'}">VNPay</option>
                    </select>
                </div>
            </form>
        </div>

        <table class="table">

            <thead>

            <tr>
                <th>ID</th>
                <th>Mã đơn</th>
                <th>Khách hàng</th>
                <th>Ngày đặt</th>
                <th>Tổng thanh toán</th>
                <th>Trạng thái</th>
                <th>TT Thanh toán</th>
                <th>Thao tác</th>
            </tr>

            </thead>

            <tbody>

                <tr th:each="item : ${list}">

                    <td th:text="${item.id}"></td>

                    <td th:text="${item.maDonHang}"></td>

                    <td>

                        <div class="customer-cell">
                            <span class="customer-name">
                                <i class="fas fa-user"></i>
                                <span th:text="${item.tenKhachHang != null ? item.tenKhachHang : '-'}"></span>
                             </span>

                            <span class="customer-phone">
                                <i class="fas fa-phone"></i>
                                 <span th:text="${item.sdtKhachHang != null ? item.sdtKhachHang : '-'}"></span>
                            </span>
                        </div>
                    </td>

                    <td th:text="${item.ngayDat != null ? #temporals.format(item.ngayDat, 'dd/MM/yyyy HH:mm') : '-'}"></td>

                    <td th:text="${item.tongTienThanhToan != null ? #numbers.formatDecimal(item.tongTienThanhToan, 1, 'POINT', 0, 'COMMA') : '-'}"></td>

                    <td>

                        <!-- OFFLINE - Đơn bán tại quầy -->
                        <form th:if="${item.loaiHoaDon == 'OFFLINE'}"
                              th:action="@{/admin/hoa-don/{id}/trang-thai(id=${item.id})}"
                              method="post"
                              style="display:inline;"
                              class="status-form js-admin-ajax-form"
                              data-ajax="true"
                              data-confirm="Bạn có chắc chắn muốn đổi trạng thái hóa đơn này?"
                              data-confirm-title="Đổi trạng thái hóa đơn"
                              data-confirm-ok="Đổi trạng thái"
                              data-confirm-cancel="Hủy"
                              data-confirm-tone="info">

                            <input type="hidden" name="page" th:value="${page != null ? page.number : 0}" />

                            <input type="hidden" name="q" th:value="${searchKeyword != null ? searchKeyword : ''}" />

                            <input type="hidden" name="trangThaiFilter" th:value="${filterTrangThai != null ? filterTrangThai : ''}" />

                            <input type="hidden" name="loaiDon" th:value="${filterLoaiDon != null ? filterLoaiDon : ''}" />
                            <input type="hidden" name="phuongThucThanhToan" th:value="${filterPhuongThucThanhToan != null ? filterPhuongThucThanhToan : ''}" />

                            <select name="trangThai" class="form__select form__select--sm table-status-select"
                                    th:with="cur=${item.trangThaiDonHang != null and !#strings.isEmpty(item.trangThaiDonHang) ? item.trangThaiDonHang : 'CHO_XAC_NHAN'},
                                             isDaGiao=${cur == 'DA_GIAO'},
                                             isDaHuy=${cur == 'DA_HUY'},
                                             isHoanThanh=${cur == 'HOAN_THANH'},
                                             isDaXacNhan=${cur == 'DA_XAC_NHAN'},
                                             isDangGiao=${cur == 'DANG_GIAO'},
                                             statusCls=${cur == 'CAN_XU_LY' ? 'status--can-xu-ly' : (cur == 'CHO_XAC_NHAN' ? 'status--cho-xac-nhan' : (cur == 'DA_XAC_NHAN' ? 'status--da-xac-nhan' : (cur == 'DANG_GIAO' ? 'status--dang-giao' : (cur == 'DA_GIAO' ? 'status--da-giao' : (cur == 'HOAN_THANH' ? 'status--hoan-thanh' : (cur == 'DA THANH TOAN' or cur == 'DA_THANH_TOAN' ? 'status--da-giao' : 'status--da-huy'))))))}"
                                    th:disabled="${isDaHuy or isHoanThanh}"
                                    th:classappend="${statusCls}">

                                <!-- Đã hủy - không cho đổi -->
                                <option th:if="${isDaHuy}" th:value="DA_HUY" th:selected="true" th:text="'Đã hủy'">Đã hủy</option>

                                <!-- Cần xử lý -->
                                <option th:if="${cur == 'CAN_XU_LY'}" th:value="CAN_XU_LY" th:selected="true" th:text="'Cần xử lí'">Cần xử lí</option>
                                <option th:if="${cur == 'CAN_XU_LY'}" th:value="CHO_XAC_NHAN" th:text="'Chờ xác nhận'">Chờ xác nhận</option>
                                <option th:if="${cur == 'CAN_XU_LY'}" th:value="DA_HUY" th:text="'Đã hủy'">Đã hủy</option>

                                <!-- Chờ xác nhận -->
                                <option th:if="${cur == 'CHO_XAC_NHAN'}" th:value="CHO_XAC_NHAN" th:selected="true" th:text="'Chờ xác nhận'">Chờ xác nhận</option>
                                <option th:if="${cur == 'CHO_XAC_NHAN'}" th:value="DA_XAC_NHAN" th:text="'Đã xác nhận'">Đã xác nhận</option>
                                <option th:if="${cur == 'CHO_XAC_NHAN'}" th:value="DA_HUY" th:text="'Đã hủy'">Đã hủy</option>

                                <!-- Đã xác nhận -->
                                <option th:if="${cur == 'DA_XAC_NHAN'}" th:value="DA_XAC_NHAN" th:selected="true" th:text="'Đã xác nhận'">Đã xác nhận</option>
                                <option th:if="${cur == 'DA_XAC_NHAN'}" th:value="DANG_GIAO" th:text="'Đang giao'">Đang giao</option>
                                <option th:if="${cur == 'DA_XAC_NHAN'}" th:value="DA_GIAO" th:text="'Đã giao'">Đã giao</option>
                                <option th:if="${cur == 'DA_XAC_NHAN'}" th:value="DA_HUY" th:text="'Đã hủy'">Đã hủy</option>

                                <!-- Đang giao -->
                                <option th:if="${cur == 'DANG_GIAO'}" th:value="DANG_GIAO" th:selected="true" th:text="'Đang giao'">Đang giao</option>
                                <option th:if="${cur == 'DANG_GIAO'}" th:value="DA_GIAO" th:text="'Đã giao'">Đã giao</option>

                                <!-- Đã giao - có thể chuyển sang Hoàn thành -->
                                <option th:if="${cur == 'DA_GIAO'}" th:value="DA_GIAO" th:selected="true" th:text="'Đã giao'">Đã giao</option>
                                <option th:if="${cur == 'DA_GIAO'}" th:value="HOAN_THANH" th:text="'Hoàn thành'">Hoàn thành</option>

                                <!-- Hoàn thành - chỉ hiển thị khi đơn đã ở trạng thái này -->
                                <th:block th:if="${isHoanThanh}">
                                    <option th:value="HOAN_THANH" th:selected="true" disabled="disabled" th:text="'Hoàn thành'">Hoàn thành</option>
                                </th:block>

                            </select>

                        </form>

                        <!-- ONLINE -->
                        <form th:unless="${item.loaiHoaDon == 'OFFLINE'}"
                              th:action="@{/admin/hoa-don/{id}/trang-thai(id=${item.id})}"
                              method="post"
                              style="display:inline;"
                              class="status-form js-admin-ajax-form"
                              data-ajax="true"
                              data-confirm="Bạn có chắc chắn muốn đổi trạng thái đơn hàng này?"
                              data-confirm-title="Đổi trạng thái đơn hàng"
                              data-confirm-ok="Đổi trạng thái"
                              data-confirm-cancel="Hủy"
                              data-confirm-tone="info">

                            <input type="hidden" name="page" th:value="${page != null ? page.number : 0}" />
                            <input type="hidden" name="q" th:value="${searchKeyword != null ? searchKeyword : ''}" />
                            <input type="hidden" name="trangThaiFilter" th:value="${filterTrangThai != null ? filterTrangThai : ''}" />
                            <input type="hidden" name="loaiDon" th:value="${filterLoaiDon != null ? filterLoaiDon : ''}" />
                            <input type="hidden" name="phuongThucThanhToan" th:value="${filterPhuongThucThanhToan != null ? filterPhuongThucThanhToan : ''}" />

                            <select name="trangThai" class="form__select form__select--sm table-status-select"
                                    th:with="cur=${item.trangThaiDonHang != null and !#strings.isEmpty(item.trangThaiDonHang) ? item.trangThaiDonHang : 'CHO_XAC_NHAN'},
                                             isDaGiao=${cur == 'DA_GIAO'},
                                             isDaHuy=${cur == 'DA_HUY'},
                                             isDaThanhToan=${cur == 'DA THANH TOAN' or cur == 'DA_THANH_TOAN'},
                                             isHoanThanh=${cur == 'HOAN_THANH'},
                                             statusCls=${cur == 'CAN_XU_LY' ? 'status--can-xu-ly' : (cur == 'CHO_XAC_NHAN' ? 'status--cho-xac-nhan' : (cur == 'DA_XAC_NHAN' ? 'status--da-xac-nhan' : (cur == 'DANG_GIAO' ? 'status--dang-giao' : (cur == 'DA_GIAO' ? 'status--da-giao' : (cur == 'DA THANH TOAN' ? 'status--da-giao' : (cur == 'DA_THANH_TOAN' ? 'status--da-giao' : (cur == 'HOAN_THANH' ? 'status--hoan-thanh' : 'status--da-huy')))))))}"
                                th:disabled="${isDaHuy or isDaThanhToan or isHoanThanh}"
                                th:classappend="${statusCls}">

                                <option th:if="${isDaHuy}" th:value="DA_HUY" th:selected="true" th:text="'Đã hủy'">Đã hủy</option>

                                <option th:if="${cur == 'CAN_XU_LY'}" th:value="CAN_XU_LY" th:selected="true" th:text="'Cần xử lí'">Cần xử lí</option>

                                <option th:if="${cur == 'CHO_XAC_NHAN'}" th:value="CHO_XAC_NHAN" th:selected="true" th:text="'Chờ xác nhận'">Chờ xác nhận</option>

                                <option th:if="${cur == 'CHO_XAC_NHAN' or cur == 'DA_XAC_NHAN' or cur == 'CAN_XU_LY'}" th:value="DA_XAC_NHAN" th:selected="${cur == 'DA_XAC_NHAN'}" th:text="'Đã xác nhận'">Đã xác nhận</option>

                                <option th:if="${cur == 'DA_XAC_NHAN'}" th:value="DANG_GIAO" th:text="'Đang giao'">Đang giao</option>

                                <option th:if="${cur == 'DANG_GIAO'}" th:value="DANG_GIAO" th:selected="true" hidden="hidden">Đang giao</option>

                                <option th:if="${cur == 'DANG_GIAO' or cur == 'DA_GIAO'}" th:value="DA_GIAO" th:selected="${cur == 'DA_GIAO'}" th:text="'Đã giao'">Đã giao</option>

                                <option th:if="${cur == 'DA_GIAO'}" th:value="HOAN_THANH" th:text="'Hoàn thành'">Hoàn thành</option>

                                <option th:if="${cur == 'DA THANH TOAN' or cur == 'DA_THANH_TOAN'}" th:value="DA THANH TOAN" th:selected="true" th:text="'Hoàn thành'">Hoàn thành</option>

                                <option th:if="${cur == 'HOAN_THANH'}" th:value="HOAN_THANH" th:selected="true" disabled="disabled" th:text="'Hoàn thành'">Hoàn thành</option>

                                <option th:if="${cur == 'CHO_XAC_NHAN' or cur == 'DA_XAC_NHAN' or cur == 'CAN_XU_LY' or cur == 'DA_THANH_TOAN' or cur == 'DA THANH TOAN'}" th:value="DA_HUY" th:selected="${cur == 'DA_HUY'}" th:text="'Đã hủy'">Đã hủy</option>

                            </select>

                        </form>

                    </td>

                    <td>
                        <span th:with="trangThaiDon=${item.trangThaiDonHang},
                                       trangThaiTT=${item.trangThaiThanhToan},
                                       isDaHuy=${trangThaiDon == 'DA_HUY'}">
                            <form th:action="@{/admin/hoa-don/{id}/trang-thai-thanh-toan(id=${item.id})}"
                                  method="post"
                                  style="display:inline;"
                                  class="payment-status-form js-admin-ajax-form"
                                  data-ajax="true">

                                <input type="hidden" name="page" th:value="${page != null ? page.number : 0}" />
                                <input type="hidden" name="q" th:value="${searchKeyword != null ? searchKeyword : ''}" />
                                <input type="hidden" name="trangThaiFilter" th:value="${filterTrangThai != null ? filterTrangThai : ''}" />
                                <input type="hidden" name="loaiDon" th:value="${filterLoaiDon != null ? filterLoaiDon : ''}" />
                                <input type="hidden" name="phuongThucThanhToan" th:value="${filterPhuongThucThanhToan != null ? filterPhuongThucThanhToan : ''}" />

                                <select name="trangThaiThanhToan"
                                        class="form__select form__select--sm payment-status-select"
                                        th:classappend="${trangThaiTT == 'DA_THANH_TOAN'} ? 'status--da-thanh-toan' : (${trangThaiTT == 'THANH_TOAN_LOI'} ? 'status--thanh-toan-loi' : 'status--chua-thanh-toan')"
                                        th:disabled="${trangThaiTT == 'DA_THANH_TOAN' or trangThaiTT == 'THANH_TOAN_LOI' or trangThaiDon == 'DA_HUY' or trangThaiDon == 'CAN_XU_LY' or trangThaiDon == 'CHO_XAC_NHAN' or trangThaiDon == 'DA_XAC_NHAN' or trangThaiDon == 'DANG_GIAO' or trangThaiDon == 'DA_GIAO'}">

                                    <option value="CHUA_THANH_TOAN" th:selected="${trangThaiTT == 'CHUA_THANH_TOAN' or trangThaiTT == null}" th:text="'Chưa thanh toán'">Chưa thanh toán</option>
                                    <option value="DA_THANH_TOAN" th:selected="${trangThaiTT == 'DA_THANH_TOAN'}" th:text="'Đã thanh toán'">Đã thanh toán</option>
                                    <option value="THANH_TOAN_LOI" th:selected="${trangThaiTT == 'THANH_TOAN_LOI'}" th:text="'Thanh toán lỗi'">Thanh toán lỗi</option>

                                </select>
                            </form>
                        </span>
                    </td>

                    <td>

                        <div class="table-actions">

                            <a class="btn-icon btn-icon--edit" th:href="@{/admin/hoa-don/{id}(id=${item.id})}" title="Chi tiết"><i class="fa-solid fa-eye"></i></a>

                            <a class="btn-icon" th:href="@{/admin/hoa-don/{id}/pdf(id=${item.id})}" target="_blank" title="Xuất PDF"><i class="fa-solid fa-file-pdf"></i></a>

                        </div>

                    </td>

                </tr>

            </tbody>

        </table>

        <nav class="pagination" th:if="${page != null and page.totalPages > 1}" aria-label="Phân trang">

            <ul class="pagination__list">

                <li th:if="${page.first}"><span class="pagination__link pagination__link--disabled"><i class="fa-solid fa-angles-left" aria-hidden="true"></i></span></li>

                <li th:unless="${page.first}"><a class="pagination__link" th:href="@{/admin/hoa-don(page=0, q=${searchKeyword != null ? searchKeyword : ''}, trangThai=${filterTrangThai != null ? filterTrangThai : ''}, loaiDon=${filterLoaiDon != null ? filterLoaiDon : ''}, phuongThucThanhToan=${filterPhuongThucThanhToan != null ? filterPhuongThucThanhToan : ''})}" title="Trang Đầu"><i class="fa-solid fa-angles-left" aria-hidden="true"></i></a></li>

                <li th:if="${page.first}"><span class="pagination__link pagination__link--disabled"><i class="fa-solid fa-chevron-left" aria-hidden="true"></i></span></li>

                <li th:unless="${page.first}"><a class="pagination__link pagination__link--prev" th:href="@{/admin/hoa-don(page=${page.number - 1}, q=${searchKeyword != null ? searchKeyword : ''}, trangThai=${filterTrangThai != null ? filterTrangThai : ''}, loaiDon=${filterLoaiDon != null ? filterLoaiDon : ''}, phuongThucThanhToan=${filterPhuongThucThanhToan != null ? filterPhuongThucThanhToan : ''})}" title="Trang Trước"><i class="fa-solid fa-chevron-left" aria-hidden="true"></i></a></li>

                <li th:each="pi : ${paginationItems}">

                    <span th:if="${pi.ellipsis}" class="pagination__ellipsis" aria-hidden="true">&hellip;</span>

                    <a th:unless="${pi.ellipsis}"
                       class="pagination__link"
                       th:classappend="${pi.pageIndex == page.number} ? 'pagination__link--active'"
                       th:href="@{/admin/hoa-don(page=${pi.pageIndex}, q=${searchKeyword != null ? searchKeyword : ''}, trangThai=${filterTrangThai != null ? filterTrangThai : ''}, loaiDon=${filterLoaiDon != null ? filterLoaiDon : ''}, phuongThucThanhToan=${filterPhuongThucThanhToan != null ? filterPhuongThucThanhToan : ''})}"
                       th:text="${pi.pageIndex + 1}">1</a>

                </li>

                <li th:if="${page.last}"><span class="pagination__link pagination__link--disabled"><i class="fa-solid fa-chevron-right" aria-hidden="true"></i></span></li>

                <li th:unless="${page.last}"><a class="pagination__link pagination__link--next" th:href="@{/admin/hoa-don(page=${page.number + 1}, q=${searchKeyword != null ? searchKeyword : ''}, trangThai=${filterTrangThai != null ? filterTrangThai : ''}, loaiDon=${filterLoaiDon != null ? filterLoaiDon : ''}, phuongThucThanhToan=${filterPhuongThucThanhToan != null ? filterPhuongThucThanhToan : ''})}" title="Sau"><i class="fa-solid fa-chevron-right" aria-hidden="true"></i></a></li>

                <li th:if="${page.last}"><span class="pagination__link pagination__link--disabled"><i class="fa-solid fa-angles-right" aria-hidden="true"></i></span></li>

                <li th:unless="${page.last}"><a class="pagination__link" th:href="@{/admin/hoa-don(page=${page.totalPages - 1}, q=${searchKeyword != null ? searchKeyword : ''}, trangThai=${filterTrangThai != null ? filterTrangThai : ''}, loaiDon=${filterLoaiDon != null ? filterLoaiDon : ''}, phuongThucThanhToan=${filterPhuongThucThanhToan != null ? filterPhuongThucThanhToan : ''})}" title="Trang Cuối"><i class="fa-solid fa-angles-right" aria-hidden="true"></i></a></li>

            </ul>

        </nav>

    </section>

    <script>
    (function () {

        function submitStatusFormViaAjax(form, select) {
            var action = form.getAttribute('action');
            var formData = new FormData(form);
            var headers = { 'X-Requested-With': 'XMLHttpRequest' };

            select.disabled = true;
            select.classList.add('is-loading');

            fetch(action, {
                method: 'POST',
                headers: headers,
                body: formData
            })
            .then(function (res) {
                var redirectUrl = res.headers.get('X-Redirect-Url');
                if (redirectUrl) {
                    window.location.href = redirectUrl;
                    return Promise.resolve('');
                }
                var contentType = res.headers.get('content-type');
                if (contentType && contentType.indexOf('application/json') !== -1) {
                    return res.json().then(function(data) {
                        if (data.redirect) {
                            window.location.href = data.redirect;
                            return '';
                        }
                        throw new Error(data.message || 'Có lỗi xảy ra');
                    });
                }
                if (!res.ok) throw new Error('Lỗi khi cập nhật trạng thái');
                return res.text();
            })
            .then(function (html) {
                var parser = new DOMParser();
                var doc = parser.parseFromString(html, 'text/html');

                var toastPayloads = doc.querySelectorAll('[data-admin-toast-message]');
                toastPayloads.forEach(function(el) {
                    var msg = el.getAttribute('data-admin-toast-message');
                    var toastType = el.getAttribute('data-admin-toast-type') || 'success';
                    if (msg && window.showAdminToast) {
                        window.showAdminToast(msg, toastType);
                    }
                });

                var newTableBody = doc.querySelector('table.table tbody');
                var currentTableBody = document.querySelector('table.table tbody');
                if (newTableBody && currentTableBody) {
                    currentTableBody.innerHTML = newTableBody.innerHTML;
                    bindStatusChangeEvents();
                    bindPaymentStatusChangeEvents();

                    var newPagination = doc.querySelector('nav.pagination');
                    var currentPagination = document.querySelector('nav.pagination');
                    if (newPagination && currentPagination) {
                        currentPagination.innerHTML = newPagination.innerHTML;
                        bindPaginationLinks();
                    }
                }
            })
            .catch(function (err) {
                console.error('Lỗi AJAX:', err);
                if (window.showAdminToast) {
                    window.showAdminToast('Đã xảy ra lỗi khi cập nhật trạng thái. Vui lòng thử lại.', 'error');
                }
                var prev = select.getAttribute('data-prev-value');
                if (prev) select.value = prev;
            })
            .finally(function () {
                select.disabled = false;
                select.classList.remove('is-loading');
            });
        }

        function bindStatusChangeEvents() {
            document.querySelectorAll('form[action*="/trang-thai"]:not([enctype])').forEach(function (form) {
                var select = form.querySelector('select[name="trangThai"]');
                if (!select || select.dataset.bound) return;
                select.dataset.bound = 'true';

                select.addEventListener('change', function () {
                    var newVal = select.value;
                    var currentSelected = select.querySelector('option[selected]');
                    select.dataset.prevValue = currentSelected ? currentSelected.value : '';

                    var actionParts = (form.getAttribute('action') || '').split('/');
                    var idIdx = actionParts.indexOf('hoa-don');
                    var hoaDonId = idIdx >= 0 ? actionParts[idIdx + 1] : null;

                    // Xử lý xác nhận cho trạng thái Đã xác nhận
                    if (newVal === 'DA_XAC_NHAN') {
                        if (hoaDonId) {
                            var confirmMsg = 'Bạn có chắc chắn muốn xác nhận đơn hàng này? Sau khi xác nhận, bạn sẽ được chuyển đến trang chọn số serial.';
                            if (typeof window.confirmModal === 'function') {
                                window.confirmModal({
                                    title: 'Xác nhận đơn hàng',
                                    message: confirmMsg,
                                    confirmText: 'Xác nhận',
                                    cancelText: 'Hủy',
                                    tone: 'info'
                                }).then(function (ok) {
                                    if (ok) {
                                        window.location.href = '/admin/hoa-don/' + hoaDonId + '/serial';
                                    } else {
                                        select.value = select.dataset.prevValue;
                                    }
                                });
                            } else {
                                if (window.confirm(confirmMsg)) {
                                    window.location.href = '/admin/hoa-don/' + hoaDonId + '/serial';
                                } else {
                                    select.value = select.dataset.prevValue;
                                }
                            }
                        }
                        return;
                    }

                    // Xác nhận chuyển sang Đang giao
                    if (newVal === 'DANG_GIAO') {
                        var confirmMsg = 'Bạn có chắc chắn muốn chuyển đơn hàng sang trạng thái "Đang giao"?';
                        if (typeof window.confirmModal === 'function') {
                            window.confirmModal({
                                title: 'Xác nhận giao hàng',
                                message: confirmMsg,
                                confirmText: 'Xác nhận',
                                cancelText: 'Hủy',
                                tone: 'info'
                            }).then(function (ok) {
                                if (ok) { submitStatusFormViaAjax(form, select); }
                                else { select.value = select.dataset.prevValue; }
                            });
                        } else {
                            if (window.confirm(confirmMsg)) { submitStatusFormViaAjax(form, select); }
                            else { select.value = select.dataset.prevValue; }
                        }
                        return;
                    }

                    // Xác nhận chuyển sang Đã giao
                    if (newVal === 'DA_GIAO') {
                        var confirmMsg = 'Bạn có chắc chắn muốn chuyển đơn hàng sang trạng thái "Đã giao"?';
                        if (typeof window.confirmModal === 'function') {
                            window.confirmModal({
                                title: 'Xác nhận đã giao',
                                message: confirmMsg,
                                confirmText: 'Xác nhận',
                                cancelText: 'Hủy',
                                tone: 'info'
                            }).then(function (ok) {
                                if (ok) { submitStatusFormViaAjax(form, select); }
                                else { select.value = select.dataset.prevValue; }
                            });
                        } else {
                            if (window.confirm(confirmMsg)) { submitStatusFormViaAjax(form, select); }
                            else { select.value = select.dataset.prevValue; }
                        }
                        return;
                    }

                    // Xác nhận chuyển sang Hoàn thành
                    if (newVal === 'HOAN_THANH') {
                        var confirmMsg = 'Bạn có chắc chắn muốn chuyển đơn hàng sang trạng thái "Hoàn thành"?';
                        if (typeof window.confirmModal === 'function') {
                            window.confirmModal({
                                title: 'Xác nhận hoàn thành',
                                message: confirmMsg,
                                confirmText: 'Xác nhận',
                                cancelText: 'Hủy',
                                tone: 'info'
                            }).then(function (ok) {
                                if (ok) { submitStatusFormViaAjax(form, select); }
                                else { select.value = select.dataset.prevValue; }
                            });
                        } else {
                            if (window.confirm(confirmMsg)) { submitStatusFormViaAjax(form, select); }
                            else { select.value = select.dataset.prevValue; }
                        }
                        return;
                    }

                    var needCheck = (newVal === 'DA THANH TOAN' || newVal === 'DA_THANH_TOAN');
                    var actionParts = (form.getAttribute('action') || '').split('/');
                    var idIdx = actionParts.indexOf('hoa-don');
                    var hoaDonId = idIdx >= 0 ? actionParts[idIdx + 1] : null;

                    if (!hoaDonId) return;

                    if (!needCheck) {
                        submitStatusFormViaAjax(form, select);
                        return;
                    }

                    fetch('/api/hoa-don/' + hoaDonId + '/check-ton-kho')
                        .then(function (r) { return r.json(); })
                        .then(function (data) {
                            if (data.du) {
                                submitStatusFormViaAjax(form, select);
                                return;
                            }
                            var missingItems = (data.items || []).filter(function (i) { return !i.du; })
                                .map(function (i) {
                                    return i.tenSanPham + ': cần ' + i.soLuongCan + ', còn ' + i.soLuongTon;
                                });
                            var msg = 'Tồn kho không đủ:\n' + missingItems.join('\n') +
                                '\n\nĐơn hàng sẽ chuyển sang trạng thái "Cần xử lý" và ghi chú cho khách. Tiếp tục?';

                            if (typeof window.confirmModal === 'function') {
                                window.confirmModal({
                                    title: 'Thiếu tồn kho',
                                    message: msg,
                                    confirmText: 'Tiếp tục',
                                    cancelText: 'Hủy',
                                    tone: 'danger'
                                }).then(function (ok) {
                                    if (ok) { submitStatusFormViaAjax(form, select); }
                                    else { select.value = select.dataset.prevValue; }
                                });
                            } else {
                                if (window.confirm(msg)) { submitStatusFormViaAjax(form, select); }
                                else { select.value = select.dataset.prevValue; }
                            }
                        })
                        .catch(function () {
                            if (window.showAdminToast) {
                                window.showAdminToast('Không thể kiểm tra tồn kho. Vui lòng thử lại.', 'error');
                            }
                            select.value = select.dataset.prevValue;
                        });
                });
            });
        }

        function bindPaginationLinks() {
            document.querySelectorAll('.pagination__link').forEach(function (link) {
                if (link.dataset.bound) return;
                link.dataset.bound = 'true';
                link.addEventListener('click', function (e) {
                    e.preventDefault();
                    var href = link.getAttribute('href');
                    if (!href) return;
                    if (typeof loadAdminContent === 'function') {
                        loadAdminContent(href, { method: 'GET' });
                    } else {
                        window.location.href = href;
                    }
                });
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                bindStatusChangeEvents();
                bindPaymentStatusChangeEvents();
            });
        } else {
            bindStatusChangeEvents();
            bindPaymentStatusChangeEvents();
        }

        function bindPaymentStatusChangeEvents() {
            document.querySelectorAll('.payment-status-form select[name="trangThaiThanhToan"]').forEach(function(select) {
                if (select.dataset.bound) return;
                select.dataset.bound = 'true';

                var selectedOption = select.querySelector('option[selected]');
                select.dataset.prevPaymentValue = selectedOption ? selectedOption.value : select.value;

                select.addEventListener('change', function() {
                    var newVal = select.value;
                    var form = select.closest('form');
                    if (!form) return;

                    var currentVal = select.dataset.prevPaymentValue;
                    var action = form.getAttribute('action');
                    var formData = new FormData(form);

                    var statusLabels = {
                        'CHUA_THANH_TOAN': 'Chưa thanh toán',
                        'DA_THANH_TOAN': 'Đã thanh toán',
                        'THANH_TOAN_LOI': 'Thanh toán lỗi'
                    };
                    var newLabel = statusLabels[newVal] || newVal;
                    var currentLabel = statusLabels[currentVal] || currentVal;
                    var confirmMsg = 'Bạn có chắc chắn muốn đổi trạng thái thanh toán từ "' + currentLabel + '" sang "' + newLabel + '" không?';

                    var doSubmit = function() {
                        select.disabled = true;
                        select.classList.add('is-loading');

                        fetch(action, {
                            method: 'POST',
                            headers: { 'X-Requested-With': 'XMLHttpRequest' },
                            body: formData
                        })
                        .then(function(res) {
                            var redirectUrl = res.headers.get('X-Redirect-Url');
                            if (redirectUrl) {
                                window.location.href = redirectUrl;
                                return Promise.resolve('');
                            }
                            var contentType = res.headers.get('content-type');
                            if (contentType && contentType.indexOf('application/json') !== -1) {
                                return res.json().then(function(data) {
                                    if (data.redirect) {
                                        window.location.href = data.redirect;
                                        return '';
                                    }
                                    throw new Error(data.message || 'Có lỗi xảy ra');
                                });
                            }
                            if (!res.ok) throw new Error('Lỗi khi cập nhật trạng thái thanh toán');
                            return res.text();
                        })
                        .then(function(html) {
                            var parser = new DOMParser();
                            var doc = parser.parseFromString(html, 'text/html');
                            var toastPayloads = doc.querySelectorAll('[data-admin-toast-message]');
                            toastPayloads.forEach(function(el) {
                                var msg = el.getAttribute('data-admin-toast-message');
                                var toastType = el.getAttribute('data-admin-toast-type') || 'success';
                                if (msg && window.showAdminToast) {
                                    window.showAdminToast(msg, toastType);
                                }
                            });

                            var newTableBody = doc.querySelector('table.table tbody');
                            var currentTableBody = document.querySelector('table.table tbody');
                            if (newTableBody && currentTableBody) {
                                currentTableBody.innerHTML = newTableBody.innerHTML;
                                bindStatusChangeEvents();
                                bindPaymentStatusChangeEvents();
                            }
                        })
                        .catch(function(err) {
                            console.error('Lỗi AJAX:', err);
                            if (window.showAdminToast) {
                                window.showAdminToast('Đã xảy ra lỗi khi cập nhật trạng thái thanh toán. Vui lòng thử lại.', 'error');
                            }
                            select.value = currentVal;
                        })
                        .finally(function() {
                            select.disabled = false;
                            select.classList.remove('is-loading');
                            select.dataset.prevPaymentValue = newVal;
                        });
                    };

                    if (typeof window.confirmModal === 'function') {
                        window.confirmModal({
                            title: 'Xác nhận đổi trạng thái thanh toán',
                            message: confirmMsg,
                            confirmText: 'Xác nhận',
                            cancelText: 'Hủy',
                            tone: 'info'
                        }).then(function(ok) {
                            if (ok) {
                                doSubmit();
                            } else {
                                select.value = currentVal;
                            }
                        });
                    } else {
                        if (window.confirm(confirmMsg)) {
                            doSubmit();
                        } else {
                            select.value = currentVal;
                        }
                    }
                });
            });
        }
    })();
    </script>

</div>

</body>

</html>
