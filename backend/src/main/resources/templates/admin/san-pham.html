<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản Phẩm - Watch Aura</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div th:fragment="content">
        <!-- Toast Notification Container -->
        <div id="toastContainer"
            style="position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px;">
        </div>

        <style>
            .content * {
                box-sizing: border-box;
            }

            .content .container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 0;
            }

            /* Toast notification */
            .toast {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                min-width: 320px;
                max-width: 420px;
                padding: 14px 16px;
                border-radius: 12px;
                border: 1px solid;
                background: #ffffff;
                box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
                animation: toastSlideIn 0.25s ease-out;
            }

            .toast.removing {
                animation: toastSlideOut 0.25s ease-in forwards;
            }

            .toast.success {
                border-color: #86efac;
                background: #f0fdf4;
            }

            .toast.error {
                border-color: #fca5a5;
                background: #fef2f2;
            }

            .toast.warning {
                border-color: #fcd34d;
                background: #fffbeb;
            }

            .toast.info {
                border-color: #93c5fd;
                background: #eff6ff;
            }

            .toast-icon {
                width: 22px;
                font-size: 18px;
                line-height: 1.2;
                margin-top: 1px;
                flex-shrink: 0;
            }

            .toast.success .toast-icon {
                color: #15803d;
            }

            .toast.error .toast-icon {
                color: #dc2626;
            }

            .toast.warning .toast-icon {
                color: #ca8a04;
            }

            .toast.info .toast-icon {
                color: #2563eb;
            }

            .toast-content {
                flex: 1;
                min-width: 0;
            }

            .toast-title {
                margin: 0 0 4px;
                color: #0f172a;
                font-size: 14px;
                font-weight: 700;
                line-height: 1.3;
            }

            .toast-message {
                margin: 0;
                color: #334155;
                font-size: 13px;
                line-height: 1.45;
                word-wrap: break-word;
            }

            .toast-close {
                border: none;
                background: transparent;
                color: #64748b;
                font-size: 18px;
                line-height: 1;
                cursor: pointer;
                padding: 2px 4px;
                border-radius: 6px;
                flex-shrink: 0;
                transition: all 0.2s ease;
            }

            .toast-close:hover {
                background: rgba(15, 23, 42, 0.08);
                color: #0f172a;
            }

            @keyframes toastSlideIn {
                from {
                    opacity: 0;
                    transform: translateX(16px);
                }

                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }

            @keyframes toastSlideOut {
                from {
                    opacity: 1;
                    transform: translateX(0);
                }

                to {
                    opacity: 0;
                    transform: translateX(16px);
                }
            }

            @media (max-width: 576px) {
                .toast {
                    min-width: 0;
                    width: calc(100vw - 32px);
                    max-width: calc(100vw - 32px);
                }
            }

            .product-image {
                width: 50px;
                height: 50px;
                object-fit: cover;
                border-radius: 6px;
                border: 1px solid #ddd;
            }

            .status-badge {
                display: inline-block;
                padding: 6px 12px;
                border-radius: 20px;
                font-size: 12px;
                font-weight: 600;
            }

            .status-active {
                background-color: #d4edda;
                color: #155724;
            }

            .status-inactive {
                background-color: #f8d7da;
                color: #721c24;
            }

            .price-highlight {
                color: #dc3545;
                font-weight: bold;
                font-size: 15px;
                white-space: nowrap;
                vertical-align: top;
            }

            /* Hàng chính + hàng biến thể: căn trên để không lệch khi tên dài / giá khoảng */
            #productsTable tbody tr.product-main-row td {
                vertical-align: top;
            }

            #productsTable tbody tr.variant-list-row td {
                vertical-align: top;
            }

            #productsTable thead th:nth-child(5) {
                min-width: 12rem;
            }

            .actions {
                display: flex;
                gap: 5px;
                flex-wrap: wrap;
            }

            /* Nút sửa + công tắc luôn cùng một hàng (cột THAO TÁC) */
            #productsTable .actions {
                flex-direction: row;
                flex-wrap: nowrap;
                align-items: center;
                gap: 10px;
            }

            #productsTable .actions .btn {
                flex-shrink: 0;
            }

            #productsTable .actions .toggle-switch {
                flex-shrink: 0;
            }

            #productsTable tbody tr.product-main-row td:last-child {
                white-space: nowrap;
            }

            /* Variant list under each product row */
            .variant-list-row td {
                background: linear-gradient(180deg, #fafbfc 0%, #f5f7fa 100%);
                padding: 16px 15px;
                border-top: 1px solid #e8ecf1;
                border-bottom: 1px solid #e8ecf1;
            }

            .variant-list {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 12px;
                width: 100%;
                color: #4a5568;
                font-size: 13px;
            }

            .variant-item {
                background: white;
                border: 1px solid #dce5ed;
                border-radius: 8px;
                padding: 12px;
                box-shadow: 0 1px 3px rgba(16, 24, 40, 0.08);
                transition: all 0.2s ease;
            }

            .variant-item:hover {
                /*border-color: #2c3e50;*/
                box-shadow: 0 2px 6px rgba(44, 62, 80, 0.12);
                transform: translateY(-1px);
            }

            .variant-item .variant-name {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                font-weight: 600;
                color: #1a1a1a;
                margin-bottom: 8px;
                line-height: 1.4;
            }

            .variant-item .variant-name span {
                background: #f0f4f8;
                padding: 4px 8px;
                border-radius: 4px;
                font-size: 12px;
                font-weight: 500;
            }

            .variant-item .variant-details {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                font-size: 12px;
                color: #64748b;
                margin-bottom: 8px;
            }

            .variant-item .detail-row {
                display: flex;
                justify-content: space-between;
            }

            .variant-item .detail-row .label {
                font-weight: 500;
                color: #475569;
            }

            .variant-item .detail-row .value {
                color: #1e293b;
                font-weight: 600;
            }

            .variant-item .variant-price {
                color: #dc3545;
                font-size: 14px;
                font-weight: 700;
                padding-top: 8px;
                border-top: 1px solid #e8ecf1;
            }

            .variant-item .muted {
                color: #8b8f94;
                font-size: 11px;
                display: block;
            }

            .variant-item .variant-status {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 10px;
                padding-top: 8px;
                border-top: 1px solid #e8ecf1;
            }

            .variant-item .status-label {
                font-size: 12px;
                font-weight: 500;
                color: #475569;
            }

            .variant-item .toggle-switch-small {
                display: inline-block;
                position: relative;
                width: 44px;
                height: 24px;
            }

            .variant-item .toggle-switch-small input {
                opacity: 0;
                width: 0;
                height: 0;
            }

            .variant-item .toggle-switch-small .slider-small {
                position: absolute;
                cursor: pointer;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: #cbd5e1;
                transition: 0.4s;
                border-radius: 24px;
                border: 1px solid #b0bcc4;
            }

            .variant-item .toggle-switch-small .slider-small:before {
                position: absolute;
                content: "";
                height: 16px;
                width: 16px;
                left: 3px;
                bottom: 3px;
                background-color: white;
                transition: 0.4s;
                border-radius: 50%;
            }

            .variant-item .toggle-switch-small input:checked+.slider-small {
                background-color: #27ae60;
                border-color: #27ae60;
            }

            .variant-item .toggle-switch-small input:checked+.slider-small:before {
                transform: translateX(20px);
            }

            .variant-item .toggle-switch-small input:disabled+.slider-small {
                opacity: 0.5;
                cursor: not-allowed;
            }

            /* Form Styling */
            .form-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin-bottom: 20px;
            }

            .form-group {
                display: flex;
                flex-direction: column;
            }

            .form-group label {
                font-weight: 600;
                margin-bottom: 8px;
                color: #333;
                font-size: 14px;
            }

            .form-group input,
            .form-group textarea,
            .form-group select {
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 6px;
                font-size: 14px;
                font-family: inherit;
                transition: border-color 0.3s ease;
            }

            .form-group input:focus,
            .form-group textarea:focus,
            .form-group select:focus {
                outline: none;
                border-color: #2c3e50;
                box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.1);
            }

            .form-group textarea {
                resize: vertical;
                min-height: 80px;
            }

            .form-full {
                grid-column: 1 / -1;
            }

            .form-actions {
                display: flex;
                gap: 10px;
                margin-top: 20px;
            }

            .form-actions button {
                flex: 1;
                padding: 12px;
                border: none;
                border-radius: 6px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .form-actions .btn-submit {
                background: #2c3e50;
                color: white;
            }

            .form-actions .btn-submit:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(44, 62, 80, 0.4);
            }

            .form-actions .btn-cancel {
                background: #f0f0f0;
                color: #333;
            }

            .form-actions .btn-cancel:hover {
                background: #e0e0e0;
            }

            /* Preview Image */
            .preview-container {
                margin-top: 10px;
            }

            .preview-image {
                /*max-width: 50px;*/
                /*max-height: 100px;*/
                border-radius: 6px;
                border: 2px solid #ddd;
            }

            /* Loading State */
            .loading {
                text-align: center;
                padding: 40px;
                color: #999;
            }

            .spinner {
                border: 4px solid #f0f0f0;
                border-top: 4px solid #2c3e50;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                animation: spin 1s linear infinite;
                margin: 0 auto 20px;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }

                100% {
                    transform: rotate(360deg);
                }
            }

            /* Radio Button Styling */
            .radio-group {
                display: flex;
                gap: 20px;
                margin-top: 10px;
            }

            .radio-group label {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 0;
                font-weight: 500;
            }

            .radio-group input[type="radio"] {
                cursor: pointer;
            }

            /* Modal Styling */
            .modal {
                display: none;
                position: fixed;
                z-index: 1000;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.5);
                overflow: auto;
                animation: fadeIn 0.3s ease;
            }

            .modal.show {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }

                to {
                    opacity: 1;
                }
            }

            .modal-content {
                background-color: white;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
                max-width: 1200px;
                width: 95%;
                max-height: 90vh;
                overflow-y: auto;
                animation: slideIn 0.3s ease;
            }

            @keyframes slideIn {
                from {
                    transform: translateY(-50px);
                    opacity: 0;
                }

                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }

            .modal-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 25px;
                padding-bottom: 15px;
                border-bottom: 2px solid #f0f0f0;
            }

            .modal-header h2 {
                font-size: 24px;
                color: #333;
                margin: 0;
            }

            .modal-close {
                background: none;
                border: none;
                font-size: 28px;
                color: #999;
                cursor: pointer;
                transition: color 0.3s ease;
            }

            .modal-close:hover {
                color: #333;
            }

            .modal-form {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }

            .modal-form-group {
                display: flex;
                flex-direction: column;
            }

            .modal-form-group.full {
                grid-column: 1 / -1;
            }

            .modal-form-group label {
                font-weight: 600;
                margin-bottom: 8px;
                color: #333;
                font-size: 14px;
            }

            .modal-form-group input,
            .modal-form-group textarea,
            .modal-form-group select {
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 6px;
                font-size: 14px;
                font-family: inherit;
                transition: border-color 0.3s ease;
            }

            .modal-form-group input:focus,
            .modal-form-group textarea:focus,
            .modal-form-group select:focus {
                outline: none;
                border-color: #2c3e50;
                box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.1);
            }

            .modal-form-group textarea {
                resize: vertical;
                min-height: 80px;
            }

            .preview-image-container {
                margin-top: 10px;
            }

            .preview-image-container img {
                max-width: 150px;
                max-height: 150px;
                border-radius: 6px;
                border: 2px solid #ddd;
            }

            .radio-group-modal {
                display: flex;
                gap: 20px;
                margin-top: 10px;
            }

            .radio-group-modal label {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 0;
                font-weight: 500;
                cursor: pointer;
            }

            .radio-group-modal input[type="radio"] {
                cursor: pointer;
            }

            .modal-actions {
                display: flex;
                gap: 10px;
                margin-top: 25px;
                padding-top: 20px;
                border-top: 2px solid #f0f0f0;
            }

            .modal-actions button {
                flex: 1;
                padding: 12px;
                border: none;
                border-radius: 6px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .modal-actions .btn-save {
                background: #53a5fb;
                color: white;
            }

            .modal-actions .btn-save:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(44, 62, 80, 0.4);
            }

            .modal-actions .btn-cancel {
                background: #f0f0f0;
                color: #333;
            }

            .modal-actions .btn-cancel:hover {
                background: #e0e0e0;
            }

            /* Preview Image Container */
            .preview-image-container {
                display: flex;
                justify-content: flex-start;
                padding: 10px;
                background: #f5f5f5;
                border-radius: 8px;
                width: fit-content;
                max-width: 300px;
            }

            .preview-image-container img {
                width: 100%;
                max-height: 250px;
                border-radius: 4px;
            }

            /* Radio Group in Modal */
            .radio-group-modal {
                display: flex;
                gap: 20px;
            }

            .radio-group-modal label {
                display: flex;
                align-items: center;
                gap: 8px;
                cursor: pointer;
                font-weight: 400;
            }

            .radio-group-modal input[type="radio"] {
                cursor: pointer;
            }

            /* Section Divider */
            .section-divider {
                padding: 20px 0;
                margin: 20px 0;
                border-top: 2px solid #f0f0f0;
                border-bottom: 2px solid #f0f0f0;
            }

            .section-divider h3 {
                margin: 0;
                color: #2c3e50;
                font-size: 18px;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .section-divider i {
                color: #2c3e50;
            }

            /* Add Variant Button */
            .btn-add-variant {
                background: #27ae60;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 6px;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 8px;
                font-weight: 500;
                transition: background 0.3s ease;
            }

            .btn-add-variant:hover {
                background: #229954;
            }

            /* Variant Row */
            .variant-row {
                background: #f9f9f9;
                padding: 20px;
                border-radius: 8px;
                border: 1px solid #e0e0e0;
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 15px;
                position: relative;
            }

            .variant-row .modal-form-group {
                margin: 0;
            }

            .variant-row .variant-remove {
                position: absolute;
                top: 15px;
                right: 15px;
                background: #e74c3c;
                color: white;
                border: none;
                width: 30px;
                height: 30px;
                border-radius: 50%;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.3s ease;
            }

            .variant-row .variant-remove:hover {
                background: #c0392b;
            }

            /* Toggle Switch CSS */
            .toggle-switch {
                display: inline-block;
                position: relative;
                width: 50px;
                height: 26px;
            }

            .toggle-switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

            .toggle-switch .slider {
                position: absolute;
                cursor: pointer;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: #ccc;
                transition: 0.4s;
                border-radius: 26px;
                border: 2px solid #ddd;
            }

            .toggle-switch .slider:before {
                position: absolute;
                content: "";
                height: 18px;
                width: 18px;
                left: 3px;
                bottom: 2px;
                background-color: white;
                transition: 0.4s;
                border-radius: 50%;
            }

            .toggle-switch input:checked+.slider {
                background-color: #27ae60;
                border-color: #27ae60;
            }

            .toggle-switch input:checked+.slider:before {
                transform: translateX(24px);
            }

            .toggle-switch input:disabled+.slider {
                opacity: 0.5;
                cursor: not-allowed;
            }

            /* Responsive */
            @media (max-width: 768px) {
                .header {
                    flex-direction: column;
                    align-items: flex-start;
                }

                .header h1 {
                    font-size: 24px;
                }

                .header-actions {
                    width: 100%;
                    flex-direction: column;
                }

                .header-actions .btn {
                    width: 100%;
                    justify-content: center;
                }

                .form-grid {
                    grid-template-columns: 1fr;
                }

                .content .table {
                    font-size: 12px;
                }

                .content .table th,
                .content .table td {
                    padding: 0.5rem;
                }

                .actions {
                    flex-direction: column;
                }

                .actions .btn {
                    width: 100%;
                }

                #productsTable .actions {
                    flex-direction: row;
                    flex-wrap: nowrap;
                    align-items: center;
                }

                #productsTable .actions .btn {
                    width: auto;
                }
            }
        </style>
        <div class="container">
            <!-- Danh sách Sản phẩm -->
            <div class="content-section">
                <div class="section-title">
                    <i class="fas fa-table"></i>
                    Danh sách sản phẩm
                    <button class="btn btn--primary" onclick="openAddModal()" style="margin-left: auto;">
                        <i class="fas fa-plus"></i>Thêm sản phẩm
                    </button>
                </div>

                <!-- Tìm kiếm & Lọc (giống trang Voucher, Khách hàng, ...) -->
                <div class="toolbar toolbar--sanpham">
                    <div class="search-bar">
                        <input type="text" id="searchKeyword" placeholder="Tìm theo mã hoặc tên..."
                            class="search-bar__input" />
                        <button type="button" class="btn btn--primary search-bar__btn" id="btnSearch"><i
                                class="fa-solid fa-search"></i> Tìm kiếm</button>
                        <button type="button" class="btn btn--secondary search-bar__btn" id="btnClearSearch"
                            title="Xóa bộ lọc"><i class="fa-solid fa-times"></i> Clear</button>
                    </div>
                    <div class="filter-bar">
                        <label class="filter-bar__label">Trạng thái:</label>
                        <select id="filterTrangThai" class="form__select filter-bar__select">
                            <option value="">Tất cả</option>
                            <option value="true">Hoạt động</option>
                            <option value="false">Không hoạt động</option>
                        </select>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table id="productsTable" class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>MÃ SP</th>
                                <th>HÌNH ẢNH</th>
                                <th>TÊN SẢN PHẨM</th>
                                <th>GIÁ BÁN</th>
                                <th>SỐ LƯỢNG</th>
                                <th>TRẠNG THÁI</th>
                                <th>THAO TÁC</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody">
                            <tr>
                                <td colspan="8" class="loading">
                                    <div class="spinner"></div>
                                    Đang tải dữ liệu...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <nav id="paginationBar" class="pagination" aria-label="Phân trang">
                    <span id="paginationInfo" class="pagination-info"></span>
                    <ul id="paginationControls" class="pagination__list"></ul>
                </nav>
            </div>
        </div>

        <!-- Modal Thêm/Sửa Sản Phẩm -->
        <div id="productModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Thêm mới sản phẩm</h2>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>

                <form id="sanPhamForm">
                    <!-- PHẦN 1: THÔNG TIN SẢN PHẨM -->
                    <div class="section-divider">
                        <h3><i class="fas fa-cube"></i> Thông tin sản phẩm</h3>
                    </div>

                    <div class="modal-form" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <input type="hidden" id="productId">

                        <div class="modal-form-group">
                            <label for="maSanPham">Mã sản phẩm</label>
                            <input type="text" id="maSanPham" readonly title="Mã sản phẩm được tự động sinh">
                            <small style="color: #28a745; font-size: 12px;">
                                <i class="fas fa-info-circle"></i> Mã sản phẩm được tự động sinh
                            </small>
                            <small id="maSanPhamError" class="text-error" style="display: none; color: #e74c3c;">Mã sản
                                phẩm
                                đã tồn tại.</small>
                        </div>

                        <div class="modal-form-group">
                            <label for="tenSanPham">Tên sản phẩm *</label>
                            <input type="text" id="tenSanPham" required>
                        </div>

                        <div class="modal-form-group">
                            <label for="idThuongHieu">Thương hiệu *</label>
                            <select id="idThuongHieu" required>
                                <option value="">-- Chọn thương hiệu --</option>
                            </select>
                        </div>

                        <div class="modal-form-group">
                            <label for="idDanhMuc">Danh mục *</label>
                            <select id="idDanhMuc" required>
                                <option value="">-- Chọn danh mục --</option>
                            </select>
                        </div>

                        <div class="modal-form-group">
                            <label for="idLoaiMay">Loại máy *</label>
                            <select id="idLoaiMay" required>
                                <option value="">-- Chọn loại máy --</option>
                            </select>
                        </div>

                        <div class="modal-form-group" style="grid-column: 1 / -1;">
                            <label for="phongCach">Phong cách</label>
                            <input type="text" id="phongCach">
                        </div>

                        <div class="modal-form-group" style="grid-column: 1 / -1;">
                            <label for="hinhAnhFile">Hình ảnh</label>
                            <input type="file" id="hinhAnhFile" accept="image/*">
                            <input type="hidden" id="hinhAnh">
                        </div>

                        <div class="modal-form-group" style="grid-column: 1 / -1;">
                            <label for="moTa">Mô tả</label>
                            <textarea id="moTa"></textarea>
                        </div>

                        <div class="modal-form-group" style="grid-column: 1 / -1; display: none;" id="previewContainer">
                            <label>Xem trước hình ảnh</label>
                            <div class="preview-image-container">
                                <img id="previewImage" src="" alt="Preview">
                            </div>
                        </div>

                        <div class="modal-form-group" style="grid-column: 1 / -1;">
                            <label>Trạng thái sản phẩm</label>
                            <div class="radio-group-modal">
                                <label>
                                    <input type="radio" name="trangThai" value="true" checked> Hoạt động
                                </label>
                                <label>
                                    <input type="radio" name="trangThai" value="false"> Không hoạt động
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- PHẦN 2: CHI TIẾT SẢN PHẨM (BIẾN THỂ) -->
                    <div class="section-divider" style="margin-top: 30px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <h3><i class="fas fa-layer-group"></i> Chi tiết sản phẩm (Biến thể)</h3>
                            <button type="button" class="btn-add-variant" onclick="addVariantRow()">
                                <i class="fas fa-plus"></i> Thêm biến thể
                            </button>
                        </div>
                    </div>

                    <div id="variantContainer" style="display: flex; flex-direction: column; gap: 20px;">
                        <!-- Variant rows will be added here -->
                    </div>

                    <!-- Actions -->
                    <div class="modal-actions" style="margin-top: 30px;">
                        <button type="submit" class="btn-save">
                            <i class="fas fa-save"></i> Lưu sản phẩm
                        </button>
                        <button type="button" class="btn-cancel" onclick="closeModal()">
                            <i class="fas fa-times"></i> Hủy
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            const API_URL = '/api';
            const PAGE_SIZE = 5;
            let isEditing = false;
            let currentPage = 0;
            let totalPages = 0;
            let totalElements = 0;

            // Toast notification system
            function showToast(message, type = 'info', title = '') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;

                const icons = {
                    success: '<i class="fas fa-check-circle"></i>',
                    error: '<i class="fas fa-exclamation-circle"></i>',
                    warning: '<i class="fas fa-exclamation-triangle"></i>',
                    info: '<i class="fas fa-info-circle"></i>'
                };

                const titles = {
                    success: title || 'Thành công',
                    error: title || 'Lỗi',
                    warning: title || 'Cảnh báo',
                    info: title || 'Thông tin'
                };

                toast.innerHTML = `
                    <div class="toast-icon">${icons[type] || icons.info}</div>
                    <div class="toast-content">
                        ${title ? `<p class="toast-title">${titles[type]}</p>` : ''}
                        <p class="toast-message">${message}</p>
                    </div>
                    <button class="toast-close" onclick="this.closest('.toast').remove()">&times;</button>
                `;

                container.appendChild(toast);

                // Auto remove after 5 seconds
                const autoRemoveTimer = setTimeout(() => {
                    if (toast.parentElement) {
                        toast.classList.add('removing');
                        setTimeout(() => toast.remove(), 300);
                    }
                }, 5000);

                // Clear timer if manually removed
                toast.addEventListener('click', () => clearTimeout(autoRemoveTimer));
            }

            // Confirm popup helper (fallback về confirm nếu chưa load script chung)
            async function showConfirmPopup({
                title = 'Xác nhận',
                message = 'Bạn có chắc chắn muốn thực hiện thao tác này?',
                confirmText = 'Xác nhận',
                cancelText = 'Hủy',
                tone = 'danger'
            } = {}) {
                if (typeof window.confirmModal === 'function') {
                    return await window.confirmModal({ title, message, confirmText, cancelText, tone });
                }
                return window.confirm(message);
            }

            // Bộ nhớ cache cho các danh sách attribute
            let attributeCache = {
                mauSac: [],
                kichThuoc: [],
                chatLieuDay: [],
                loaiMay: []
            };

            // Hàm để map ID sang tên
            function getMauSacName(id) {
                if (!id) return '-';
                const item = attributeCache.mauSac.find(m => m.id == id);
                return item ? item.tenMauSac : 'Màu#' + id;
            }

            function getKichThuocName(id) {
                if (!id) return '-';
                const item = attributeCache.kichThuoc.find(k => k.id == id);
                return item ? item.tenKichThuoc : 'Kích#' + id;
            }

            function getChatLieuDayName(id) {
                if (!id) return '-';
                const item = attributeCache.chatLieuDay.find(c => c.id == id);
                return item ? item.tenChatLieu : 'Chất#' + id;
            }

            function getLoaiMayName(id) {
                if (!id) return '-';
                const item = attributeCache.loaiMay.find(l => l.id == id);
                return item ? item.tenLoaiMay : 'Máy#' + id;
            }

            // Load và cache tất cả attribute
            async function loadAttributeCache() {
                try {
                    const [mauSacs, kichThuocs, chatLieus, loaiMays] = await Promise.all([
                        fetch(`${API_URL}/mau-sac`).then(r => r.json()),
                        fetch(`${API_URL}/kich-thuoc`).then(r => r.json()),
                        fetch(`${API_URL}/chat-lieu-day`).then(r => r.json()),
                        fetch(`${API_URL}/loai-may`).then(r => r.json())
                    ]);
                    attributeCache.mauSac = mauSacs;
                    attributeCache.kichThuoc = kichThuocs;
                    attributeCache.chatLieuDay = chatLieus;
                    attributeCache.loaiMay = loaiMays;
                } catch (error) {
                    console.error('Lỗi load attribute cache:', error);
                }
            }

            // Mở Modal Thêm Sản Phẩm
            async function openAddModal() {
                resetModal();
                document.getElementById('productModal').classList.add('show');
                document.getElementById('modalTitle').textContent = 'Thêm mới sản phẩm';
                isEditing = false;

                // Gọi API sinh mã tự động
                try {
                    const response = await fetch(`${API_URL}/san-pham/generate-ma`);
                    const data = await response.json();
                    if (data.maSanPham) {
                        document.getElementById('maSanPham').value = data.maSanPham;
                    }
                } catch (error) {
                    console.error('Lỗi sinh mã:', error);
                }

                document.getElementById('maSanPhamError').style.display = 'none';
            }

            // Đóng Modal
            function closeModal() {
                document.getElementById('productModal').classList.remove('show');
                resetModal();
            }

            // Đóng Modal khi click ngoài
            // window.onclick = function (event) {
            //     const modal = document.getElementById('productModal');
            //     if (event.target === modal) {
            //         closeModal();
            //     }
            // }

            // Reset Modal
            function resetModal() {
                document.getElementById('sanPhamForm').reset();
                document.getElementById('productId').value = '';
                document.getElementById('hinhAnh').value = '';
                document.getElementById('previewContainer').style.display = 'none';
                document.querySelector('input[name="trangThai"][value="true"]').checked = true;
                document.getElementById('variantContainer').innerHTML = '';
                document.getElementById('maSanPhamError').style.display = 'none';
                addVariantRow(); // Thêm 1 dòng biến thể mặc định
            }

            // Thêm dòng biến thể mới
            function addVariantRow() {
                const container = document.getElementById('variantContainer');
                const variantIndex = container.children.length;

                const variantRow = document.createElement('div');
                variantRow.className = 'variant-row';
                variantRow.innerHTML = `
                <input type="hidden" class="variant-id">

                <div class="modal-form-group">
                    <label>Màu sắc</label>
                    <select class="variant-mauSac" required>
                        <option value="">-- Chọn màu sắc --</option>
                    </select>
                </div>

                <div class="modal-form-group">
                    <label>Kích thước</label>
                    <select class="variant-kichThuoc" required>
                        <option value="">-- Chọn kích thước --</option>
                    </select>
                </div>

                <div class="modal-form-group">
                    <label>Chất liệu dây</label>
                    <select class="variant-chatLieuDay" required>
                        <option value="">-- Chọn chất liệu dây --</option>
                    </select>
                </div>

                <div class="modal-form-group">
                    <label>Giá bán *</label>
                    <input type="number" class="variant-giaBan" step="0.01" min="0" required>
                </div>

                <div class="modal-form-group">
                    <label>Số lượng tồn *</label>
                    <input type="number" class="variant-soLuongTon" min="0" required>
                </div>

                <div class="modal-form-group">
                    <label>Đường kính (mm)</label>
                    <input type="number" class="variant-duongKinh" step="0.01" min="0">
                </div>

                <div class="modal-form-group">
                    <label>Độ chịu nước (m)</label>
                    <input type="number" class="variant-doChiuNuoc" min="0">
                </div>

                <div class="modal-form-group">
                    <label>Bề rộng dây (mm)</label>
                    <input type="number" class="variant-beRongDay" step="0.01" min="0">
                </div>

                <div class="modal-form-group">
                    <label>Trọng lượng (g)</label>
                    <input type="number" class="variant-trongLuong" step="0.01" min="0">
                </div>

                <div class="modal-form-group" style="grid-column: 1 / -1;">
                    <label>Trạng thái chi tiết</label>
                    <div class="radio-group-modal">
                        <label>
                            <input type="radio" name="trangThaiChiTiet-${variantIndex}" value="true" checked> Hoạt động
                        </label>
                        <label>
                            <input type="radio" name="trangThaiChiTiet-${variantIndex}" value="false"> Không hoạt động
                        </label>
                    </div>
                </div>

                <button type="button" class="variant-remove" onclick="removeVariantRow(this)">
                    <i class="fas fa-trash"></i>
                </button>
            `;

                container.appendChild(variantRow);

                // Populate selects
                populateVariantSelects(variantRow);
            }

            // Xóa dòng biến thể (có xác nhận)
            async function removeVariantRow(button) {
                const container = document.getElementById('variantContainer');
                if (container.children.length > 1) {
                    const variantRow = button.closest('.variant-row');
                    const variantId = variantRow.querySelector('.variant-id').value;

                    const confirmed = await showConfirmPopup({
                        title: 'Xác nhận xóa biến thể',
                        message: 'Bạn có chắc chắn muốn xóa biến thể này? Hành động này không thể hoàn tác.',
                        confirmText: 'Xóa',
                        cancelText: 'Hủy',
                        tone: 'danger'
                    });
                    if (!confirmed) return;

                    // Nếu là variant cũ (có ID), xóa từ API
                    if (variantId) {
                        fetch(`${API_URL}/san-pham-chi-tiet/${variantId}`, {
                            method: 'DELETE'
                        }).then(res => {
                            if (!res.ok) {
                                return res.text().then(text => { throw new Error(text || 'Lỗi xóa biến thể'); });
                            }
                            // Remove from DOM only when API delete succeeded
                            variantRow.remove();
                            showToast('Đã xóa biến thể thành công.', 'success');
                        }).catch(error => {
                            console.error('Lỗi xóa biến thể:', error);
                            showToast('Xảy ra lỗi khi xóa biến thể: ' + (error.message || error), 'error');
                        });
                    } else {
                        // Nếu là variant mới (chưa lưu), chỉ remove DOM
                        variantRow.remove();
                    }
                } else {
                    showToast('Phải có ít nhất 1 biến thể!', 'warning');
                }
            }

            // Populate variant selects
            function populateVariantSelects(variantRow) {
                // Màu sắc
                const mauSacSelect = variantRow.querySelector('.variant-mauSac');
                const kichThuocSelect = variantRow.querySelector('.variant-kichThuoc');
                const chatLieuSelect = variantRow.querySelector('.variant-chatLieuDay');

                // Load data từ API
                return Promise.all([
                    fetch(`${API_URL}/mau-sac`).then(r => r.json()),
                    fetch(`${API_URL}/kich-thuoc`).then(r => r.json()),
                    fetch(`${API_URL}/chat-lieu-day`).then(r => r.json())
                ]).then(([mauSacs, kichThuocs, chatLieus]) => {
                    mauSacs.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.id;
                        option.textContent = item.tenMauSac;
                        mauSacSelect.appendChild(option);
                    });

                    kichThuocs.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.id;
                        option.textContent = item.tenKichThuoc;
                        kichThuocSelect.appendChild(option);
                    });

                    chatLieus.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.id;
                        option.textContent = item.tenChatLieu;
                        chatLieuSelect.appendChild(option);
                    });
                }).catch(error => console.error('Lỗi load dữ liệu:', error));
            }

            // Lắng nghe sự kiện thay đổi file input
            document.getElementById('hinhAnhFile').addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        const preview = document.getElementById('previewImage');
                        const container = document.getElementById('previewContainer');
                        preview.src = event.target.result;
                        container.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            });


            function formatPrice(price) {
                if (!price) return '0₫';
                return parseFloat(price).toLocaleString('vi-VN') + '₫';
            }

            // Tải danh sách sản phẩm (phân trang 5/trang, tìm kiếm, lọc trạng thái)
            async function loadProducts(page) {
                if (page === undefined) page = currentPage;
                currentPage = page;

                const keyword = document.getElementById('searchKeyword').value.trim();
                const trangThaiEl = document.getElementById('filterTrangThai');
                const trangThai = trangThaiEl.value === '' ? null : (trangThaiEl.value === 'true');

                const params = new URLSearchParams();
                if (keyword) params.set('keyword', keyword);
                if (trangThai !== null) params.set('trangThai', trangThai);
                params.set('page', page);
                params.set('size', PAGE_SIZE);

                const tbody = document.getElementById('productTableBody');
                tbody.innerHTML = '<tr><td colspan="8" class="loading"><div class="spinner"></div>Đang tải dữ liệu...</td></tr>';

                try {
                    const response = await fetch(`${API_URL}/san-pham/search?${params}`);
                    if (!response.ok) throw new Error('Lỗi tải dữ liệu');
                    const data = await response.json();
                    const products = data.content || [];
                    totalPages = data.totalPages ?? 0;
                    totalElements = data.totalElements ?? 0;

                    if (products.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="8" class="loading">Không có dữ liệu</td></tr>';
                        renderPagination();
                        return;
                    }

                    // Tạo HTML cho từng sản phẩm (có fetch chi tiết biến thể)
                    let htmlRows = '';

                    for (const product of products) {
                        const imgHtml = product.hinhAnh ?
                            `<img src="${product.hinhAnh}" alt="Ảnh" class="product-image">` :
                            '<span style="color: #999;">Không có ảnh</span>';

                        // Lấy giá bán và số lượng từ chi tiết sản phẩm, đồng thời chuẩn bị HTML cho các biến thể
                        let giaBan = 'N/A';
                        let soLuongTon = 0;
                        let variantDetails = [];

                        try {
                            const detailResponse = await fetch(`${API_URL}/san-pham-chi-tiet/san-pham/${product.id}`);
                            if (detailResponse.ok) {
                                variantDetails = await detailResponse.json();
                                if (variantDetails && variantDetails.length > 0) {
                                    // Tính tổng số lượng từ tất cả các variant; giá: khoảng min–max
                                    let totalSoLuong = 0;
                                    const giaValues = [];

                                    variantDetails.forEach(detail => {
                                        totalSoLuong += detail.soLuongTon || 0;
                                        if (detail.giaBan != null && detail.giaBan !== '') {
                                            const g = parseFloat(detail.giaBan);
                                            if (!isNaN(g) && g >= 0) {
                                                giaValues.push(g);
                                            }
                                        }
                                    });

                                    if (giaValues.length > 0) {
                                        const minGia = Math.min(...giaValues);
                                        const maxGia = Math.max(...giaValues);
                                        giaBan = minGia === maxGia
                                            ? formatPrice(minGia)
                                            : `${formatPrice(minGia)} – ${formatPrice(maxGia)}`;
                                    }
                                    soLuongTon = totalSoLuong;
                                }
                            }
                        } catch (error) {
                            console.warn(`Lỗi khi tải chi tiết sản phẩm ${product.id}:`, error);
                        }

                        const statusBadge = product.trangThai ?
                            '<span class="status-badge status-active"><i class="fas fa-check-circle"></i> Hoạt động</span>' :
                            '<span class="status-badge status-inactive"><i class="fas fa-times-circle"></i> Không hoạt động</span>';

                        // Tạo HTML cho các biến thể hiển thị dưới mỗi sản phẩm
                        let variantListHtml = '';
                        if (variantDetails && variantDetails.length > 0) {
                            variantListHtml = '<div class="variant-list">' + variantDetails.map(detail => {
                                const color = getMauSacName(detail.idMauSac);
                                const size = getKichThuocName(detail.idKichThuoc);
                                const material = getChatLieuDayName(detail.idChatLieuDay);
                                const machine = getLoaiMayName(product.idLoaiMay);
                                const price = detail.giaBan ? formatPrice(detail.giaBan) : '0₫';
                                const qty = detail.soLuongTon || 0;

                                let detailsHtml = `
                                <div class="variant-item">
                                    <div class="variant-name">
                                        <span>${color}</span>
                                        <span>${size}</span>
                                    </div>
                                    <div class="variant-details">
                                        <div class="detail-row">
                                            <span class="label">Chất liệu:</span>
                                            <span class="value">${material}</span>
                                        </div>
                                        <div class="detail-row">
                                            <span class="label">Loại máy:</span>
                                            <span class="value">${machine}</span>
                                        </div>
                            `;

                                if (detail.duongKinh) {
                                    detailsHtml += `
                                        <div class="detail-row">
                                            <span class="label">Đường kính:</span>
                                            <span class="value">${detail.duongKinh}mm</span>
                                        </div>
                                `;
                                }
                                if (detail.doChiuNuoc) {
                                    detailsHtml += `
                                        <div class="detail-row">
                                            <span class="label">Chịu nước:</span>
                                            <span class="value">${detail.doChiuNuoc}m</span>
                                        </div>
                                `;
                                }
                                if (detail.beRongDay) {
                                    detailsHtml += `
                                        <div class="detail-row">
                                            <span class="label">Rộng dây:</span>
                                            <span class="value">${detail.beRongDay}mm</span>
                                        </div>
                                `;
                                }
                                if (detail.trongLuong) {
                                    detailsHtml += `
                                        <div class="detail-row">
                                            <span class="label">Trọng lượng:</span>
                                            <span class="value">${detail.trongLuong}g</span>
                                        </div>
                                `;
                                }

                                detailsHtml += `
                                    </div>
                                    <div class="variant-price">
                                        ${price} · <span class="muted">SL: ${qty}</span>
                                    </div>
                                    <div class="variant-status">
                                        <span class="status-label">Trạng thái:</span>
                                        <label class="toggle-switch-small" title="Bật/tắt biến thể">
                                            <input type="checkbox" ${detail.trangThai ? 'checked' : ''} onchange="toggleVariantStatus(${detail.id}, this)">
                                            <span class="slider-small"></span>
                                        </label>
                                    </div>
                                </div>
                            `;
                                return detailsHtml;
                            }).join('') + '</div>';
                        } else {
                            variantListHtml = '<div class="variant-list"><div class="variant-item"><span class="muted">Không có biến thể nào</span></div></div>';
                        }

                        htmlRows += `
                        <tr class="product-main-row">
                            <td><strong>${product.id}</strong></td>
                            <td><code>${product.maSanPham}</code></td>
                            <td>${imgHtml}</td>
                            <td>${product.tenSanPham}</td>
                            <td class="price-highlight">${giaBan}</td>
                            <td><strong>${soLuongTon}</strong></td>
                            <td>${statusBadge}</td>
                            <td>
                                <div class="actions">
                                    <button class="btn btn--secondary" onclick="editProduct(${product.id})">

                const from = currentPage * PAGE_SIZE + 1;

            // Tạo unique key cho biến thể (dùng để kiểm tra trùng)
            function getVariantKey(row) {
                const mauSac = row.querySelector('.variant-mauSac').value;
                const kichThuoc = row.querySelector('.variant-kichThuoc').value;
                const chatLieuDay = row.querySelector('.variant-chatLieuDay').value;
                return `${mauSac}|${kichThuoc}|${chatLieuDay}`;
            }

            // Kiểm tra trùng lặp biến thể
            function checkDuplicateVariants() {
                const variantRows = document.querySelectorAll('.variant-row');
                const keys = new Set();
                const duplicates = [];

                variantRows.forEach((row, index) => {
                    const key = getVariantKey(row);

                    // Bỏ qua variant trống (tất cả select đều trống)
                    if (key === '||' || key === '|') {
                        return;
                    }

                    if (keys.has(key)) {
                        duplicates.push(index);
                    } else {
                        keys.add(key);
                    }
                });

                return duplicates;
            }

            function validateVariantNumbers() {
                const variantRows = document.querySelectorAll('.variant-row');
                const labels = { giaBan: 'Giá bán', soLuongTon: 'Số lượng tồn', duongKinh: 'Đường kính', doChiuNuoc: 'Độ chịu nước', beRongDay: 'Bề rộng dây', trongLuong: 'Trọng lượng' };
                for (let i = 0; i < variantRows.length; i++) {
                    const row = variantRows[i];
                    const giaBan = parseFloat(row.querySelector('.variant-giaBan').value);
                    const soLuongTon = parseInt(row.querySelector('.variant-soLuongTon').value, 10);
                    const duongKinh = row.querySelector('.variant-duongKinh').value.trim();
                    const doChiuNuoc = row.querySelector('.variant-doChiuNuoc').value.trim();
                    const beRongDay = row.querySelector('.variant-beRongDay').value.trim();
                    const trongLuong = row.querySelector('.variant-trongLuong').value.trim();
                    if (isNaN(giaBan) || giaBan < 0) return `Biến thể ${i + 1}: ${labels.giaBan} phải là số không âm.`;
                    if (isNaN(soLuongTon) || soLuongTon < 0) return `Biến thể ${i + 1}: ${labels.soLuongTon} phải là số nguyên không âm.`;
                    if (duongKinh !== '' && (isNaN(parseFloat(duongKinh)) || parseFloat(duongKinh) < 0)) return `Biến thể ${i + 1}: ${labels.duongKinh} phải không âm.`;
                    if (doChiuNuoc !== '' && (isNaN(parseInt(doChiuNuoc, 10)) || parseInt(doChiuNuoc, 10) < 0)) return `Biến thể ${i + 1}: ${labels.doChiuNuoc} phải không âm.`;
                    if (beRongDay !== '' && (isNaN(parseFloat(beRongDay)) || parseFloat(beRongDay) < 0)) return `Biến thể ${i + 1}: ${labels.beRongDay} phải không âm.`;
                    if (trongLuong !== '' && (isNaN(parseFloat(trongLuong)) || parseFloat(trongLuong) < 0)) return `Biến thể ${i + 1}: ${labels.trongLuong} phải không âm.`;
                }
                return null;
            }

            // Khởi tạo khi trang load
            window.addEventListener('DOMContentLoaded', function () {
                loadAttributeCache().then(() => {
                    loadProducts(0);
                });
                loadThuongHieu();
                loadDanhMuc();
                loadMauSac();
                loadKichThuoc();
                loadChatLieuDay();
                loadLoaiMay();

                // Event listeners cho search và filter
                document.getElementById('btnSearch').addEventListener('click', function (e) {
                    e.preventDefault();
                    applySearch();
                });
                document.getElementById('btnClearSearch').addEventListener('click', function (e) {
                    e.preventDefault();
                    resetSearch();
                });
                document.getElementById('filterTrangThai').addEventListener('change', function (e) {
                    e.preventDefault();
                    applySearch();
                });
                document.getElementById('searchKeyword').addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') { e.preventDefault(); applySearch(); }
                });
            });

            // Load Màu sắc
            async function loadMauSac() {
                try {
                    const response = await fetch(`${API_URL}/mau-sac`);
                    const data = await response.json();
                    const select = document.getElementById('idMauSac');
                    select.innerHTML = '<option value="">-- Chọn màu sắc --</option>';
                    data.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.id;
                        option.textContent = item.tenMauSac;
                        select.appendChild(option);
                    });
                } catch (error) {
                    console.error('Lỗi load màu sắc:', error);
                }
            }
