            // Submit form (Thêm/Sửa)
            function saveProduct() {
                document.getElementById('sanPhamForm').dispatchEvent(new Event('submit'));
            }

            // Kiểm tra mã sản phẩm trùng (khi thêm mới)
            async function checkMaSanPhamTrung(ma) {
                if (!ma || !ma.trim()) return false;
                const res = await fetch(`${API_URL}/san-pham/check-ma?ma=${encodeURIComponent(ma.trim())}`);
                if (!res.ok) return false;
                return await res.json();
            }

            document.getElementById('sanPhamForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                // Kiểm tra trùng lặp biến thể
                const duplicateIndices = checkDuplicateVariants();
                if (duplicateIndices.length > 0) {

                    showToast(`Các biến thể sau có cùng kết hợp Màu sắc + Kích thước + Chất liệu dây: Hàng ${duplicateIndices.map(i => i + 1).join(', ')}. Vui lòng sửa lại trước khi lưu.`, 'error', 'Lỗi: Biến thể bị trùng lặp!');
                    return;
                }

                // Validate cấu trúc và dữ liệu biến thể trước khi upload/lưu
                const structureErrors = validateVariantStructure();
                if (structureErrors.length > 0) {
                    showToast(structureErrors[0], 'error', 'Lỗi dữ liệu biến thể');
                    return;
                }

                // Validate các trường số biến thể không được nhỏ hơn 0
                const variantError = validateVariantNumbers();
                if (variantError) {
                    showToast(variantError, 'error', 'Lỗi dữ liệu');
                    return;
                }

                const serialErrors = validateVariantSerialPayload();
                if (serialErrors.length > 0) {
                    showToast(serialErrors[0], 'error', 'Lỗi serial');
                    return;
                }

                const id = document.getElementById('productId').value;
                const fileInput = document.getElementById('hinhAnhFile');

                // Nếu có file ảnh được chọn, upload riêng trước
                let hinhAnh = document.getElementById('hinhAnh').value;

                if (fileInput.files.length > 0) {
                    const formData = new FormData();
                    formData.append('file', fileInput.files[0]);

                    try {
                        let uploadEndpoint = `${API_URL}/san-pham/upload`;
                        let uploadMethod = 'POST';

                        // Nếu đang sửa, upload ảnh sẽ tự động xóa ảnh cũ
                        if (isEditing && id) {
                            uploadEndpoint = `${API_URL}/san-pham/${id}/upload`;
                            uploadMethod = 'PUT';
                        }

                        const uploadResponse = await fetch(uploadEndpoint, {
                            method: uploadMethod,
                            body: formData
                        });

                        if (!uploadResponse.ok) {
                            const error = await uploadResponse.text();
                            showToast('Lỗi upload ảnh: ' + error, 'error');
                            return;
                        }

                        const uploadData = await uploadResponse.json();
                        // Lấy filePath từ response
                        hinhAnh = uploadData.filePath || uploadData.hinhAnh;
                    } catch (error) {
                        console.error('Lỗi upload ảnh:', error);
                        showToast('Lỗi upload ảnh: ' + error.message, 'error');
                        return;
                    }
                }

                const data = {
                    maSanPham: document.getElementById('maSanPham').value,
                    tenSanPham: document.getElementById('tenSanPham').value,
                    moTa: document.getElementById('moTa').value,
                    hinhAnh: hinhAnh,
                    idThuongHieu: parseInt(document.getElementById('idThuongHieu').value),
                    idDanhMuc: parseInt(document.getElementById('idDanhMuc').value),
                    idLoaiMay: parseInt(document.getElementById('idLoaiMay').value) || null,
                    phongCach: document.getElementById('phongCach').value,
                    trangThai: document.querySelector('input[name="trangThai"]:checked').value === 'true',
                    ...buildSanPhamKmPayload()
                };

                try {
                    const saveConfirmed = await showConfirmPopup({
                        title: isEditing ? 'Xác nhận cập nhật sản phẩm' : 'Xác nhận thêm sản phẩm',
                        message: isEditing
                            ? 'Bạn có chắc chắn muốn lưu thay đổi cho sản phẩm này?'
                            : 'Bạn có chắc chắn muốn thêm sản phẩm mới này?',
                        confirmText: isEditing ? 'Cập nhật' : 'Thêm mới',
                        cancelText: 'Hủy',
                        tone: 'info'
                    });
                    if (!saveConfirmed) return;

                    let response;
                    let productId = id;

                    if (isEditing && id) {
                        // Cập nhật sản phẩm
                        response = await fetch(`${API_URL}/san-pham/${id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });
                    } else {
                        // Thêm mới sản phẩm
                        response = await fetch(`${API_URL}/san-pham`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });

                        if (response.ok) {
                            const newProduct = await response.json();
                            productId = newProduct.id;
                        }
                    }

                    if (!response.ok) {
                        const error = await response.text();
                        showToast('Lỗi lưu sản phẩm: ' + error, 'error', isEditing ? 'Cập nhật thất bại' : 'Thêm thất bại');
                        return;
                    }

                    // Lưu các biến thể
                    let hasVariantSaveError = false;
                    let variantSaveErrorMessage = '';

                    // Xử lý xóa các variant đang chờ (nếu có)
                    if (deletedVariantIds.size > 0 && isEditing) {
                        const deletePromises = [];
                        const failedDeletions = [];
                        for (const variantIdToDelete of deletedVariantIds) {
                            deletePromises.push(
                                fetch(`${API_URL}/san-pham-chi-tiet/${variantIdToDelete}`, {
                                    method: 'DELETE'
                                }).then(res => {
                                    if (!res.ok) {
                                        failedDeletions.push(variantIdToDelete);
                                        return false;
                                    }
                                    return true;
                                }).catch(error => {
                                    failedDeletions.push(variantIdToDelete);
                                    return false;
                                })
                            );
                        }
                        // Đợi tất cả các request xóa hoàn tất
                        await Promise.all(deletePromises);
                        
                        // Xóa khỏi Set những variant xóa thành công
                        for (const failedId of failedDeletions) {
                            deletedVariantIds.delete(failedId);
                        }
                        
                        if (failedDeletions.length > 0) {
                            showToast(`Không thể xóa ${failedDeletions.length} biến thể. Có thể sản phẩm đang được đặt hàng.`, 'error');
                        }
                    }

                    const variantRows = document.querySelectorAll('.variant-row');
                    for (const variantRow of variantRows) {
                        const variantId = variantRow.querySelector('.variant-id').value;
                        const fileInput = variantRow.querySelector('.variant-serial-file');
                        const hasFile = fileInput && fileInput.files && fileInput.files.length > 0;

                        if (hasFile) {
                            const mauSac = getVariantValue(variantRow, '.variant-mauSac');
                            const kichThuoc = getVariantValue(variantRow, '.variant-kichThuoc');
                            const chatLieuDay = getVariantValue(variantRow, '.variant-chatLieuDay');
                            const duongKinh = getVariantValue(variantRow, '.variant-duongKinh');
                            const doChiuNuoc = getVariantValue(variantRow, '.variant-doChiuNuoc');
                            const beRongDay = getVariantValue(variantRow, '.variant-beRongDay');
                            const trongLuong = getVariantValue(variantRow, '.variant-trongLuong');
                            const trangThaiChecked = variantRow.querySelector('input[name^="trangThaiChiTiet"]:checked');

                            if (variantId) {
                                // 1. Update variant cũ trước (không cần soLuongTon vì sẽ cập nhật từ serial)
                                const updateResponse = await fetch(`${API_URL}/san-pham-chi-tiet/${variantId}`, {
                                    method: 'PUT',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        idSanPham: parseInt(productId),
                                        idMauSac: parseInt(mauSac) || null,
                                        idKichThuoc: parseInt(kichThuoc) || null,
                                        idChatLieuDay: parseInt(chatLieuDay) || null,
                                        giaBan: parseFloat(getVariantValue(variantRow, '.variant-giaBan', '0')),
                                        duongKinh: parseFloat(duongKinh) || null,
                                        doChiuNuoc: parseInt(doChiuNuoc) || null,
                                        beRongDay: parseFloat(beRongDay) || null,
                                        trongLuong: parseFloat(trongLuong) || null,
                                        trangThai: trangThaiChecked ? (trangThaiChecked.value === 'true') : true
                                    })
                                });

                                if (!updateResponse.ok) {
                                    const err = await updateResponse.text();
                                    hasVariantSaveError = true;
                                    variantSaveErrorMessage = 'Lỗi cập nhật biến thể: ' + err;
                                    break;
                                }

                                // 2. Import serial từ file Excel
                                const serialFormData = new FormData();
                                serialFormData.append('idSanPhamChiTiet', variantId);
                                serialFormData.append('file', fileInput.files[0]);

                                const serialResponse = await fetch(`${API_URL}/san-pham-chi-tiet/serial/import`, {
                                    method: 'POST',
                                    body: serialFormData
                                });

                                const serialResult = await serialResponse.json();
                                if (serialResult.success) {
                                    showToast(`Đã import ${serialResult.successCount} serial cho biến thể`, 'success');
                                } else if (serialResult.errorSerials && serialResult.errorSerials.length > 0) {
                                    hasVariantSaveError = true;
                                    variantSaveErrorMessage = `Import ${serialResult.successCount} serial thành công, ${serialResult.errorCount} lỗi`;
                                    break;
                                } else {
                                    hasVariantSaveError = true;
                                    variantSaveErrorMessage = 'Lỗi import serial cho biến thể.';
                                    break;
                                }
                            } else {
                                // Thêm variant mới với file Excel
                                const formData = new FormData();
                                formData.append('idSanPham', productId);
                                if (mauSac) formData.append('idMauSac', mauSac);
                                if (kichThuoc) formData.append('idKichThuoc', kichThuoc);
                                if (chatLieuDay) formData.append('idChatLieuDay', chatLieuDay);
                                formData.append('giaBan', getVariantValue(variantRow, '.variant-giaBan', '0'));
                                formData.append('soLuongTon', getVariantValue(variantRow, '.variant-soLuongTon', '0'));
                                formData.append('trangThai', trangThaiChecked ? (trangThaiChecked.value === 'true') : true);
                                formData.append('file', fileInput.files[0]);
                                if (duongKinh) formData.append('duongKinh', duongKinh);
                                if (doChiuNuoc) formData.append('doChiuNuoc', doChiuNuoc);
                                if (beRongDay) formData.append('beRongDay', beRongDay);
                                if (trongLuong) formData.append('trongLuong', trongLuong);

                                const variantResponse = await fetch(`${API_URL}/san-pham-chi-tiet/create-with-excel`, {
                                    method: 'POST',
                                    body: formData
                                });

                                if (!variantResponse.ok) {
                                    const error = await variantResponse.text();
                                    hasVariantSaveError = true;
                                    variantSaveErrorMessage = 'Lỗi lưu biến thể: ' + error;
                                    break;
                                } else {
                                    // Lấy variantId từ response để cập nhật vào DOM
                                    const variantResult = await variantResponse.json();
                                    if (variantResult.id) {
                                        variantRow.querySelector('.variant-id').value = variantResult.id;
                                        showToast(`Đã thêm biến thể với ${variantResult.soLuongSerial || 0} serial`, 'success');
                                    }
                                }
                            }
                        } else {
                            // Gửi JSON không có file (như cũ)
                            const variantData = {
                                idSanPham: parseInt(productId),
                                idMauSac: parseInt(getVariantValue(variantRow, '.variant-mauSac')) || null,
                                idKichThuoc: parseInt(getVariantValue(variantRow, '.variant-kichThuoc')) || null,
                                idChatLieuDay: parseInt(getVariantValue(variantRow, '.variant-chatLieuDay')) || null,
                                giaBan: parseFloat(getVariantValue(variantRow, '.variant-giaBan', '0')),
                                soLuongTon: parseInt(getVariantValue(variantRow, '.variant-soLuongTon', '0')),
                                duongKinh: parseFloat(getVariantValue(variantRow, '.variant-duongKinh')) || null,
                                doChiuNuoc: parseInt(getVariantValue(variantRow, '.variant-doChiuNuoc')) || null,
                                beRongDay: parseFloat(getVariantValue(variantRow, '.variant-beRongDay')) || null,
                                trongLuong: parseFloat(getVariantValue(variantRow, '.variant-trongLuong')) || null,
                                trangThai: (() => {
                                    const checked = variantRow.querySelector('input[name^="trangThaiChiTiet"]:checked');
                                    return checked ? checked.value === 'true' : true;
                                })()
                            };

                            let variantResponse;
                            if (variantId) {
                                // Update variant cũ
                                variantResponse = await fetch(`${API_URL}/san-pham-chi-tiet/${variantId}`, {
                                    method: 'PUT',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify(variantData)
                                });
                            } else {
                                // Thêm variant mới
                                variantResponse = await fetch(`${API_URL}/san-pham-chi-tiet`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify(variantData)
                                });
                            }

                            if (!variantResponse.ok) {
                                const error = await variantResponse.text();
                                hasVariantSaveError = true;
                                variantSaveErrorMessage = 'Lỗi lưu biến thể: ' + error;
                                break;
                            }
                        }
                    }

                    if (hasVariantSaveError) {
                        showToast(variantSaveErrorMessage || 'Có lỗi xảy ra khi lưu biến thể. Vui lòng thử lại.', 'error', isEditing ? 'Cập nhật thất bại' : 'Thêm thất bại');
                        return;
                    }

                    showToast(isEditing ? 'Cập nhật sản phẩm thành công!' : 'Thêm sản phẩm thành công!', 'success', isEditing ? 'Cập nhật thành công' : 'Thêm thành công');
                    closeModal();
                    // Sau khi thêm mới, reset filter trạng thái về tất cả và load trang 1
                    if (!isEditing) {
                        document.getElementById('filterTrangThai').value = '';
                        loadProducts(0);
                    } else {
                        loadProducts(undefined);
                    }
                } catch (error) {
                    console.error('Lỗi:', error);
                    showToast('Có lỗi xảy ra! Vui lòng thử lại.', 'error', isEditing ? 'Cập nhật thất bại' : 'Thêm thất bại');
                }
            });

            // Xem chi tiết sản phẩm
            function viewDetail(id) {
                window.location.href = `sanpham-chi-tiet.html?id=${id}`;
            }

                                </div>
                            </div>

                            <button type="button" class="variant-remove" onclick="removeVariantRow(this)">
                                <i class="fas fa-trash"></i>
                            </button>
                        `;

                            variantContainer.appendChild(variantRow);

                            // Populate selects và chờ xong rồi mới set value
                            await populateVariantSelects(variantRow);

                            // Set ID variant
                            variantRow.querySelector('.variant-id').value = variant.id || '';

                            // Set dữ liệu variant
                            variantRow.querySelector('.variant-mauSac').value = variant.idMauSac || '';
                            variantRow.querySelector('.variant-kichThuoc').value = variant.idKichThuoc || '';
                            variantRow.querySelector('.variant-chatLieuDay').value = variant.idChatLieuDay || '';
                            variantRow.querySelector('.variant-giaBan').value = variant.giaBan || '';
                            variantRow.querySelector('.variant-soLuongTon').value = variant.soLuongTon || '';
                            variantRow.querySelector('.variant-duongKinh').value = variant.duongKinh || '';
                            variantRow.querySelector('.variant-doChiuNuoc').value = variant.doChiuNuoc || '';
                            variantRow.querySelector('.variant-beRongDay').value = variant.beRongDay || '';
                            variantRow.querySelector('.variant-trongLuong').value = variant.trongLuong || '';
                            const serialPreview = variantRow.querySelector('.variant-serial-preview');
                            if (serialPreview) {
                                if (variant.serials && variant.serials.length) {
                                    serialPreview.textContent = `${variant.soLuongSerialTrongKho || 0} serial trong kho: ${variant.serials.join(' || ')}`;
                                } else {
                                    serialPreview.textContent = 'Chưa có serial.';
                                }
                            }

                            // Set trạng thái
                            const statusRadios = variantRow.querySelectorAll(`input[name="trangThaiChiTiet-${variantIndex}"]`);
                            statusRadios.forEach(radio => {
                                radio.checked = radio.value === variant.trangThai.toString();
                            });
                        }
                    } else {
                        // Thêm 1 dòng variant mặc định nếu không có
                        addVariantRow();
                    }

                    if (!document.querySelectorAll('.variant-row').length) {
                        addVariantRow();
                    }

                    document.getElementById('modalTitle').innerText = 'Cập nhật sản phẩm';
                    isEditing = true;

                    document.getElementById('productModal').classList.add('show');
                } catch (error) {
                    console.error('Lỗi:', error);
                    showToast('Không thể tải thông tin sản phẩm.', 'error');
                }
            }

            // Xóa sản phẩm
            async function deleteProduct(id) {
                const confirmed = await showConfirmPopup({
                    title: 'Xác nhận xóa sản phẩm',
                    message: 'Bạn có chắc chắn muốn xóa sản phẩm này? Hành động này không thể hoàn tác.',
                    confirmText: 'Xóa',
                    cancelText: 'Hủy',
                    tone: 'danger'
                });
                if (!confirmed) {
                    return;
                }

                try {
                    const response = await fetch(`${API_URL}/san-pham/${id}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        showToast('Xóa thành công!', 'success');
                        loadProducts();
                    } else {
                        const error = await response.text();
                        showToast('Lỗi: ' + error, 'error');
                    }
                } catch (error) {
                    console.error('Lỗi:', error);
                    showToast('Có lỗi xảy ra khi xóa!', 'error');
                }
            }

            // Chuyển trạng thái sản phẩm nhanh (toggle)
            async function toggleProductStatus(id, checkbox) {
                try {
                    // Disable checkbox trong khi xử lý
                    checkbox.disabled = true;

                    // Lấy thông tin sản phẩm hiện tại
                    const r = await fetch(`${API_URL}/san-pham/${id}`);
                    if (!r.ok) {
                        const txt = await r.text();
                        checkbox.disabled = false;
                        checkbox.checked = !checkbox.checked; // Revert toggle
                        showToast('Không thể tải sản phẩm: ' + txt, 'error');
                        return;
                    }

                    const product = await r.json();
                    // Đảo trạng thái
                    product.trangThai = !product.trangThai;

                    // Gửi PUT cập nhật toàn bộ đối tượng
                    const putRes = await fetch(`${API_URL}/san-pham/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(product)
                    });

                    if (putRes.ok) {
                        // Reload bảng để cập nhật badge
                        loadProducts();
                    } else {
                        const error = await putRes.text();
                        checkbox.disabled = false;
                        checkbox.checked = !checkbox.checked; // Revert toggle
                        showToast('Không thể thay đổi trạng thái: ' + error, 'error');
                    }
                } catch (error) {
                    console.error('Lỗi khi đổi trạng thái:', error);
                    checkbox.disabled = false;
                    checkbox.checked = !checkbox.checked; // Revert toggle
                    showToast('Có lỗi xảy ra khi thay đổi trạng thái sản phẩm.', 'error');
                }
            }

            // Toggle trạng thái biến thể
            async function toggleVariantStatus(variantId, checkbox) {
                try {
                    checkbox.disabled = true;

                    // Lấy thông tin biến thể hiện tại
                    const r = await fetch(`${API_URL}/san-pham-chi-tiet/${variantId}`);
                    if (!r.ok) {
                        const txt = await r.text();
                        checkbox.disabled = false;
                        checkbox.checked = !checkbox.checked;
                        showToast('Không thể tải biến thể: ' + txt, 'error');
                        return;
                    }

                    const variant = await r.json();
                    variant.trangThai = !variant.trangThai;

                    // Gửi PUT cập nhật
                    const putRes = await fetch(`${API_URL}/san-pham-chi-tiet/${variantId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(variant)
                    });

                    if (putRes.ok) {
                        // Reload bảng để cập nhật
                        loadProducts();
                    } else {
                        const error = await putRes.text();
                        checkbox.disabled = false;
                        checkbox.checked = !checkbox.checked;
                        showToast('Không thể thay đổi trạng thái biến thể: ' + error, 'error');
                    }
                } catch (error) {
                    console.error('Lỗi khi đổi trạng thái biến thể:', error);
                    checkbox.disabled = false;
                    checkbox.checked = !checkbox.checked;
                    showToast('Có lỗi xảy ra khi thay đổi trạng thái biến thể.', 'error');
                }
            }

            // Tạo unique key cho biến thể (dùng để kiểm tra trùng)
            function getVariantKey(row) {
                const mauSac = row.querySelector('.variant-mauSac').value;
                const kichThuoc = row.querySelector('.variant-kichThuoc').value;
                const chatLieuDay = row.querySelector('.variant-chatLieuDay').value;
                return `${mauSac}|${kichThuoc}|${chatLieuDay}`;
            }

            // Kiểm tra trùng lặp biến thể
            function checkDuplicateVariants() {
                const variantRows = document.querySelectorAll('.variant-row');
                const keys = new Set();
                const duplicates = [];

                variantRows.forEach((row, index) => {
                    const key = getVariantKey(row);

                    // Bỏ qua variant trống (tất cả select đều trống)
                    if (key === '||' || key === '|') {
                        return;
                    }

                    if (keys.has(key)) {
                        duplicates.push(index);
                    } else {
                        keys.add(key);
                    }
                });

                return duplicates;
            }

            // Validate các trường số biến thể >= 0
            function validateVariantNumbers() {
                const variantRows = document.querySelectorAll('.variant-row');
                const labels = { giaBan: 'Giá bán', soLuongTon: 'Số lượng tồn', duongKinh: 'Đường kính', doChiuNuoc: 'Độ chịu nước', beRongDay: 'Bề rộng dây', trongLuong: 'Trọng lượng' };
                for (let i = 0; i < variantRows.length; i++) {
                    const row = variantRows[i];
                    const giaBan = parseFloat(row.querySelector('.variant-giaBan').value);
                    const soLuongTon = parseInt(row.querySelector('.variant-soLuongTon').value, 10);
                    const duongKinh = row.querySelector('.variant-duongKinh').value.trim();
                    const doChiuNuoc = row.querySelector('.variant-doChiuNuoc').value.trim();
                    const beRongDay = row.querySelector('.variant-beRongDay').value.trim();
                    const trongLuong = row.querySelector('.variant-trongLuong').value.trim();
                    if (isNaN(giaBan) || giaBan < 0) return `Biến thể ${i + 1}: ${labels.giaBan} phải là số không âm.`;
                    if (duongKinh !== '' && (isNaN(parseFloat(duongKinh)) || parseFloat(duongKinh) < 0)) return `Biến thể ${i + 1}: ${labels.duongKinh} phải không âm.`;
                    if (doChiuNuoc !== '' && (isNaN(parseInt(doChiuNuoc, 10)) || parseInt(doChiuNuoc, 10) < 0)) return `Biến thể ${i + 1}: ${labels.doChiuNuoc} phải không âm.`;
                    if (beRongDay !== '' && (isNaN(parseFloat(beRongDay)) || parseFloat(beRongDay) < 0)) return `Biến thể ${i + 1}: ${labels.beRongDay} phải không âm.`;
                    if (trongLuong !== '' && (isNaN(parseFloat(trongLuong)) || parseFloat(trongLuong) < 0)) return `Biến thể ${i + 1}: ${labels.trongLuong} phải không âm.`;
                }
                return null;
            }

            // Khởi tạo khi trang load
            window.addEventListener('DOMContentLoaded', function () {
                loadAttributeCache().then(() => {
                    const filterEl = document.getElementById('filterTrangThai');
                    if (filterEl && !filterEl.value) {
                        filterEl.value = 'true';
                    }
                    loadProducts(0);
                });
                loadThuongHieu();
                loadDanhMuc();
                loadMauSac();
                loadKichThuoc();
                loadChatLieuDay();
                loadLoaiMay();

                // Event listeners cho search và filter
                document.getElementById('btnSearch').addEventListener('click', function (e) {
                    e.preventDefault();
                    applySearch();
                });
                document.getElementById('filterTrangThai').addEventListener('change', function (e) {
                    e.preventDefault();
                    applySearch();
                });
                document.getElementById('searchKeyword').addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') { e.preventDefault(); applySearch(); }
                });
            });

            // Load Màu sắc
            async function loadMauSac() {
                try {
                    const response = await fetch(`${API_URL}/mau-sac`);
                    const data = await response.json();
                    const selects = document.querySelectorAll('.variant-mauSac');
                    selects.forEach(select => {
                        select.innerHTML = '<option value="">-- Chọn màu sắc --</option>';
                        data.forEach(item => {
                            const option = document.createElement('option');
                            option.value = item.id;
                            option.textContent = item.tenMauSac;
                            select.appendChild(option);
                        });
                    });
                } catch (error) {
                    console.error('Lỗi load màu sắc:', error);
                }
            }

            // Load Loại máy
            async function loadLoaiMay() {
                try {
                    const response = await fetch(`${API_URL}/loai-may`);
                    const data = await response.json();
                    const select = document.getElementById('idLoaiMay');

                } catch (error) {

                }
            }
        </script>
