<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

    <title>Quản lý Sản Phẩm - Watch Aura</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div th:fragment="content">
       
        <div id="toastContainer"
            style="position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px;">
        </div>
        <style>
            .content * { box-sizing: border-box; }

            .content .container {

                margin: 0 auto;
                padding: 0;
            }

            .content-section {
                display: grid;

            }

            .content .container {
                max-width: 1440px;
                margin: 0 auto;
                padding: 0;
            }

            .section-title {

                gap: 0.75rem;
                padding: 1rem 1.15rem;
                border-radius: 18px;
                background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(251,248,244,0.96));
                border: 1px solid #eadfce;
                box-shadow: 0 10px 24px rgba(31, 41, 55, 0.05);
                font-size: 1.02rem;
                font-weight: 700;
                color: #1f2937;
            }

            .section-title i { color: #8b6b4f; }
            .section-title .btn { margin-left: auto; }

            .toolbar.toolbar--sanpham {
                display: flex;
                align-items: end;
                justify-content: space-between;
                gap: 1rem;
                padding: 1rem 1.1rem;
                border-radius: 18px;
                background: rgba(255,255,255,0.9);
                border: 1px solid #eadfce;
                box-shadow: 0 10px 24px rgba(31, 41, 55, 0.04);
            }

            .toolbar.toolbar--sanpham {
                display: flex;
                align-items: end;
                justify-content: space-between;
                gap: 1rem;
                padding: 1rem 1.1rem;
                border-radius: 18px;
                background: rgba(255,255,255,0.9);
                border: 1px solid #eadfce;
                box-shadow: 0 10px 24px rgba(31, 41, 55, 0.04);
            }

            .search-bar, .filter-bar { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
            .search-bar { flex: 1; }
            .search-bar__input {
                min-width: min(480px, 100%);
                flex: 1;
            }
            .search-bar__input,
            .filter-bar__select {
                min-height: 46px;
                padding: 0.78rem 1rem;
                border-radius: 14px;
                border: 1px solid #e2d7c7;
                background: #fff;
            }

            .table-wrapper {
                overflow: hidden;
                border-radius: 22px;
                border: 1px solid #eadfce;
                background: rgba(255,255,255,0.94);
                box-shadow: 0 16px 36px rgba(31, 41, 55, 0.05);
            }

            .table {
                width: 100%;
                border-collapse: separate;
                border-spacing: 0;
            }

            .table thead th {
                position: sticky;
                top: 0;
                z-index: 1;
                background: linear-gradient(180deg, #faf6f1 0%, #f4ece2 100%);
                color: #4b5563;
                text-transform: uppercase;
                font-size: 0.78rem;
                letter-spacing: 0.06em;
                padding: 0.95rem 0.9rem;
                border-bottom: 1px solid #e7dccb;
            }

            .table tbody td {
                padding: 0.95rem 0.9rem;
                border-bottom: 1px solid #f1e7db;
                vertical-align: top;
                color: #1f2937;
            }

            .table tbody tr:hover { background: rgba(198, 165, 123, 0.055); }
            .table tbody tr:last-child td { border-bottom: none; }

            .product-card {
                margin-top: 0.25rem;
                border-radius: 20px;
                border: 1px solid #eadfce;
                background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(251,248,244,0.98));
                box-shadow: 0 12px 28px rgba(31, 41, 55, 0.05);
            }

            .product-meta {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 0.55rem;
            }

            .product-badge {
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                padding: 0.38rem 0.75rem;
                border-radius: 999px;
                font-size: 0.76rem;
                font-weight: 700;
                border: 1px solid transparent;
            }

            .product-badge--active { background: #ecfdf3; color: #166534; border-color: #bbf7d0; }
            .product-badge--inactive { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
            .product-badge--km { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
            .product-badge--muted { background: #f8fafc; color: #64748b; border-color: #e2e8f0; }

            .product-image {
                width: 56px;
                height: 56px;
                object-fit: cover;
                border-radius: 14px;
                border: 1px solid #e2d7c7;
                box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
                background: #fff;
            }

            .price-highlight {
                color: #8b6b4f;
                font-weight: 800;
                font-size: 15px;
                white-space: nowrap;
                vertical-align: top;
            }

            .variant-list-row td {
                padding-top: 0.25rem;
                padding-bottom: 1.1rem;
                background: transparent;
            }

            .variant-list {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 12px;
                width: 100%;
            }

            .variant-item {
                background: #fff;
                border: 1px solid #eadfce;
                border-radius: 18px;
                padding: 14px;
                box-shadow: 0 10px 20px rgba(31, 41, 55, 0.04);
                transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
            }

            .variant-item:hover {
                border-color: #d7c1a6;
                box-shadow: 0 14px 24px rgba(31, 41, 55, 0.08);
                transform: translateY(-2px);
            }

            .variant-item .variant-name { display: flex; gap: 8px; flex-wrap: wrap; font-weight: 700; color: #111827; margin-bottom: 10px; }
            .variant-item .variant-name span { background: #f7f2eb; padding: 5px 10px; border-radius: 999px; font-size: 12px; border: 1px solid #eadfce; }
            .variant-item .variant-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; color: #64748b; margin-bottom: 10px; }
            .variant-item .detail-row { display: flex; justify-content: space-between; gap: 8px; }
            .variant-item .detail-row .label { font-weight: 600; color: #475569; }
            .variant-item .detail-row .value { color: #1e293b; font-weight: 700; }
            .variant-item .variant-price { color: #8b6b4f; font-size: 14px; font-weight: 800; padding-top: 10px; border-top: 1px solid #efe4d4; }
            .variant-item .variant-status { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid #efe4d4; }

            .actions {
                display: flex;
                gap: 8px;
                flex-wrap: nowrap;
                align-items: center;
            }

            .actions .btn,
            .actions .btn-icon { border-radius: 12px; }

            .toggle-switch { transform: scale(0.95); transform-origin: center; }
            .toggle-switch-small { transform: scale(0.9); transform-origin: center; }

            .section-hint {
                margin: 0.35rem 0 0;
                font-size: 0.85rem;
                color: #64748b;
                line-height: 1.45;
                font-weight: 400;
            }

            .badge-km {
                display: inline-block;
                padding: 4px 10px;
                border-radius: 999px;
                font-size: 11px;
                font-weight: 700;
                background: #fff7ed;
                color: #9a3412;
                border: 1px solid #fed7aa;
            }

            /* Toast notification */
            .toast {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                min-width: 320px;
                max-width: 420px;
                padding: 14px 16px;
                border-radius: 12px;
                border: 1px solid;
                background: #ffffff;
                box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
                animation: toastSlideIn 0.25s ease-out;
            }

            .toast.removing {
                animation: toastSlideOut 0.25s ease-in forwards;
            }

            .toast.success {
                border-color: #86efac;
                background: #f0fdf4;
            }

            .toast.error {
                border-color: #fca5a5;
                background: #fef2f2;
            }

            .toast.warning {
                border-color: #fcd34d;
                background: #fffbeb;
            }

            .toast.info {
                border-color: #93c5fd;
                background: #eff6ff;
            }

            .toast-icon {
                width: 22px;
                font-size: 18px;
                line-height: 1.2;
                margin-top: 1px;
                flex-shrink: 0;
            }

            .toast.success .toast-icon {
                color: #15803d;
            }

            .toast.error .toast-icon {
                color: #dc2626;
            }

            .toast.warning .toast-icon {
                color: #ca8a04;
            }

            .toast.info .toast-icon {
                color: #2563eb;
            }

            .toast-content {
                flex: 1;
                min-width: 0;
            }

            .toast-title {
                margin: 0 0 4px;
                color: #0f172a;
                font-size: 14px;
                font-weight: 700;
                line-height: 1.3;
            }

            .toast-message {
                margin: 0;
                color: #334155;
                font-size: 13px;
                line-height: 1.45;
                word-wrap: break-word;
            }

            .toast-close {
                border: none;
                background: transparent;
                color: #64748b;
                font-size: 18px;
                line-height: 1;
                cursor: pointer;
                padding: 2px 4px;
                border-radius: 6px;
                flex-shrink: 0;
                transition: all 0.2s ease;
            }

            .toast-close:hover {
                background: rgba(15, 23, 42, 0.08);
                color: #0f172a;
            }

            @keyframes toastSlideIn {
                from {
                    opacity: 0;
                    transform: translateX(16px);
                }

                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }

            @keyframes toastSlideOut {
                from {
                    opacity: 1;
                    transform: translateX(0);
                }

                to {
                    opacity: 0;
                    transform: translateX(16px);
                }
            }

            @media (max-width: 576px) {
                .toast {
                    min-width: 0;
                    width: calc(100vw - 32px);
                    max-width: calc(100vw - 32px);
                }
            }

            .product-image {
                width: 50px;
                height: 50px;
                object-fit: cover;
                border-radius: 6px;
                border: 1px solid #ddd;
            }

            .status-badge {
                display: inline-block;
                padding: 6px 12px;
                border-radius: 20px;
                font-size: 12px;
                font-weight: 600;
            }

            .status-active {
                background-color: #d4edda;
                color: #155724;
            }

            .status-inactive {
                background-color: #f8d7da;
                color: #721c24;
            }

            .price-highlight {
                color: #dc3545;
                font-weight: bold;
                font-size: 15px;
                white-space: nowrap;
                vertical-align: top;
            }

            .section-hint {
                margin: 0.35rem 0 0;
                font-size: 0.85rem;
                color: #64748b;
                line-height: 1.45;
                font-weight: 400;
            }

            .badge-km {
                display: inline-block;
                padding: 4px 10px;
                border-radius: 999px;
                font-size: 11px;
                font-weight: 700;
                background: #fef3c7;
                color: #b45309;
            }

            /* Hàng chính + hàng biến thể: căn trên để không lệch khi tên dài / giá khoảng */
            #productsTable tbody tr.product-main-row td {
                vertical-align: top;
            }

            #productsTable tbody tr.variant-list-row td {
                vertical-align: top;
            }

            #productsTable thead th:nth-child(5) {
                min-width: 12rem;
            }

            .actions {
                display: flex;
                gap: 5px;
                flex-wrap: wrap;
            }

            /* Nút sửa + công tắc luôn cùng một hàng (cột THAO TÁC) */
            #productsTable .actions {
                flex-direction: row;
                flex-wrap: nowrap;
                align-items: center;
                gap: 10px;
            }

            #productsTable .actions .btn {
                flex-shrink: 0;
            }

            #productsTable .actions .toggle-switch {
                flex-shrink: 0;
            }

            #productsTable tbody tr.product-main-row td:last-child {
                white-space: nowrap;
            }

            /* Variant list under each product row */
            .variant-list-row td {
                background: linear-gradient(180deg, #fafbfc 0%, #f5f7fa 100%);
                padding: 16px 15px;
                border-top: 1px solid #e8ecf1;
                border-bottom: 1px solid #e8ecf1;
            }

            .variant-list {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 12px;
                width: 100%;
                color: #4a5568;
                font-size: 13px;
            }

            .variant-item {
                background: white;
                border: 1px solid #dce5ed;
                border-radius: 8px;
                padding: 12px;
                box-shadow: 0 1px 3px rgba(16, 24, 40, 0.08);
                transition: all 0.2s ease;
            }

            .variant-item:hover {
                /*border-color: #2c3e50;*/
                box-shadow: 0 2px 6px rgba(44, 62, 80, 0.12);
                transform: translateY(-1px);
            }

            .variant-item .variant-name {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                font-weight: 600;
                color: #1a1a1a;
                margin-bottom: 8px;
                line-height: 1.4;
            }

            .variant-item .variant-name span {
                background: #f0f4f8;
                padding: 4px 8px;
                border-radius: 4px;
                font-size: 12px;
                font-weight: 500;
            }

            .variant-item .variant-details {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                font-size: 12px;
                color: #64748b;
                margin-bottom: 8px;
            }

            .variant-item .detail-row {
                display: flex;
                justify-content: space-between;
            }

            .variant-item .detail-row .label {
                font-weight: 500;
                color: #475569;
            }

            .variant-item .detail-row .value {
                color: #1e293b;
                font-weight: 600;
            }

            .variant-item .variant-price {
                color: #dc3545;
                font-size: 14px;
                font-weight: 700;
                padding-top: 8px;
                border-top: 1px solid #e8ecf1;
            }

            .variant-item .muted {
                color: #8b8f94;
                font-size: 11px;
                display: block;
            }

            .variant-item .variant-serial {
                display: none;
                margin-top: 8px;
                font-size: 11px;
                color: #475569;
                line-height: 1.45;
                word-break: break-word;
            }

            .variant-item .variant-status {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 10px;
                padding-top: 8px;
                border-top: 1px solid #e8ecf1;
            }

            .variant-item .status-label {
                font-size: 12px;
                font-weight: 500;
                color: #475569;
            }

            .variant-item .toggle-switch-small {
                display: inline-block;
                position: relative;
                width: 44px;
                height: 24px;
            }

            .variant-item .toggle-switch-small input {
                opacity: 0;
                width: 0;
                height: 0;
            }

            .variant-item .toggle-switch-small .slider-small {
                position: absolute;
                cursor: pointer;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: #cbd5e1;
                transition: 0.4s;
                border-radius: 24px;
                border: 1px solid #b0bcc4;
            }

            .variant-item .toggle-switch-small .slider-small:before {
                position: absolute;
                content: "";
                height: 16px;
                width: 16px;
                left: 3px;
                bottom: 3px;
                background-color: white;
                transition: 0.4s;
                border-radius: 50%;
            }

            .variant-item .toggle-switch-small input:checked+.slider-small {
                background-color: #27ae60;
                border-color: #27ae60;
            }

            .variant-item .toggle-switch-small input:checked+.slider-small:before {
                transform: translateX(20px);
            }

            .variant-item .toggle-switch-small input:disabled+.slider-small {
                opacity: 0.5;
                cursor: not-allowed;
            }

            /* Form Styling */
            .form-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin-bottom: 20px;
            }

            .form-group {
                display: flex;
                flex-direction: column;
            }

            .form-group label {
                font-weight: 600;
                margin-bottom: 8px;
                color: #333;
                font-size: 14px;
            }

            .form-group input,
            .form-group textarea,
            .form-group select {
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 6px;
                font-size: 14px;
                font-family: inherit;
                transition: border-color 0.3s ease;
            }

            .form-group input:focus,
            .form-group textarea:focus,
            .form-group select:focus {
                outline: none;
                border-color: #2c3e50;
                box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.1);
            }

            .form-group textarea {
                resize: vertical;
                min-height: 80px;
            }

            .form-full {
                grid-column: 1 / -1;
            }

            .form-actions {
                display: flex;
                gap: 10px;
                margin-top: 20px;
            }

            .form-actions button {
                flex: 1;
                padding: 12px;
                border: none;
                border-radius: 6px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .form-actions .btn-submit {
                background: #2c3e50;
                color: white;
            }

            .form-actions .btn-submit:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(44, 62, 80, 0.4);
            }

            .form-actions .btn-cancel {
                background: #f0f0f0;
                color: #333;
            }

            .form-actions .btn-cancel:hover {
                background: #e0e0e0;
            }

            /* Preview Image */
            .preview-container {
                margin-top: 10px;
            }

            .preview-image {
                /*max-width: 50px;*/
                /*max-height: 100px;*/
                border-radius: 6px;
                border: 2px solid #ddd;
            }

            /* Loading State */
            .loading {
                text-align: center;
                padding: 40px;
                color: #999;
            }

            .spinner {
                border: 4px solid #f0f0f0;
                border-top: 4px solid #2c3e50;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                animation: spin 1s linear infinite;
                margin: 0 auto 20px;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }

                100% {
                    transform: rotate(360deg);
                }
            }

            /* Radio Button Styling */
            .radio-group {
                display: flex;
                gap: 20px;
                margin-top: 10px;
            }

            .radio-group label {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 0;
                font-weight: 500;
            }

            .radio-group input[type="radio"] {
                cursor: pointer;
            }

            /* Modal Styling - CSS này sẽ bị ghi đè bởi admin.css */
            .modal {
                display: none;
                position: fixed;
                z-index: 1000;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.5);
                overflow: auto;
                animation: fadeIn 0.3s ease;
            }

            .modal.show {
                display: flex;
                align-items: flex-start;
                justify-content: center;
                padding-top: 50px;
            }

            .modal-content {
                /* Container bên trong modal - không cần styling ở đây nữa vì admin.css đã xử lý */
            }

            .modal-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 25px;
                padding-bottom: 15px;
                border-bottom: 2px solid #f0f0f0;
            }

            .modal-header h2 {
                font-size: 24px;
                color: #333;
                margin: 0;
            }

            .modal-close {
                background: none;
                border: none;
                font-size: 28px;
                color: #999;
                cursor: pointer;
                transition: color 0.3s ease;
            }

            .modal-close:hover {
                color: #333;
            }

            .modal-form {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }

            .modal-form-group {
                display: flex;
                flex-direction: column;
            }

            .modal-form-group.full {
                grid-column: 1 / -1;
            }

            .modal-form-group label {
                font-weight: 600;
                margin-bottom: 8px;
                color: #333;
                font-size: 14px;
            }

            .modal-form-group input,
            .modal-form-group textarea,
            .modal-form-group select {
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 6px;
                font-size: 14px;
                font-family: inherit;
                transition: border-color 0.3s ease;

            .modal-form-group textarea:focus,
            .modal-form-group select:focus {
                outline: none;
                border-color: #2c3e50;
                box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.1);
            }

            .modal-form-group input:disabled,
            .modal-form-group select:disabled {
                background-color: #f1f5f9;
                color: #64748b;
                cursor: not-allowed;
                border-color: #e2e8f0;
            }

            .modal-form-group textarea {
                resize: vertical;
                min-height: 80px;
            }

            .preview-image-container {
                margin-top: 10px;
            }

            .preview-image-container img {
                max-width: 150px;
                max-height: 150px;
                border-radius: 6px;
                border: 2px solid #ddd;
            }

            .radio-group-modal {
                display: flex;
                gap: 20px;
                margin-top: 10px;
            }

            .radio-group-modal label {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 0;
                font-weight: 500;
                cursor: pointer;
            }

            .radio-group-modal input[type="radio"] {
                cursor: pointer;
            }

            .modal-actions {
                display: flex;
                gap: 10px;
                margin-top: 25px;
                padding-top: 20px;

        <script>
            const API_URL = '/api';
            const PAGE_SIZE = 5;

            function toDatetimeLocal(v) {
                if (v == null || v === '') return '';
                if (typeof v === 'string') {
                    return v.length >= 16 ? v.slice(0, 16) : v;
                }
                if (Array.isArray(v) && v.length >= 5) {
                    const pad = n => String(n).padStart(2, '0');
                    return v[0] + '-' + pad(v[1]) + '-' + pad(v[2]) + 'T' + pad(v[3]) + ':' + pad(v[4]);
                }
                return '';
            }

            function buildSanPhamKmPayload() {
                return {
                    loaiKhuyenMai: null,
                    giaTriKhuyenMai: null,
                    ngayBatDauKhuyenMai: null,
                    ngayKetThucKhuyenMai: null,
                    trangThaiKhuyenMai: false
                };
            }

            let isEditing = false;
            let deletedVariantIds = new Set(); // Lưu các variantId đang chờ xóa
            let currentPage = 0;
            let totalPages = 0;
            let totalElements = 0;

            // Toast notification system
            function showToast(message, type = 'info', title = '') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;

                const icons = {
                    success: '<i class="fas fa-check-circle"></i>',
                    error: '<i class="fas fa-exclamation-circle"></i>',
                    warning: '<i class="fas fa-exclamation-triangle"></i>',
                    info: '<i class="fas fa-info-circle"></i>'
                };

                const titles = {
                    success: title || 'Thành công',
                    error: title || 'Lỗi',
                    warning: title || 'Cảnh báo',
                    info: title || 'Thông tin'
                };

                toast.innerHTML = `
                    <div class="toast-icon">${icons[type] || icons.info}</div>
                    <div class="toast-content">
                        ${title ? `<p class="toast-title">${titles[type]}</p>` : ''}
                        <p class="toast-message">${message}</p>
                    </div>
                    <button class="toast-close" onclick="this.closest('.toast').remove()">&times;</button>
                `;

                container.appendChild(toast);

                // Auto remove after 2 seconds
                const autoRemoveTimer = setTimeout(() => {
                    if (toast.parentElement) {
                        toast.classList.add('removing');
                        setTimeout(() => toast.remove(), 300);
                    }
                }, 2000);

                // Clear timer if manually removed
                toast.addEventListener('click', () => clearTimeout(autoRemoveTimer));
            }

            // Confirm popup helper (fallback về confirm nếu chưa load script chung)
            async function showConfirmPopup({
                title = 'Xác nhận',
                message = 'Bạn có chắc chắn muốn thực hiện thao tác này?',
                confirmText = 'Xác nhận',
                cancelText = 'Hủy',
                tone = 'danger'
            } = {}) {
                if (typeof window.confirmModal === 'function') {
                    return await window.confirmModal({ title, message, confirmText, cancelText, tone });
                }
                return window.confirm(message);
            }

            // Bộ nhớ cache cho các danh sách attribute
            let attributeCache = {
                mauSac: [],
                kichThuoc: [],
                chatLieuDay: [],
                loaiMay: []
            };

            // Hàm để map ID sang tên
            function getMauSacName(id) {
                if (!id) return '-';
                const item = attributeCache.mauSac.find(m => m.id == id);
                return item ? item.tenMauSac : 'Màu#' + id;
            }

            function getKichThuocName(id) {
                if (!id) return '-';
                const item = attributeCache.kichThuoc.find(k => k.id == id);
                return item ? item.tenKichThuoc : 'Kích#' + id;
            }

            function getChatLieuDayName(id) {
                if (!id) return '-';
                const item = attributeCache.chatLieuDay.find(c => c.id == id);
                return item ? item.tenChatLieu : 'Chất#' + id;
            }

            function getLoaiMayName(id) {
                if (!id) return '-';
                const item = attributeCache.loaiMay.find(l => l.id == id);
                return item ? item.tenLoaiMay : 'Máy#' + id;
            }

            // Load và cache tất cả attribute
            async function loadAttributeCache() {
                try {
                    const [mauSacs, kichThuocs, chatLieus, loaiMays] = await Promise.all([
                        fetch(`${API_URL}/mau-sac`).then(r => r.json()),
                        fetch(`${API_URL}/kich-thuoc`).then(r => r.json()),
                        fetch(`${API_URL}/chat-lieu-day`).then(r => r.json()),
                        fetch(`${API_URL}/loai-may`).then(r => r.json())
                    ]);
                    attributeCache.mauSac = mauSacs;
                    attributeCache.kichThuoc = kichThuocs;
                    attributeCache.chatLieuDay = chatLieus;
                    attributeCache.loaiMay = loaiMays;
                } catch (error) {
                    console.error('Lỗi load attribute cache:', error);
                }
            }

            // Mở Modal Thêm Sản Phẩm
            async function openAddModal() {
                resetModal();
                document.getElementById('productModal').classList.add('show');
                document.getElementById('modalTitle').textContent = 'Thêm mới sản phẩm';
                isEditing = false;

                // Gọi API sinh mã tự động
                try {
                    const response = await fetch(`${API_URL}/san-pham/generate-ma`);
                    const data = await response.json();
                    if (data.maSanPham) {
                        document.getElementById('maSanPham').value = data.maSanPham;
                    }
                } catch (error) {
                    console.error('Lỗi sinh mã:', error);
                }

                document.getElementById('maSanPhamError').style.display = 'none';
            }

                document.getElementById('productModal').classList.remove('show');
                resetModal();

            //     }
            // }

                document.getElementById('variantContainer').innerHTML = '';
                document.getElementById('maSanPhamError').style.display = 'none';
                deletedVariantIds.clear(); // Reset danh sách variant đã xóa
            }

            // Thêm dòng biến thể mới
            function addVariantRow() {
                const container = document.getElementById('variantContainer');
                const variantIndex = container.children.length;

                const variantRow = document.createElement('div');
                variantRow.className = 'variant-row';
                variantRow.innerHTML = `
                <input type="hidden" class="variant-id">

                <div class="modal-form-group">
                    <label>Màu sắc</label>
                    <select class="variant-mauSac" required>
                        <option value="">-- Chọn màu sắc --</option>
                    </select>
                </div>

                <div class="modal-form-group">
                    <label>Kích thước</label>
                    <select class="variant-kichThuoc" required>
                        <option value="">-- Chọn kích thước --</option>
                    </select>
                </div>

                <div class="modal-form-group">
                    <label>Chất liệu dây</label>
                    <select class="variant-chatLieuDay" required>
                        <option value="">-- Chọn chất liệu dây --</option>
                    </select>
                </div>

                <div class="modal-form-group">
                    <label>Giá bán *</label>
                    <input type="number" class="variant-giaBan" step="0.01" min="0" required>
                </div>

                <div class="modal-form-group">
                    <label>Số lượng tồn *</label>
                    <input type="number" class="variant-soLuongTon" min="0" required disabled>
                </div>

                <div class="modal-form-group">
                    <label>Đường kính (mm)</label>
                    <input type="number" class="variant-duongKinh" step="0.01" min="0">

                <div class="modal-form-group">
                    <label>Độ chịu nước (m)</label>
                    <input type="number" class="variant-doChiuNuoc" min="0">

                </div>

                <div class="modal-form-group">
                    <label>Trọng lượng (g)</label>
                    <input type="number" class="variant-trongLuong" step="0.01" min="0">
                </div>

                <div class="modal-form-group" style="grid-column: 1 / -1;">
                    <label>Trạng thái chi tiết</label>
                    <div class="radio-group-modal">
                        <label>
                            <input type="radio" name="trangThaiChiTiet-${variantIndex}" value="true" checked> Hoạt động
                        </label>
                        <label>
                            <input type="radio" name="trangThaiChiTiet-${variantIndex}" value="false"> Không hoạt động
                        </label>
                    </div>
                </div>

                <div class="modal-form-group" style="grid-column: 1 / -1;">
                    <label>Serial sản phẩm</label>
                    <div class="serial-upload-section">
                        <div class="serial-upload-row">
                            <input type="file" class="variant-serial-file" accept=".xlsx,.xls" style="display: none;" onchange="handleSerialFileUpload(this)">
                            <button type="button" class="btn-upload-serial" onclick="this.previousElementSibling.click()">
                                <i class="fas fa-file-excel"></i> Chọn file Excel
                            </button>
                            <a href="/api/san-pham-chi-tiet/serial/template" class="btn-download-template" download>
                                <i class="fas fa-download"></i> Tải template
                            </a>
                        </div>
                        <div class="serial-preview-area">
                            <div class="serial-preview-header">
                                <span class="serial-count">Chưa chọn file</span>
                                <button type="button" class="btn-clear-serial" onclick="clearSerialFile(this)" style="display: none;">
                                    <i class="fas fa-times"></i> Xóa
                                </button>
                            </div>
                            <div class="serial-list"></div>
                        </div>
                    </div>
                </div>

                <button type="button" class="variant-remove" onclick="removeVariantRow(this)">
                    <i class="fas fa-trash"></i>
                </button>
            `;

                container.appendChild(variantRow);

                // Populate selects
                populateVariantSelects(variantRow);
            }

            // Xóa dòng biến thể (có xác nhận)
            async function removeVariantRow(button) {
                const container = document.getElementById('variantContainer');
                if (container.children.length > 1) {
                    const variantRow = button.closest('.variant-row');
                    const variantId = variantRow.querySelector('.variant-id').value;

                    const confirmed = await showConfirmPopup({
                        title: 'Xác nhận xóa biến thể',
                        message: 'Bạn có chắc chắn muốn xóa biến thể này? Hành động này không thể hoàn tác.',
                        confirmText: 'Xóa',
                        cancelText: 'Hủy',
                        tone: 'danger'
                    });
                    if (!confirmed) return;

                    // Nếu là variant cũ (có ID), xóa từ API
                    if (variantId) {
                        // Xóa DOM ngay lập tức và đánh dấu variantId là đã xóa
                        deletedVariantIds.add(variantId);
                        variantRow.remove();
                        showToast('Đã xóa biến thể. Thay đổi sẽ được lưu khi bấm Lưu.', 'success');

                        // Gọi API xóa ở background (không chờ để tránh blocking UI)
                        fetch(`${API_URL}/san-pham-chi-tiet/${variantId}`, {
                            method: 'DELETE'
                        }).then(res => {
                            if (!res.ok) {
                                // Nếu API xóa thất bại, bỏ khỏi danh sách đã xóa
                                deletedVariantIds.delete(variantId);
                                showToast('Lỗi xóa biến thể từ server. Vui lòng thử lại!', 'error');
                            } else {
                                // Xóa thành công thì xóa khỏi Set
                                deletedVariantIds.delete(variantId);
                            }
                        }).catch(error => {
                            // Nếu có lỗi mạng, bỏ khỏi danh sách đã xóa
                            deletedVariantIds.delete(variantId);
                            showToast('Lỗi kết nối khi xóa biến thể. Thay đổi sẽ được lưu khi bấm Lưu!', 'warning');
                        });
                    } else {
                        // Nếu là variant mới (chưa lưu), chỉ remove DOM
                        variantRow.remove();
                    }
                } else {
                    showToast('Phải có ít nhất 1 biến thể!', 'warning');
                }
            }

            // Populate variant selects
            function populateVariantSelects(variantRow) {
                // Màu sắc
                const mauSacSelect = variantRow.querySelector('.variant-mauSac');
                const kichThuocSelect = variantRow.querySelector('.variant-kichThuoc');
                const chatLieuSelect = variantRow.querySelector('.variant-chatLieuDay');

                // Load data từ API
                return Promise.all([
                    fetch(`${API_URL}/mau-sac`).then(r => r.json()),
                    fetch(`${API_URL}/kich-thuoc`).then(r => r.json()),
                    fetch(`${API_URL}/chat-lieu-day`).then(r => r.json())
                ]).then(([mauSacs, kichThuocs, chatLieus]) => {
                    mauSacs.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.id;
                        option.textContent = item.tenMauSac;
                        mauSacSelect.appendChild(option);
                    });

                    kichThuocs.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.id;
                        option.textContent = item.tenKichThuoc;
                        kichThuocSelect.appendChild(option);
                    });

                    chatLieus.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.id;
                        option.textContent = item.tenChatLieu;
                        chatLieuSelect.appendChild(option);
                    });
                }).catch(error => console.error('Lỗi load dữ liệu:', error));
            }

            // Xử lý upload file Excel chứa serial
            async function handleSerialFileUpload(fileInput) {
                const file = fileInput.files[0];
                if (!file) return;

                const variantRow = fileInput.closest('.variant-row');
                const serialCount = variantRow.querySelector('.serial-count');
                const serialList = variantRow.querySelector('.serial-list');
                const btnClear = variantRow.querySelector('.btn-clear-serial');

                // Hiển thị loading
                serialCount.textContent = 'Đang đọc file...';
                serialList.innerHTML = '<div class="serial-loading"><i class="fas fa-spinner fa-spin"></i> Đang xử lý...</div>';

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch(`${API_URL}/san-pham-chi-tiet/serial/preview`, {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();

                    if (result.success === false && result.errorSerials && result.errorSerials.length > 0) {
                        // Có lỗi trong file
                        variantRow.dataset.serialStatus = 'error';
                        serialCount.textContent = `${result.totalSerials} serial (${result.errorCount} lỗi)`;
                        serialCount.style.color = '#dc2626';
                        serialList.innerHTML = result.errorSerials.slice(0, 20).map(err =>
                            `<div class="serial-error">${err}</div>`
                        ).join('');
                        if (result.errorSerials.length > 20) {
                            serialList.innerHTML += `<div class="serial-error">... và ${result.errorSerials.length - 20} lỗi khác</div>`;
                        }
                    } else if (result.totalSerials > 0) {
                        // Thành công
                        serialCount.textContent = `${result.totalSerials} serial hợp lệ`;
                        serialCount.style.color = '#10b981';

                        variantRow.dataset.serialStatus = 'ok';
                        // Lưu số serial hợp lệ vào hidden field
                        let hiddenValidCount = variantRow.querySelector('.variant-valid-serial-count');
                        if (!hiddenValidCount) {
                            hiddenValidCount = document.createElement('input');
                            hiddenValidCount.type = 'hidden';
                            hiddenValidCount.className = 'variant-valid-serial-count';
                            fileInput.parentElement.appendChild(hiddenValidCount);
                        }
                        hiddenValidCount.value = result.totalSerials;

                        // Tự động điền số lượng tồn = số serial đọc được từ file
                        const soLuongTonInput = variantRow.querySelector('.variant-soLuongTon');
                        if (soLuongTonInput) {
                            soLuongTonInput.value = result.totalSerials;
                        }

                        // Hiển thị tất cả serial (hoặc giới hạn hiển thị)
                        const allSerials = result.previewSerials || result.serials || [];
                        const displaySerials = allSerials.slice(0, 50); // Hiển thị tối đa 50 serial
                        serialList.innerHTML = displaySerials.map(s =>
                            `<span class="serial-item">${escapeHtml(s)}</span>`
                        ).join('');

                        if (result.totalSerials > 50) {
                            serialList.innerHTML += `<div style="margin-top: 8px; color: #64748b;">... và ${result.totalSerials - 50} serial khác</div>`;
                        }

                        // Lưu serial vào hidden field
                        let hiddenSerials = variantRow.querySelector('.variant-serialized-serials');
                        if (!hiddenSerials) {
                            hiddenSerials = document.createElement('input');
                            hiddenSerials.type = 'hidden';
                            hiddenSerials.className = 'variant-serialized-serials';
                            fileInput.parentElement.appendChild(hiddenSerials);
                        }
                        hiddenSerials.value = JSON.stringify(result.serials || allSerials);
                    } else {
                        serialCount.textContent = 'Không có serial trong file';
                        serialCount.style.color = '#64748b';
                        serialList.innerHTML = '';
                    }

                    btnClear.style.display = 'inline-flex';

                } catch (error) {
                    console.error('Lỗi đọc file serial:', error);
                    serialCount.textContent = 'Lỗi đọc file';
                    serialCount.style.color = '#dc2626';
                    serialList.innerHTML = '<div class="serial-error">Không thể đọc file Excel. Vui lòng thử lại.</div>';
                }
            }

            // Xóa file serial đã chọn
            function clearSerialFile(btn) {
                const variantRow = btn.closest('.variant-row');
                const fileInput = variantRow.querySelector('.variant-serial-file');
                const hiddenSerials = variantRow.querySelector('.variant-serialized-serials');
                const hiddenValidCount = variantRow.querySelector('.variant-valid-serial-count');
                const soLuongTonInput = variantRow.querySelector('.variant-soLuongTon');
                const serialCount = variantRow.querySelector('.serial-count');
                const serialList = variantRow.querySelector('.serial-list');

                fileInput.value = '';
                if (hiddenSerials) hiddenSerials.remove();
                if (hiddenValidCount) hiddenValidCount.remove();
                if (soLuongTonInput) soLuongTonInput.value = '0';
                serialCount.textContent = 'Chưa chọn file';
                serialCount.style.color = '#475569';
                serialList.innerHTML = '';
                btn.style.display = 'none';
            }

            // Validate số serial so với số lượng tồn
            // Nếu serial ít hơn số lượng, vẫn cho lưu và lấy đủ serial
            function validateSerialCount(variantRow) {
                const soLuongTonInput = variantRow.querySelector('.variant-soLuongTon');
                const hiddenValidCount = variantRow.querySelector('.variant-valid-serial-count');
                const hiddenSerials = variantRow.querySelector('.variant-serialized-serials');

                if (!soLuongTonInput || !hiddenValidCount) return { valid: true };

                const soLuongTon = parseInt(soLuongTonInput.value) || 0;
                const validSerials = parseInt(hiddenValidCount.value) || 0;

                if (soLuongTon > validSerials) {
                    return {
                        valid: false,
                        message: `Số lượng tồn (${soLuongTon}) lớn hơn số serial hợp lệ trong file (${validSerials}). Vui lòng giảm số lượng tồn hoặc nạp đủ serial.`
                    };
                }
                return { valid: true, usedSerials: soLuongTon };
            }

            function validateVariantSerialPayload() {
                const variantRows = document.querySelectorAll('.variant-row');
                const errors = [];

                variantRows.forEach((row, index) => {
                    const fileInput = row.querySelector('.variant-serial-file');
                    const hasFile = fileInput && fileInput.files && fileInput.files.length > 0;
                    if (!hasFile) return;

                    const serialStatus = row.dataset.serialStatus || 'unknown';
                    if (serialStatus === 'error') {
                        errors.push(`Biến thể ${index + 1}: file serial đang có lỗi. Hãy sửa file trước khi lưu.`);
                        return;
                    }

                    const validation = validateSerialCount(row);
                    if (!validation.valid) {
                        errors.push(`Biến thể ${index + 1}: ${validation.message}`);
                    }

                    const hiddenSerials = row.querySelector('.variant-serialized-serials');
                    const hiddenValidCount = row.querySelector('.variant-valid-serial-count');
                    if (!hiddenSerials || !hiddenValidCount) {
                        errors.push(`Biến thể ${index + 1}: chưa có dữ liệu serial hợp lệ. Vui lòng tải lại file.`);
                    }
                });

                return errors;
            }

            function validateVariantStructure() {
                const variantRows = document.querySelectorAll('.variant-row');
                const errors = [];

                if (!variantRows.length) {
                    return ['Vui lòng thêm ít nhất 1 biến thể trước khi lưu sản phẩm.'];
                }

                variantRows.forEach((row, index) => {
                    const mauSac = getVariantValue(row, '.variant-mauSac').trim();
                    const kichThuoc = getVariantValue(row, '.variant-kichThuoc').trim();
                    const chatLieuDay = getVariantValue(row, '.variant-chatLieuDay').trim();
                    const giaBan = getVariantValue(row, '.variant-giaBan').trim();
                    const soLuongTon = getVariantValue(row, '.variant-soLuongTon').trim();

                    if (!mauSac || !kichThuoc || !chatLieuDay) {
                        errors.push(`Biến thể ${index + 1}: hãy chọn đủ Màu sắc, Kích thước và Chất liệu dây.`);
                    }
                    if (!giaBan) {
                        errors.push(`Biến thể ${index + 1}: vui lòng nhập Giá bán.`);
                    }
                    if (!soLuongTon) {
                        errors.push(`Biến thể ${index + 1}: vui lòng nhập Số lượng tồn.`);
                    }
                });

                return errors;
            }

            // Escape HTML để tránh XSS
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // Lấy giá trị an toàn từ element trong variantRow
            function getVariantValue(variantRow, selector, defaultValue = '') {
                const el = variantRow.querySelector(selector);
                return el ? (el.value || defaultValue) : defaultValue;
            }

            // Lắng nghe sự kiện thay đổi file input
            document.getElementById('hinhAnhFile').addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        const preview = document.getElementById('previewImage');
                        const container = document.getElementById('previewContainer');
                        preview.src = event.target.result;
                        container.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            });


            function formatPrice(price) {
                if (!price) return '0₫';
                return parseFloat(price).toLocaleString('vi-VN') + '₫';
            }

            // Tải danh sách sản phẩm (phân trang 5/trang, tìm kiếm, lọc trạng thái)
            async function loadProducts(page) {
                if (page === undefined) page = currentPage;
                currentPage = page;

                const keyword = document.getElementById('searchKeyword').value.trim();
                const trangThaiEl = document.getElementById('filterTrangThai');
                const trangThai = trangThaiEl.value === '' ? null : (trangThaiEl.value === 'true');

                const params = new URLSearchParams();
                if (keyword) params.set('keyword', keyword);
                if (trangThai !== null) params.set('trangThai', trangThai);
                params.set('page', page);
                params.set('size', PAGE_SIZE);

                const tbody = document.getElementById('productTableBody');
                tbody.innerHTML = '<tr><td colspan="9" class="loading"><div class="spinner"></div>Đang tải dữ liệu...</td></tr>';

                try {
                    const response = await fetch(`${API_URL}/san-pham/search?${params}`);
                    if (!response.ok) throw new Error('Lỗi tải dữ liệu');
                    const data = await response.json();
                    const products = data.content || [];
                    totalPages = data.totalPages ?? 0;
                    totalElements = data.totalElements ?? 0;

                    if (products.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="9" class="loading">Không có dữ liệu</td></tr>';
                        renderPagination();
                        return;
                    }

                    // Tạo HTML cho từng sản phẩm (có fetch chi tiết biến thể)
                    let htmlRows = '';

                    for (const product of products) {
                        const imgHtml = product.hinhAnh ?
                            `<img src="${product.hinhAnh}" alt="Ảnh" class="product-image">` :
                            '<span style="color: #999;">Không có ảnh</span>';

                        // Lấy giá bán và số lượng từ chi tiết sản phẩm, đồng thời chuẩn bị HTML cho các biến thể
                        let giaBan = 'N/A';
                        let soLuongTon = 0;
                        let variantDetails = [];

                        try {
                            const detailResponse = await fetch(`${API_URL}/san-pham-chi-tiet/san-pham/${product.id}`);
                            if (detailResponse.ok) {
                                variantDetails = await detailResponse.json();
                                if (variantDetails && variantDetails.length > 0) {
                                    // Tính tổng số lượng từ tất cả các variant; giá: khoảng min–max
                                    let totalSoLuong = 0;
                                    const giaValues = [];

                                    variantDetails.forEach(detail => {
                                        // Chỉ tính tổng số lượng cho các biến thể đang bật (trangThai = true)
                                        if (detail.trangThai !== false) {
                                            totalSoLuong += detail.soLuongTon || 0;
                                        }
                                        if (detail.giaBan != null && detail.giaBan !== '') {
                                            const g = parseFloat(detail.giaBan);
                                            if (!isNaN(g) && g >= 0) {
                                                giaValues.push(g);
                                            }
                                        }
                                    });

                                    if (giaValues.length > 0) {
                                        const minGia = Math.min(...giaValues);
                                        const maxGia = Math.max(...giaValues);
                                        giaBan = minGia === maxGia
                                            ? formatPrice(minGia)
                                            : `${formatPrice(minGia)} – ${formatPrice(maxGia)}`;
                                    }
                                    soLuongTon = totalSoLuong;
                                }
                            }
                        } catch (error) {
                            console.warn(`Lỗi khi tải chi tiết sản phẩm ${product.id}:`, error);
                        }

                        const statusBadge = product.trangThai ?
                            '<span class="status-badge status-active"><i class="fas fa-check-circle"></i> Hoạt động</span>' :
                            '<span class="status-badge status-inactive"><i class="fas fa-times-circle"></i> Không hoạt động</span>';

                        const kmCell = product.coKhuyenMaiHopLe
                            ? '<span class="badge-km" title="Giá hiển thị shop đang gồm khuyến mãi">Shop</span>'
                            : (product.trangThaiKhuyenMai
                                ? '<span class="muted" title="KM cấp sản phẩm (kiểm tra ngày &amp; loại)">SP</span>'
                                : '<span class="muted">—</span>');

                        // Tạo HTML cho các biến thể hiển thị dưới mỗi sản phẩm
                        let variantListHtml = '';
                        if (variantDetails && variantDetails.length > 0) {
                            variantListHtml = '<div class="variant-list">' + variantDetails.map(detail => {
                                const color = getMauSacName(detail.idMauSac);
                                const size = getKichThuocName(detail.idKichThuoc);
                                const material = getChatLieuDayName(detail.idChatLieuDay);
                                const machine = getLoaiMayName(product.idLoaiMay);
                                const price = detail.giaBan ? formatPrice(detail.giaBan) : '0₫';
                                const qty = detail.soLuongTon || 0;

                                let detailsHtml = `
                                <div class="variant-item">
                                    <div class="variant-name">
                                        <span>${color}</span>
                                        <span>${size}</span>
                                    </div>
                                    <div class="variant-details">
                                        <div class="detail-row">
                                            <span class="label">Chất liệu:</span>
                                            <span class="value">${material}</span>
                                        </div>
                                        <div class="detail-row">
                                            <span class="label">Loại máy:</span>
                                            <span class="value">${machine}</span>
                                        </div>
                            `;

                                if (detail.duongKinh) {
                                    detailsHtml += `
                                        <div class="detail-row">
                                            <span class="label">Đường kính:</span>
                                            <span class="value">${detail.duongKinh}mm</span>
                                        </div>
                                `;
                                }
                                if (detail.doChiuNuoc) {
                                    detailsHtml += `
                                        <div class="detail-row">
                                            <span class="label">Chịu nước:</span>
                                            <span class="value">${detail.doChiuNuoc}m</span>
                                        </div>
                                `;
                                }
                                if (detail.beRongDay) {
                                    detailsHtml += `
                                        <div class="detail-row">
                                            <span class="label">Rộng dây:</span>
                                            <span class="value">${detail.beRongDay}mm</span>
                                        </div>
                                `;
                                }
                                if (detail.trongLuong) {
                                    detailsHtml += `
                                        <div class="detail-row">
                                            <span class="label">Trọng lượng:</span>
                                            <span class="value">${detail.trongLuong}g</span>
                                        </div>
                                `;
                                }

                                detailsHtml += `
                                    </div>
                                    <div class="variant-price">
                                        ${price} · <span class="muted">SL: ${qty}</span>
                                    </div>



                                    <div class="variant-serial">
                                        <strong>Serial:</strong> ${detail.serials && detail.serials.length
                                        ? `${detail.soLuongSerialTrongKho || 0} trong kho · ${detail.serials.slice(0, 4).join(' || ')}${detail.serials.length > 4 ? ' ...' : ''}`
                                        : 'Chưa có'}
                                    </div>
                                    <div class="variant-status">
                                        <span class="status-label">Trạng thái:</span>
                                        <label class="toggle-switch-small" title="Bật/tắt biến thể">
                                            <input type="checkbox" ${detail.trangThai ? 'checked' : ''} onchange="toggleVariantStatus(${detail.id}, this)">
                                            <span class="slider-small"></span>
                                        </label>
                                    </div>
                                </div>
                            `;
                                return detailsHtml;
                            }).join('') + '</div>';
                        } else {
                            variantListHtml = '<div class="variant-list"><div class="variant-item"><span class="muted">Không có biến thể nào</span></div></div>';
                        }

                        htmlRows += `
                        <tr class="product-main-row">
                            <td><strong>${product.id}</strong></td>
                            <td><code>${product.maSanPham}</code></td>
                            <td>${imgHtml}</td>
                            <td>${product.tenSanPham}</td>
                            <td class="price-highlight">${giaBan}</td>
                            <td><strong>${soLuongTon}</strong></td>
                            <td>${statusBadge}</td>
                            <td style="white-space:nowrap;">${kmCell}</td>
                            <td>
                                <div class="actions">
                                    <button class="btn btn--secondary" onclick="editProduct(${product.id})">
                                        <i class="fas fa-edit"></i>
                                    </button>

                                    <label class="toggle-switch" title="Bật/tắt trạng thái sản phẩm">
                                        <input type="checkbox" ${product.trangThai ? 'checked' : ''} onchange="toggleProductStatus(${product.id}, this)">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </td>
                        </tr>
                        <tr class="variant-list-row">
                            <td colspan="9">
                                ${variantListHtml}
                            </td>
                        </tr>
                    `;
                    }

                    tbody.innerHTML = htmlRows;
                    renderPagination();
                } catch (error) {
                    console.error('Lỗi khi tải danh sách:', error);
                    tbody.innerHTML = '<tr><td colspan="9" class="loading" style="color: #dc3545;"><i class="fas fa-exclamation-circle"></i> Lỗi khi tải dữ liệu</td></tr>';
                    renderPagination();
                }
            }

            function applySearch() {
                loadProducts(0);
            }

            function resetSearch() {
                document.getElementById('searchKeyword').value = '';
                document.getElementById('filterTrangThai').value = '';
                loadProducts(0);
            }

            function renderPagination() {
                const infoEl = document.getElementById('paginationInfo');
                const controlsEl = document.getElementById('paginationControls');
                if (totalElements === 0) {
                    infoEl.textContent = 'Không có bản ghi nào';
                    controlsEl.innerHTML = '';
                    return;
                }
                const from = currentPage * PAGE_SIZE + 1;
                const to = Math.min((currentPage + 1) * PAGE_SIZE, totalElements);
                const total = totalPages || 1;
                const first = currentPage === 0;
                const last = currentPage >= total - 1;
                let html = '';
                html += first ? '<li><span class="pagination__link pagination__link--disabled"><i class="fa-solid fa-angles-left" aria-hidden="true"></i></span></li>' : '<li><a class="pagination__link" href="javascript:void(0)" onclick="loadProducts(0); return false;" title="Trang đầu"><i class="fa-solid fa-angles-left" aria-hidden="true"></i></a></li>';
                html += first ? '<li><span class="pagination__link pagination__link--disabled"><i class="fa-solid fa-chevron-left" aria-hidden="true"></i></span></li>' : '<li><a class="pagination__link pagination__link--prev" href="javascript:void(0)" onclick="loadProducts(' + (currentPage - 1) + '); return false;" title="Trước"><i class="fa-solid fa-chevron-left" aria-hidden="true"></i></a></li>';
                for (let i = 0; i < total; i++) {
                    const active = i === currentPage ? ' pagination__link--active' : '';
                    html += '<li><a class="pagination__link' + active + '" href="javascript:void(0)" onclick="loadProducts(' + i + '); return false;"' + (active ? ' aria-current="page"' : '') + '>' + (i + 1) + '</a></li>';
                }
                html += last ? '<li><span class="pagination__link pagination__link--disabled"><i class="fa-solid fa-chevron-right" aria-hidden="true"></i></span></li>' : '<li><a class="pagination__link pagination__link--next" href="javascript:void(0)" onclick="loadProducts(' + (currentPage + 1) + '); return false;" title="Sau"><i class="fa-solid fa-chevron-right" aria-hidden="true"></i></a></li>';
                html += last ? '<li><span class="pagination__link pagination__link--disabled"><i class="fa-solid fa-angles-right" aria-hidden="true"></i></span></li>' : '<li><a class="pagination__link" href="javascript:void(0)" onclick="loadProducts(' + (total - 1) + '); return false;" title="Trang cuối"><i class="fa-solid fa-angles-right" aria-hidden="true"></i></a></li>';
                controlsEl.innerHTML = html;
            }

                    const select = document.getElementById('idThuongHieu');

            // Tải danh sách danh mục
            async function loadDanhMuc() {
                try {
                    const response = await fetch(`${API_URL}/danh-muc`);
                    const list = await response.json();

                    const select = document.getElementById('idDanhMuc');
                    select.innerHTML = '<option value="">-- Chọn danh mục --</option>' +
