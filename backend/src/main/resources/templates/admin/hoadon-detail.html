<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="invoice-detail">
        <p th:if="${message}" class="message" th:text="${message}"></p>
        <p th:if="${warning}" class="message message--warning" th:text="${warning}"></p>
        <p th:if="${error}" class="message message--error" th:text="${error}"></p>

        <!-- Breadcrumb / Back -->
        <div class="invoice-detail__top">
            <a th:href="@{/admin/hoa-don}" class="invoice-detail__back">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Danh sách hóa đơn</span>
            </a>
        </div>

        <!-- Main Invoice Card -->
        <article class="invoice-detail__card">
            <!-- Header: Mã HĐ + Trạng thái + Actions -->
            <header class="invoice-detail__header">
                <div class="invoice-detail__header-left">
                    <h1 class="invoice-detail__title">
                        Hóa đơn
                        <span class="invoice-detail__code" th:text="${hoaDon.maDonHang}">#Mã</span>
                    </h1>
                    <form th:if="${hoaDon.loaiHoaDon == 'OFFLINE'}"
                          th:action="@{/admin/hoa-don/{id}/trang-thai(id=${hoaDon.id})}" method="post"
                          class="invoice-detail__status-form">
                        <input type="hidden" name="tuChiTiet" value="1"/>
                        <div class="invoice-detail__status-field">
                        <label for="invoiceDetailTrangThai" class="invoice-detail__status-field-label">Trạng thái đơn</label>
                        <select name="trangThai" id="invoiceDetailTrangThai"
                                class="invoice-detail__status-select"
                                onchange="this.form.submit()" title="Đổi trạng thái hóa đơn tại quầy"
                                th:with="raw=${hoaDon.trangThaiDonHang},
                                         cur=${raw != null and !#strings.isEmpty(raw) ? raw : 'CHO_THANH_TOAN'},
                                         isCho=${cur == 'CHO_THANH_TOAN' or cur == 'DRAFT_OFFLINE' or cur == 'CHO_XAC_NHAN'},
                                         isPaid=${cur == 'DA THANH TOAN' or cur == 'DA_THANH_TOAN'},
                                         isHuy=${cur == 'DA_HUY'},
                                         isCanXuLy=${cur == 'CAN_XU_LY'}"
                                th:classappend="${isCanXuLy ? 'status--can-xu-ly' : (isHuy ? 'status--da-huy' : (isPaid ? 'status--da-giao' : 'status--cho-xac-nhan'))}">
                            <th:block th:if="${isCho}">
                                <option value="CHO_THANH_TOAN" th:selected="${cur == 'CHO_THANH_TOAN' or cur == 'DRAFT_OFFLINE' or cur == 'CHO_XAC_NHAN'}" th:text="'Chờ thanh toán'">Chờ thanh toán</option>
                                <option value="DA THANH TOAN" th:text="'Đã thanh toán'">Đã thanh toán</option>
                                <option value="DA_HUY" th:text="'Đã hủy'">Đã hủy</option>
                            </th:block>
                            <th:block th:if="${isPaid}">
                                <option value="DA THANH TOAN" th:selected="true" th:text="'Đã thanh toán'">Đã thanh toán</option>
                            </th:block>
                            <th:block th:if="${isHuy and !isCho and !isPaid}">
                                <option value="DA_HUY" th:selected="true" th:text="'Đã hủy'">Đã hủy</option>
                            </th:block>
                            <th:block th:if="${isCanXuLy}">
                                <option value="CAN_XU_LY" th:selected="true" th:text="'Cần xử lý'">Cần xử lý</option>
                                <option value="DA THANH TOAN" th:text="'Đã thanh toán'">Đã thanh toán</option>
                                <option value="DA_HUY" th:text="'Đã hủy'">Đã hủy</option>
                            </th:block>
                        </select>
                        </div>
                    </form>
                    <form th:unless="${hoaDon.loaiHoaDon == 'OFFLINE'}"
                          th:action="@{/admin/hoa-don/{id}/trang-thai(id=${hoaDon.id})}" method="post"
                          class="invoice-detail__status-form">
                        <input type="hidden" name="tuChiTiet" value="1"/>
                        <div class="invoice-detail__status-field">
                        <label for="invoiceDetailTrangThaiOnline" class="invoice-detail__status-field-label">Trạng thái đơn</label>
                        <select name="trangThai" id="invoiceDetailTrangThaiOnline"
                                class="invoice-detail__status-select"
                                onchange="this.form.submit()"
                                th:with="cur=${hoaDon.trangThaiDonHang != null and !#strings.isEmpty(hoaDon.trangThaiDonHang) ? hoaDon.trangThaiDonHang : 'CHO_XAC_NHAN'}"
                                th:title="${cur == 'DA_GIAO'} ? 'Đơn đã giao, không đổi trạng thái' : 'Đổi trạng thái đơn hàng'"
                                th:disabled="${cur == 'DA_GIAO'}"
                                th:classappend="${cur == 'CAN_XU_LY' ? 'status--can-xu-ly' : (cur == 'CHO_XAC_NHAN' ? 'status--cho-xac-nhan' : (cur == 'DA_XAC_NHAN' ? 'status--da-xac-nhan' : (cur == 'DANG_GIAO' ? 'status--dang-giao' : ((cur == 'DA_GIAO' or cur == 'DA THANH TOAN' or cur == 'DA_THANH_TOAN') ? 'status--da-giao' : (cur == 'DA_HUY' ? 'status--da-huy' : 'status--cho-xac-nhan')))))}">
                            <option th:if="${cur == 'CAN_XU_LY'}" th:value="CAN_XU_LY" th:selected="${cur == 'CAN_XU_LY'}" th:text="'Cần xử lý'">Cần xử lý</option>
                            <option th:if="${cur == 'CHO_XAC_NHAN'}" th:value="CHO_XAC_NHAN" th:selected="${cur == 'CHO_XAC_NHAN'}" th:text="'Chờ xác nhận'">Chờ xác nhận</option>
                            <option th:if="${cur == 'CHO_XAC_NHAN' or cur == 'DA_XAC_NHAN'}" th:value="DA_XAC_NHAN" th:selected="${cur == 'DA_XAC_NHAN'}" th:text="'Đã xác nhận'">Đã xác nhận</option>
                            <option th:if="${cur == 'DA_XAC_NHAN' or cur == 'DANG_GIAO'}" th:value="DANG_GIAO" th:selected="${cur == 'DANG_GIAO'}" th:text="'Đang giao'">Đang giao</option>
                            <option th:if="${cur == 'DANG_GIAO' or cur == 'DA_GIAO'}" th:value="DA_GIAO" th:selected="${cur == 'DA_GIAO'}" th:text="'Đã giao'">Đã giao</option>
                            <option th:if="${cur == 'DA THANH TOAN' or cur == 'DA_THANH_TOAN'}" th:value="DA THANH TOAN" th:selected="${cur == 'DA THANH TOAN' or cur == 'DA_THANH_TOAN'}" th:text="'Đã thanh toán'">Đã thanh toán</option>
                            <option th:if="${cur == 'CHO_XAC_NHAN' or cur == 'DA_XAC_NHAN' or cur == 'DANG_GIAO' or cur == 'DA_HUY' or cur == 'CAN_XU_LY' or cur == 'DA THANH TOAN' or cur == 'DA_THANH_TOAN'}" th:value="DA_HUY" th:selected="${cur == 'DA_HUY'}" th:text="'Đã hủy'">Đã hủy</option>
                        </select>
                        </div>
                    </form>
                </div>
                <div class="invoice-detail__header-actions">
                    <a class="btn btn--primary btn--sm" th:href="@{/admin/hoa-don/{id}/pdf(id=${hoaDon.id})}" target="_blank">
                        <i class="fa-solid fa-file-pdf"></i>
                        <span>Xuất PDF</span>
                    </a>
                </div>
            </header>

            <!-- Thông tin đơn hàng - 2 cột -->
            <section class="invoice-detail__section">
                <h2 class="invoice-detail__section-title">
                    <i class="fa-solid fa-circle-info"></i>
                    Thông tin đơn hàng
                </h2>
                <div class="invoice-detail__grid">
                    <div class="invoice-detail__item">
                        <span class="invoice-detail__label">Khách hàng</span>
                        <span class="invoice-detail__value" th:text="${hoaDon.tenKhachHang}">—</span>
                    </div>
                    <div class="invoice-detail__item">
                        <span class="invoice-detail__label">Số điện thoại</span>
                        <span class="invoice-detail__value" th:text="${hoaDon.sdtKhachHang}">—</span>
                    </div>
                    <div class="invoice-detail__item invoice-detail__item--full">
                        <span class="invoice-detail__label">Địa chỉ</span>
                        <span class="invoice-detail__value" th:text="${hoaDon.diaChi}">—</span>
                    </div>
                    <div class="invoice-detail__item">
                        <span class="invoice-detail__label">Ngày đặt</span>
                        <span class="invoice-detail__value" th:text="${hoaDon.ngayDat != null ? #temporals.format(hoaDon.ngayDat, 'dd/MM/yyyy HH:mm') : '—'}">—</span>
                    </div>
                    <div class="invoice-detail__item">
                        <span class="invoice-detail__label">Thanh toán</span>
                        <span class="invoice-detail__value" th:text="${hoaDon.phuongThucThanhToan != null ? hoaDon.phuongThucThanhToan : '—'}">—</span>
                    </div>
                    <div class="invoice-detail__item">
                        <span class="invoice-detail__label">Loại hóa đơn</span>
                        <span class="invoice-detail__value" th:text="${hoaDon.loaiHoaDon != null ? hoaDon.loaiHoaDon : '—'}">—</span>
                    </div>
                    <div class="invoice-detail__item invoice-detail__item--full" th:if="${hoaDon.ghiChu != null and !hoaDon.ghiChu.isEmpty()}">
                        <span class="invoice-detail__label">Ghi chú</span>
                        <span class="invoice-detail__value" th:text="${hoaDon.ghiChu}">—</span>
                    </div>
                </div>
            </section>

            <!-- Tổng tiền -->
            <section class="invoice-detail__summary">
                <div class="invoice-detail__summary-row">
                    <span class="invoice-detail__label">Tổng tạm tính</span>
                    <span class="invoice-detail__money" th:text="${hoaDon.tongTienTamTinh != null ? #numbers.formatDecimal(hoaDon.tongTienTamTinh, 1, 'POINT', 0, 'COMMA') : '0'}">0</span>
                </div>
                <div class="invoice-detail__summary-row" th:if="${hoaDon.tienGiam != null and hoaDon.tienGiam > 0}">
                    <span class="invoice-detail__label">Tiền giảm</span>
                    <span class="invoice-detail__money invoice-detail__money--discount" th:text="${'-' + #numbers.formatDecimal(hoaDon.tienGiam, 1, 'POINT', 0, 'COMMA')}">0</span>
                </div>
                <div class="invoice-detail__summary-row invoice-detail__summary-row--total">
                    <span class="invoice-detail__label">Tổng thanh toán</span>
                    <span class="invoice-detail__money invoice-detail__money--total" th:text="${hoaDon.tongTienThanhToan != null ? #numbers.formatDecimal(hoaDon.tongTienThanhToan, 1, 'POINT', 0, 'COMMA') : '0'}">0</span>
                </div>
            </section>

            <!-- Bảng sản phẩm -->
            <section class="invoice-detail__section" th:if="${hoaDon.items != null and !hoaDon.items.isEmpty()}">
                <h2 class="invoice-detail__section-title">
                    <i class="fa-solid fa-list"></i>
                    Chi tiết sản phẩm
                </h2>
                <div class="invoice-detail__table-wrap">
                    <table class="invoice-detail__table">
                        <thead>
                            <tr>
                                <th>Sản phẩm</th>
                                <th class="invoice-detail__th--num">Số lượng</th>
                                <th class="invoice-detail__th--num">Đơn giá</th>
                                <th class="invoice-detail__th--num">Thành tiền</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="ct : ${hoaDon.items}">
                                <td class="invoice-detail__product-name" th:text="${ct.tenSanPham}">—</td>
                                <td class="invoice-detail__td--num" th:text="${ct.soLuong}">0</td>
                                <td class="invoice-detail__td--num" th:text="${ct.donGia != null ? #numbers.formatDecimal(ct.donGia, 1, 'POINT', 0, 'COMMA') : '0'}">0</td>
                                <td class="invoice-detail__td--num" th:text="${ct.thanhTien != null ? #numbers.formatDecimal(ct.thanhTien, 1, 'POINT', 0, 'COMMA') : '0'}">0</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </article>
    </div>
</div>
</body>
</html>
