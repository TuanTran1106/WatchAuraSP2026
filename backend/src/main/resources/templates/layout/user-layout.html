<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${title}">WatchAura</title>

    <link rel="stylesheet" th:href="@{/css/user-layout.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/cart.css}">
    <link rel="stylesheet" th:href="@{/css/tin-tuc-detail.css}">
    <link rel="stylesheet" th:href="@{/css/sanpham-detail.css}">
    <link rel="stylesheet" th:href="@{/css/don-hang-user-list.css}">
    <link rel="stylesheet" th:href="@{/css/danh-gia.css}">
    <link rel="stylesheet" th:href="@{/css/tai-khoan.css}">
    <link rel="stylesheet" th:href="@{/css/confirm-modal.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <div th:replace="fragments/header :: header"></div>

    <!-- Sidebar menu (mở bằng nút hamburger trên header) -->
    <div class="sidebar-menu" id="sidebarMenu">
        <div class="sidebar-header">
            <h5>MENU</h5>
        </div>
        <ul>
            <li><a th:href="@{/nguoidung}"><i class="fas fa-user"></i> Tài khoản</a></li>
            <li><a th:href="@{/uu-dai}"><i class="fas fa-percentage"></i> Khuyến mại</a></li>
            <li><a th:href="@{/tin-tuc}"><i class="fas fa-newspaper"></i> Tin tức</a></li>
            <li><a th:href="@{/lien-he}"><i class="fas fa-envelope"></i> Liên hệ</a></li>
            <li><a th:href="@{/tu-van-ai}"><i class="fas fa-robot"></i> Tư vấn thông minh</a></li>
            <li th:if="${currentUser != null}">
                <a th:href="@{/dang-xuat}"
                   data-confirm="Bạn có chắc chắn muốn đăng xuất?"
                   data-confirm-title="Đăng xuất"
                   data-confirm-ok="Đăng xuất"
                   data-confirm-cancel="Ở lại"
                   data-confirm-tone="danger">
                    <i class="fas fa-sign-out-alt"></i> Đăng xuất
                </a>
            </li>
        </ul>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebarMenu()"></div>

    <script th:inline="javascript">
        function toggleSidebarMenu() {
            var sidebar = document.getElementById('sidebarMenu');
            var overlay = document.getElementById('sidebarOverlay');
            if (sidebar && overlay) {
                sidebar.classList.toggle('show');
                overlay.classList.toggle('show');
            }
        }
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                var sidebar = document.getElementById('sidebarMenu');
                if (sidebar && sidebar.classList.contains('show')) toggleSidebarMenu();
            }
        });
        // Logout confirmation handled by shared confirm modal (data-confirm)
    </script>

    <!-- CONTENT -->
    <main class="user-main">
        <div th:replace="~{__${content}__}"></div>
    </main>

    <!-- FOOTER -->
    <div th:replace="fragments/footer :: footer"></div>

    <!-- Toast notification (thêm giỏ thành công, lỗi, v.v.) -->
    <div id="toastStack" class="toast-stack" aria-live="polite"></div>
    <div id="flashData" style="display:none" th:attr="data-success=${success}, data-error=${error}"></div>
    <script th:src="@{/js/confirm-modal.js}"></script>
    <script th:inline="javascript">
        (function() {
            // Nút +/- số lượng (trang chi tiết SP, giỏ hàng, v.v.) – delegation trên document
            document.addEventListener('click', function(e) {
                var btn = e.target.closest && e.target.closest('[data-qty-action]');
                if (!btn) return;
                e.preventDefault();
                var group = btn.closest && btn.closest('.qty-group');
                if (!group) return;
                var input = group.querySelector && group.querySelector('.quantity-input');
                if (!input) return;
                var current = parseInt(input.value, 10) || 1;
                var max = parseInt(input.getAttribute('max'), 10) || 999;
                if (btn.getAttribute('data-qty-action') === 'minus' && current > 1) {
                    input.value = current - 1;
                } else if (btn.getAttribute('data-qty-action') === 'plus' && (max <= 0 || current < max)) {
                    input.value = current + 1;
                }
            });

            var flashEl = document.getElementById('flashData');
            var success = flashEl ? flashEl.getAttribute('data-success') : null;
            var error = flashEl ? flashEl.getAttribute('data-error') : null;
            var stack = document.getElementById('toastStack');
            if (!stack) return;

            function showToast(message, type) {
                type = type || 'success';
                var title = type === 'success' ? 'Thành công' : 'Lỗi';
                var icon = type === 'success' ? '<i class="fas fa-check"></i>' : '<i class="fas fa-exclamation-circle"></i>';
                var el = document.createElement('div');
                el.className = 'toast-item toast-item--' + type;
                el.setAttribute('role', 'alert');
                el.innerHTML = '<div class="toast-item__icon">' + icon + '</div>' +
                    '<div class="toast-item__body">' +
                        '<p class="toast-item__title">' + title + '</p>' +
                        '<p class="toast-item__msg">' + (message || '') + '</p>' +
                    '</div>' +
                    '<button type="button" class="toast-item__close" aria-label="Đóng">&times;</button>' +
                    '<span class="toast-item__progress"></span>';
                stack.appendChild(el);

                var close = function() {
                    el.style.animation = 'toastSlideOut 0.3s ease forwards';
                    setTimeout(function() { el.remove(); }, 320);
                };

                el.querySelector('.toast-item__close').addEventListener('click', close);
                setTimeout(close, 4200);
            }

            if (success) showToast(success, 'success');
            if (error) showToast(error, 'error');

            window.showToast = showToast;
        })();
    </script>

    <!-- Variant box click handler — needs to run before fragment scripts -->
    <script>
    window.selectVariantBox = function(box) {
        if (!box) return;
        var root = box.closest ? box.closest('.product-detail-page') : null;
        if (!root) return;

        if (box.classList.contains('variant-box--disabled')) {
            if (typeof window.showToast === 'function') window.showToast('Biến thể này đã hết hàng!', 'warning');
            return;
        }

        root.querySelectorAll('.variant-box').forEach(function(b) { b.classList.remove('variant-box--active'); });
        box.classList.add('variant-box--active');

        var hid = root.querySelector('.input-variant-id');
        var pEl = root.querySelector('.price-value');
        var sRem = root.querySelector('.stock-remaining');
        var qIn = root.querySelector('.quantity-input');
        var btn = root.querySelector('#btnAddToCart');
        var statusEl = root.querySelector('#mainStockStatus');

        var id = box.getAttribute('data-variant-id');
        var giaBan = box.getAttribute('data-gia-ban');
        var soLuong = box.getAttribute('data-so-luong-kha-dung') || '0';

        if (hid) hid.value = id || '';
        if (pEl) {
            pEl.textContent = (giaBan && parseFloat(giaBan) > 0)
                ? Math.round(parseFloat(giaBan)).toLocaleString('vi-VN') + ' ₫'
                : 'Liên hệ để biết giá';
        }

        var maxStock = parseInt(soLuong, 10) || 0;
        if (sRem) sRem.textContent = soLuong;
        if (qIn) {
            qIn.setAttribute('max', maxStock);
            var cv = parseInt(qIn.value, 10) || 1;
            qIn.value = (cv > maxStock || maxStock <= 0) ? (maxStock > 0 ? maxStock : 1) : cv;
        }
        if (btn) {
            btn.disabled = maxStock <= 0;
            btn.textContent = maxStock > 0 ? 'Thêm vào giỏ hàng' : 'Hết hàng';
            btn.style.background = maxStock <= 0 ? '#ccc' : '';
        }
        if (statusEl) {
            statusEl.textContent = maxStock > 0 ? 'Còn hàng' : 'Hết hàng';
            statusEl.className = 'stock-status ' + (maxStock > 0 ? 'in-stock' : 'out-of-stock');
        }

        var row = root.querySelector('.specs-features-row');
        var specContainer = root.querySelector('.product-specs');
        if (specContainer && row) {
            var spDDK = row.getAttribute('data-sp-duong-kinh');
            var spDCN = row.getAttribute('data-sp-do-chiu-nuoc');
            var g = function(a) { return box.getAttribute(a) || ''; };
            var sm = {
                mauSac: g('data-mau-sac') || 'Chưa cập nhật',
                kichThuoc: g('data-kich-thuoc') || 'Chưa cập nhật',
                chatLieuDay: g('data-chat-lieu-day') || 'Chưa cập nhật',
                loaiMay: g('data-loai-may') || 'Chưa cập nhật',
                duongKinh: (g('data-duong-kinh') || spDDK) ? (g('data-duong-kinh') || spDDK) + ' mm' : 'Chưa cập nhật',
                doChiuNuoc: (g('data-do-chiu-nuoc') || spDCN) ? (g('data-do-chiu-nuoc') || spDCN) + ' m' : 'Chưa cập nhật',
                beRongDay: g('data-be-rong-day') ? g('data-be-rong-day') + ' mm' : 'Chưa cập nhật',
                trongLuong: g('data-trong-luong') ? g('data-trong-luong') + ' g' : 'Chưa cập nhật'
            };
            specContainer.querySelectorAll('[data-spec]').forEach(function(el) {
                var key = el.getAttribute('data-spec');
                if (sm[key] !== undefined) el.textContent = sm[key];
            });
        }
    };
    </script>

</body>

</html>
