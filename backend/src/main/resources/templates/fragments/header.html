<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="header" class="user-header">
    <div class="container header-inner">
        <div class="header-logo-wrap">
            <button type="button" class="header-menu-btn" id="headerMenuBtn" onclick="toggleSidebarMenu()" aria-label="Mở menu">
                <svg class="header-menu-btn__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <a th:href="@{/}" class="logo">WATCHAURA</a>
        </div>

        <form class="header-search" th:action="@{/san-pham}" method="get">
            <input type="search" name="keyword" class="header-search__input" placeholder="Tìm kiếm sản phẩm..." th:value="${param.keyword}">
            <button type="submit" class="header-search__btn" aria-label="Tìm kiếm">
            <svg class="header-search__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
        </button>
        </form>

        <nav class="nav">
            <a th:href="@{/}">Trang chủ</a>
            <div class="nav-dropdown" id="nav-dropdown-danhmuc-wrap">
                <button type="button" class="nav-dropdown__toggle" aria-expanded="false" aria-haspopup="true" aria-controls="nav-dropdown-danhmuc" id="nav-dropdown-danhmuc-btn">
                    Danh mục sản phẩm
                    <span class="nav-dropdown__chevron" aria-hidden="true">▾</span>
                </button>
                <div class="nav-dropdown__menu" id="nav-dropdown-danhmuc" role="menu" aria-labelledby="nav-dropdown-danhmuc-btn">
                    <a th:each="dm : ${danhMucList}" th:href="@{/san-pham(danhMucId=${dm.id})}" class="nav-dropdown__item" role="menuitem" th:text="${dm.tenDanhMuc}">Danh mục</a>
                    <p th:if="${danhMucList == null or danhMucList.isEmpty()}" class="nav-dropdown__empty">Chưa có danh mục</p>
                </div>
            </div>
            <a th:href="@{/san-pham}">Sản phẩm</a>
            <a th:href="@{/don-hang}">Theo dõi đơn hàng</a>
            <a th:href="@{/gio-hang}" class="nav-cart" aria-label="Giỏ hàng">
                <svg class="nav-cart__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="nav-cart__count"
                      th:classappend="${soLuongGioHang == null or soLuongGioHang == 0} ? ' nav-cart__count--empty' : ''"
                      th:text="${soLuongGioHang != null ? soLuongGioHang : 0}">0</span>
            </a>
            <th:block th:if="${currentUser != null}">
                <span class="nav-user" th:text="'Xin chào, ' + ${currentUser.tenNguoiDung}">Xin chào</span>
            </th:block>
            <th:block th:if="${currentUser == null}">
                <a th:href="@{/dang-ky}" class="nav-link">Đăng ký</a>
                <a th:href="@{/dang-nhap}" class="btn btn-header">Đăng nhập</a>
            </th:block>
        </nav>
    </div>
    <script th:inline="javascript">
    (function() {
        /** Cập nhật badge số lượng trên icon giỏ (dùng sau AJAX thêm/sửa/xóa, không cần reload). */
        window.updateNavCartBadge = function(count) {
            var n = parseInt(count, 10);
            if (isNaN(n)) n = 0;
            var link = document.querySelector('a.nav-cart');
            if (!link) return;
            var el = link.querySelector('.nav-cart__count');
            if (!el) {
                el = document.createElement('span');
                el.className = 'nav-cart__count';
                link.appendChild(el);
            }
            el.textContent = n;
            if (n > 0) el.classList.remove('nav-cart__count--empty');
            else el.classList.add('nav-cart__count--empty');
        };

        document.addEventListener('DOMContentLoaded', function() {
            var wrap = document.getElementById('nav-dropdown-danhmuc-wrap');
            var btn = document.getElementById('nav-dropdown-danhmuc-btn');
            var menu = document.getElementById('nav-dropdown-danhmuc');
            if (wrap && btn && menu) {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    var isOpen = wrap.classList.contains('nav-dropdown--open');
                    wrap.classList.toggle('nav-dropdown--open', !isOpen);
                    btn.setAttribute('aria-expanded', !isOpen);
                });
                document.addEventListener('click', function(e) {
                    if (!wrap.contains(e.target)) {
                        wrap.classList.remove('nav-dropdown--open');
                        btn.setAttribute('aria-expanded', 'false');
                    }
                });
            }
        });
    })();
    </script>
</header>

</body>
</html>
