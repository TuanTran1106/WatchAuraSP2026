<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Đăng nhập nhân viên - WatchAura</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/auth-login-card.css">
</head>
<body class="wa-login-page">
    <div class="admin-login-wrapper">
        <div class="admin-login-card">
            <div class="admin-login__brand">
                <div class="admin-login__logo">WA</div>
                <div class="admin-login__brand-text">
                    <span class="admin-login__brand-name">WatchAura</span>
                    <span class="admin-login__brand-role">Tài khoản nhân viên</span>
                </div>
            </div>

            <h1 class="admin-login__title">Đăng nhập nhân viên</h1>
            <p class="admin-login__subtitle">Vui lòng nhập email (Gmail) và mật khẩu để tiếp tục</p>

            <div th:if="${errorMessage}" class="admin-login__alert admin-login__alert--error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${errorMessage}">Lỗi đăng nhập</span>
            </div>

            <div th:if="${successMessage}" class="admin-login__alert admin-login__alert--success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${successMessage}">Đăng ký thành công.</span>
            </div>

            <form class="admin-login__form" th:action="@{/nhan-vien/login}" method="post">
                <div class="admin-login__field">
                    <label class="admin-login__label" for="email">
                        <i class="fas fa-envelope"></i>
                        Email (Gmail) <span class="required">*</span>
                    </label>
                    <div class="admin-login__input-wrap">
                        <input type="email" class="admin-login__input" id="email" name="email"
                               required placeholder="example@gmail.com"
                               autocomplete="email"
                               th:value="${param.email != null ? param.email[0] : ''}">
                    </div>
                </div>

                <div class="admin-login__field">
                    <label class="admin-login__label" for="matKhau">
                        <i class="fas fa-lock"></i>
                        Mật khẩu <span class="required">*</span>
                    </label>
                    <div class="admin-login__input-wrap admin-login__password-wrap">
                        <input type="password" class="admin-login__input" id="matKhau"
                               name="matKhau" required placeholder="Nhập mật khẩu"
                               autocomplete="current-password">
                        <button type="button" class="admin-login__toggle-pass"
                                onclick="togglePassword()" aria-label="Hiện hoặc ẩn mật khẩu">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="admin-login__submit">
                    <i class="fas fa-sign-in-alt"></i>
                    Đăng nhập
                </button>
            </form>

            <div class="admin-login__divider">hoặc</div>

            <a th:href="@{/admin/dang-nhap}" class="admin-login__back-link">
                <i class="fas fa-user-shield"></i>
                Đăng nhập tài khoản quản trị
            </a>

            <div class="admin-login__footer">
                <div class="admin-login__footer-row">
                    <a th:href="@{/home}">
                        <i class="fas fa-home"></i> Quay về trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            var passwordInput = document.getElementById('matKhau');
            var eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
