<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content" class="user-page cart-page success-page">
    <div class="container cart-container success-container">
        <div class="success-card">
            <div class="success-card__icon">✓</div>
            <h1 class="success-card__title">Đặt hàng thành công</h1>
            <p class="success-card__text">Cảm ơn bạn đã đặt hàng. Chúng tôi sẽ xử lý đơn hàng và liên hệ với bạn sớm nhất.</p>
            <p class="success-card__code">Mã đơn hàng: <strong th:text="${maDonHang}">#MA_DON</strong></p>
            <p class="success-card__note">Bạn có thể dùng mã đơn hàng để tra cứu đơn tại cửa hàng hoặc khi liên hệ hỗ trợ.</p>
            <div class="success-card__actions">
                <a th:href="@{/}" class="btn btn--primary btn--lg">Về trang chủ</a>
                <a th:href="@{/san-pham}" class="btn btn--outline btn--lg">Tiếp tục mua sắm</a>
            </div>
        </div>
    </div>
    <style th:inline="text">
        .success-page .success-container { max-width: 520px; margin: 2rem auto 4rem; }
        .success-page .success-card { background: #fff; border-radius: 16px; border: 1px solid #eee; box-shadow: 0 4px 20px rgba(0,0,0,0.06); padding: 2.5rem; text-align: center; }
        .success-page .success-card__icon { width: 64px; height: 64px; background: #28a745; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; margin: 0 auto 1.25rem; }
        .success-page .success-card__title { font-size: 1.5rem; font-weight: 700; color: #1a1a1a; margin: 0 0 0.5rem 0; }
        .success-page .success-card__text { color: #555; margin: 0 0 1rem 0; line-height: 1.5; }
        .success-page .success-card__code { font-size: 1.1rem; margin: 1rem 0 0.5rem; }
        .success-page .success-card__code strong { color: #c9a227; }
        .success-page .success-card__note { font-size: 0.9rem; color: #666; margin: 0 0 1.5rem 0; }
        .success-page .success-card__actions { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
    </style>
</div>
</body>
</html>
