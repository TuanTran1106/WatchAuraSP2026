<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <div class="order-page">
        <div class="order-container">
            <header class="order-header-block cart-header">
                <h1 class="order-page__title cart-page__title">Đơn hàng của tôi</h1>
            </header>

            <!-- Tìm kiếm đơn hàng: Trạng thái, Ngày, Thanh toán -->
            <form method="get" th:action="@{/don-hang}" class="order-filter">
                <input type="hidden" name="page" value="0">
                <div class="order-filter__group">
                    <label class="order-filter__label">Trạng thái</label>
                    <select name="trangThai" class="order-filter__select" aria-label="Trạng thái đơn hàng">
                        <option value="">Tất cả trạng thái</option>
                        <option value="CHO_XAC_NHAN" th:selected="${trangThai == 'CHO_XAC_NHAN'}">Chờ xác nhận</option>
                        <option value="DANG_XU_LY" th:selected="${trangThai == 'DANG_XU_LY'}">Đang xử lý</option>
                        <option value="DANG_GIAO" th:selected="${trangThai == 'DANG_GIAO'}">Đang giao</option>
                        <option value="DA_GIAO" th:selected="${trangThai == 'DA_GIAO'}">Đã giao</option>
                        <option value="DA_HUY" th:selected="${trangThai == 'DA_HUY'}">Đã hủy</option>
                    </select>
                </div>
                <div class="order-filter__group">
                    <label class="order-filter__label">Thanh toán</label>
                    <select name="thanhToan" class="order-filter__select" aria-label="Phương thức thanh toán">
                        <option value="">Tất cả</option>
                        <option value="COD" th:selected="${thanhToan == 'COD'}">COD</option>
                        <option value="VNPAY" th:selected="${thanhToan == 'VNPAY'}">VNPay</option>
                    </select>
                </div>
                <div class="order-filter__group">
                    <label class="order-filter__label">Ngày đặt</label>
                    <input type="date" name="ngay" th:value="${ngay}" class="order-filter__input" aria-label="Lọc theo ngày đặt">
                </div>
                <div class="order-filter__actions">
                    <button type="submit" class="order-filter__btn btn btn-header">Tìm kiếm</button>
                    <a th:if="${trangThai != null or thanhToan != null or ngay != null}" th:href="@{/don-hang}" class="order-filter__reset btn">Clear</a>
                </div>
            </form>

            <!-- Chưa có đơn -->
            <div th:if="${#lists.isEmpty(pageHoaDon.content)}" class="order-empty cart-empty">
                <div class="order-empty__icon cart-empty__icon"><i class="fas fa-box-open"></i></div>
                <h2 class="order-empty__title cart-empty__title">Chưa có đơn hàng</h2>
                <p class="order-empty__text cart-empty__text">Bạn chưa có đơn hàng nào. Hãy mua sắm và quay lại xem đơn tại đây.</p>
                <div class="order-empty__actions cart-empty__actions">
                    <a th:href="@{/san-pham}" class="btn btn-header">Xem sản phẩm</a>
                </div>
            </div>

            <!-- Danh sách đơn -->
            <div th:if="${!#lists.isEmpty(pageHoaDon.content)}" class="order-list">
                <div th:each="don : ${pageHoaDon.content}" class="order-card">
                    <div class="order-card__top">
                        <div class="order-card__meta">
                            <span class="order-card__code">Mã đơn: <strong th:text="${don.maDonHang}"></strong></span>
                            <span class="order-card__date" th:text="${#temporals.format(don.ngayDat,'dd/MM/yyyy HH:mm')}"></span>
                            <div th:if="${don.items != null and !don.items.isEmpty()}" class="order-card__products">
                                <span class="order-card__products-label">Sản phẩm:</span>
                                <span class="order-card__products-list">
                                    <th:block th:each="item, iterStat : ${don.items}">
                                        <span th:text="${item.tenSanPham}"></span><th:block th:if="${!iterStat.last}">, </th:block>
                                    </th:block>
                                </span>
                            </div>
                        </div>
                        <span class="order-card__status order-status"
                              th:classappend="
                                ${don.trangThaiDonHang == 'CHO_XAC_NHAN'} ? 'status-waiting' :
                                (${don.trangThaiDonHang == 'DANG_XU_LY'} ? 'status-processing' :
                                (${don.trangThaiDonHang == 'DANG_GIAO'} ? 'status-shipping' :
                                (${don.trangThaiDonHang == 'DA_GIAO'} ? 'status-done' : 'status-cancel')))"
                              th:text="
                                ${don.trangThaiDonHang == 'CHO_XAC_NHAN'} ? 'Chờ xác nhận' :
                                (${don.trangThaiDonHang == 'DANG_XU_LY'} ? 'Đang xử lý' :
                                (${don.trangThaiDonHang == 'DANG_GIAO'} ? 'Đang giao' :
                                (${don.trangThaiDonHang == 'DA_GIAO'} ? 'Đã giao' : 'Đã hủy')))">
                        </span>
                    </div>
                    <div class="order-card__body">
                        <div class="order-card__total">
                            <span class="order-card__total-label">Tổng thanh toán:</span>
                            <span class="order-card__total-value" th:text="|${#numbers.formatDecimal(don.tongTienThanhToan,0,'COMMA',0,'POINT')} đ|"></span>
                        </div>
                        <div class="order-card__actions order-actions">
                            <a th:href="@{'/don-hang/chi-tiet/' + ${don.id}}" class="btn-order btn-order--primary">Xem chi tiết</a>
                            <a th:if="${don.trangThaiDonHang == 'DA_GIAO'}" th:href="@{'/danh-gia/' + ${don.id}}" class="btn-order btn-order--review">Đánh giá</a>
                            <a th:if="${don.trangThaiDonHang == 'DA_GIAO' || don.trangThaiDonHang == 'DA_HUY'}" th:href="@{'/mua-lai/' + ${don.id}}" class="btn-order btn-order--rebuy">Mua lại</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Phân trang giống trang sản phẩm -->
            <nav class="pagination-wrap" th:if="${pageHoaDon != null and pageHoaDon.totalPages > 1}" aria-label="Phân trang">
                <ul class="pagination-list">
                    <li>
                        <a th:if="${pageHoaDon.number > 0}"
                           class="pagination-link pagination-link--first"
                           th:href="@{/don-hang(page=0, trangThai=${trangThai}, thanhToan=${thanhToan}, ngay=${ngay})}">&laquo;&laquo;</a>
                        <span th:unless="${pageHoaDon.number > 0}" class="pagination-link pagination-link--disabled">&laquo;&laquo;</span>
                    </li>
                    <li>
                        <a th:if="${pageHoaDon.hasPrevious()}"
                           class="pagination-link pagination-link--prev"
                           th:href="@{/don-hang(page=${pageHoaDon.number - 1}, trangThai=${trangThai}, thanhToan=${thanhToan}, ngay=${ngay})}">&lsaquo;</a>
                        <span th:unless="${pageHoaDon.hasPrevious()}" class="pagination-link pagination-link--disabled">&lsaquo;</span>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, pageHoaDon.totalPages - 1)}"
                        th:if="${i >= pageHoaDon.number - 2 and i <= pageHoaDon.number + 2}">
                        <a th:if="${i != pageHoaDon.number}"
                           class="pagination-link"
                           th:href="@{/don-hang(page=${i}, trangThai=${trangThai}, thanhToan=${thanhToan}, ngay=${ngay})}"
                           th:text="${i + 1}">1</a>
                        <span th:if="${i == pageHoaDon.number}"
                              class="pagination-link pagination-link--current"
                              th:text="${i + 1}">1</span>
                    </li>
                    <li>
                        <a th:if="${pageHoaDon.hasNext()}"
                           class="pagination-link pagination-link--next"
                           th:href="@{/don-hang(page=${pageHoaDon.number + 1}, trangThai=${trangThai}, thanhToan=${thanhToan}, ngay=${ngay})}">&rsaquo;</a>
                        <span th:unless="${pageHoaDon.hasNext()}" class="pagination-link pagination-link--disabled">&rsaquo;</span>
                    </li>
                    <li>
                        <a th:if="${pageHoaDon.number < pageHoaDon.totalPages - 1}"
                           class="pagination-link pagination-link--last"
                           th:href="@{/don-hang(page=${pageHoaDon.totalPages - 1}, trangThai=${trangThai}, thanhToan=${thanhToan}, ngay=${ngay})}">&raquo;&raquo;</a>
                        <span th:unless="${pageHoaDon.number < pageHoaDon.totalPages - 1}" class="pagination-link pagination-link--disabled">&raquo;&raquo;</span>
                    </li>
                </ul>
            </nav>

        </div>
    </div>

</div>
</body>
</html>
