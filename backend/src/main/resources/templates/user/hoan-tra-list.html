<div class="return-list-page" xmlns:th="http://www.thymeleaf.org" th:fragment="content">
    <div class="return-list-container">

        <nav aria-label="breadcrumb" class="return-list-breadcrumb">
            <ol class="breadcrumb">

            </ol>
        </nav>

        <div class="return-list-header">
            <h1 class="return-list-title">Yêu cầu hoàn trả</h1>
            <p class="return-list-subtitle">Quản lý các yêu cầu hoàn trả sản phẩm của bạn</p>
        </div>

        <div id="returnListContent">
            <!-- Loading state -->
            <div class="return-loading" id="returnListLoading">
                <div class="return-loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Đang tải dữ liệu...</p>
                </div>
            </div>
            

            <div class="return-list-cards" id="returnListCards" style="display: none;"></div>
            

            <div class="return-empty" id="returnEmptyState" style="display: none;">
                <div class="return-empty__icon">
                    <i class="fas fa-rotate-left"></i>
                </div>
                <h3 class="return-empty__title">Chưa có yêu cầu hoàn trả</h3>
                <p class="return-empty__desc">Bạn chưa có yêu cầu hoàn trả nào. Nếu cần hoàn trả sản phẩm từ đơn hàng đã nhận, vui lòng vào chi tiết đơn hàng để thực hiện.</p>
                <a href="/don-hang" class="btn-return-empty">
                    <i class="fas fa-shopping-bag"></i> Xem đơn hàng
                </a>
            </div>
        </div>


        <nav class="return-pagination" id="returnPagination" style="display: none;">
            <ul class="pagination-list" id="paginationListUser">
            </ul>
        </nav>

    </div>

    <script>
    var userCurrentPage = 0;
    var userPageSize = 10;
    
    document.addEventListener('DOMContentLoaded', function() {
        loadUserHoanTra();
    });
    
    async function loadUserHoanTra(page = 0) {
        userCurrentPage = page;
        showUserLoading();
        
        try {
            const response = await fetch('/khach-hang/hoan-tra/api/paged?page=' + page + '&size=' + userPageSize);
            const data = await response.json();
            
            if (data.success) {
                renderUserReturnList(data);
            } else if (data.message === 'Vui lòng đăng nhập') {
                window.location.href = '/dang-nhap';
            } else {
                showUserEmpty();
            }
        } catch (error) {
            console.error('Lỗi khi tải dữ liệu:', error);
            showUserEmpty();
        }
    }
    
    function renderUserReturnList(data) {
        const loading = document.getElementById('returnListLoading');
        const cards = document.getElementById('returnListCards');
        const empty = document.getElementById('returnEmptyState');
        const pagination = document.getElementById('returnPagination');
        
        loading.style.display = 'none';
        
        if (!data.items || data.items.length === 0) {
            cards.style.display = 'none';
            empty.style.display = 'block';
            pagination.style.display = 'none';
            return;
        }
        
        empty.style.display = 'none';
        cards.style.display = 'flex';
        pagination.style.display = 'flex';
        
        cards.innerHTML = data.items.map(function(item) {
            const statusClass = getUserStatusClass(item.trangThai);
            const formattedDate = formatUserDate(item.ngayYeuCau);
            const formattedAmount = formatUserCurrency(item.soTienHoanTra);
            
            return '<a href="/khach-hang/hoan-tra/' + item.id + '" class="return-card-link">' +
                '<div class="return-card">' +
                    '<div class="return-card__header">' +
                        '<div class="return-card__code">' +
                            '<i class="fas fa-rotate-left"></i>' +
                            '<span>' + item.maHoanTra + '</span>' +
                        '</div>' +
                        '<span class="return-status-badge return-status-badge--sm ' + statusClass + '">' +
                            item.trangThaiHienThi +
                        '</span>' +
                    '</div>' +
                    '<div class="return-card__body">' +
                        '<div class="return-card__info">' +
                            '<div class="return-card__info-item">' +
                                '<span class="return-card__label">Mã đơn hàng</span>' +
                                '<span class="return-card__value">' + (item.maDonHang || '') + '</span>' +
                            '</div>' +
                            '<div class="return-card__info-item">' +
                                '<span class="return-card__label">Ngày yêu cầu</span>' +
                                '<span class="return-card__value">' + formattedDate + '</span>' +
                            '</div>' +
                            '<div class="return-card__info-item" style="grid-column: span 2;">' +
                                '<span class="return-card__label">Lý do</span>' +
                                '<span class="return-card__value return-card__value--reason">' + (item.lyDo || '') + '</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="return-card__footer">' +
                        '<div class="return-card__amount">' +
                            '<span class="return-card__amount-label">Số tiền hoàn</span>' +
                            '<span class="return-card__amount-value">' + formattedAmount + '</span>' +
                        '</div>' +
                        '<div class="return-card__arrow">' +
                            '<i class="fas fa-chevron-right"></i>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</a>';
        }).join('');
        
        renderUserPagination(data);
    }
    
    function renderUserPagination(data) {
        const paginationList = document.getElementById('paginationListUser');
        const totalPages = data.totalPages || 1;
        const current = data.currentPage || 0;
        
        if (totalPages <= 1) {
            paginationList.innerHTML = '';
            return;
        }
        
        let html = '';
        
        // Prev button
        if (current === 0) {
            html += '<li class="page-item disabled"><span class="page-link"><i class="fas fa-chevron-left"></i></span></li>';
        } else {
            html += '<li class="page-item"><a class="page-link" href="javascript:loadUserHoanTra(' + (current - 1) + ')"><i class="fas fa-chevron-left"></i></a></li>';
        }
        
        // Page numbers
        const start = Math.max(0, current - 2);
        const end = Math.min(totalPages - 1, current + 2);
        
        if (start > 0) {
            html += '<li class="page-item"><a class="page-link" href="javascript:loadUserHoanTra(0)">1</a></li>';
            if (start > 1) html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
        }
        
        for (let i = start; i <= end; i++) {
            const active = i === current ? ' active' : '';
            html += '<li class="page-item' + active + '"><a class="page-link" href="javascript:loadUserHoanTra(' + i + ')">' + (i + 1) + '</a></li>';
        }
        
        if (end < totalPages - 1) {
            if (end < totalPages - 2) html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
            html += '<li class="page-item"><a class="page-link" href="javascript:loadUserHoanTra(' + (totalPages - 1) + ')">' + totalPages + '</a></li>';
        }
        
        // Next button
        if (current === totalPages - 1) {
            html += '<li class="page-item disabled"><span class="page-link"><i class="fas fa-chevron-right"></i></span></li>';
        } else {
            html += '<li class="page-item"><a class="page-link" href="javascript:loadUserHoanTra(' + (current + 1) + ')"><i class="fas fa-chevron-right"></i></a></li>';
        }
        
        paginationList.innerHTML = html;
    }
    
    function showUserLoading() {
        document.getElementById('returnListLoading').style.display = 'flex';
        document.getElementById('returnListCards').style.display = 'none';
        document.getElementById('returnEmptyState').style.display = 'none';
        document.getElementById('returnPagination').style.display = 'none';
    }
    
    function showUserEmpty() {
        document.getElementById('returnListLoading').style.display = 'none';
        document.getElementById('returnListCards').style.display = 'none';
        document.getElementById('returnEmptyState').style.display = 'block';
        document.getElementById('returnPagination').style.display = 'none';
    }
    
    function getUserStatusClass(status) {
        switch(status) {
            case 'CHO_XU_LY': return 'return-status--pending';
            case 'DA_XU_LY': return 'return-status--approved';
            case 'TU_CHOI': return 'return-status--rejected';
            default: return '';
        }
    }
    
    function formatUserDate(dateStr) {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        const day = ('0' + date.getDate()).slice(-2);
        const month = ('0' + (date.getMonth() + 1)).slice(-2);
        const year = date.getFullYear();
        const hours = ('0' + date.getHours()).slice(-2);
        const minutes = ('0' + date.getMinutes()).slice(-2);
        return day + '/' + month + '/' + year + ' ' + hours + ':' + minutes;
    }
    
    function formatUserCurrency(amount) {
        if (amount == null) return '0 ₫';
        return Number(amount).toLocaleString('vi-VN') + ' ₫';
    }
    </script>

    <style>
        .return-list-page {
            padding-bottom: 3rem;
            background: #f8f9fa;
            min-height: 100vh;
        }

        .return-list-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        .return-loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem 2rem;
        }

        .return-loading-spinner {
            text-align: center;
            color: #666;
        }

        .return-loading-spinner i {
            font-size: 2rem;
            color: #c9a227;
            margin-bottom: 1rem;
        }

        .return-loading-spinner p {
            margin: 0;
            font-size: 0.95rem;
        }

        /* Pagination Styles */
        .return-pagination {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
        }

        .pagination-list {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 0;
            gap: 0.5rem;
        }

        .pagination-list .page-item {
            display: flex;
        }

        .pagination-list .page-link {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 0.75rem;
            border-radius: 8px;
            background: #fff;
            color: #333;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }

        .pagination-list .page-link:hover:not(.disabled) {
            background: #fef9e7;
            border-color: #c9a227;
            color: #c9a227;
        }

        .pagination-list .page-item.active .page-link {
            background: #c9a227;
            border-color: #c9a227;
            color: #fff;
        }

        .pagination-list .page-item.disabled .page-link {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Breadcrumb */
        .return-list-breadcrumb {
            margin-bottom: 1.5rem;
        }

        .return-list-breadcrumb .breadcrumb {
            background: transparent;
            padding: 0;
            margin: 0;
        }

        .return-list-breadcrumb .breadcrumb-item a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .return-list-breadcrumb .breadcrumb-item a:hover {
            color: #c9a227;
        }

        .return-list-breadcrumb .breadcrumb-item.active {
            color: #1a1a1a;
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Header */
        .return-list-header {
            margin-bottom: 2rem;
        }

        .return-list-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0 0 0.5rem 0;
        }

        .return-list-subtitle {
            color: #666;
            font-size: 0.95rem;
            margin: 0;
        }

        /* Card List */
        .return-list-cards {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .return-card-link {
            text-decoration: none;
            display: block;
        }

        .return-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            border: 1px solid #eee;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .return-card-link:hover .return-card {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .return-card__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #f0f0f0;
            background: #fafafa;
        }

        .return-card__code {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            color: #1a1a1a;
            font-size: 1rem;
        }

        .return-card__code i {
            color: #c9a227;
        }

        .return-card__body {
            padding: 1rem 1.25rem;
        }

        .return-card__info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem 1.5rem;
        }

        .return-card__info-item {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .return-card__label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .return-card__value {
            font-size: 0.9rem;
            font-weight: 500;
            color: #1a1a1a;
        }

        .return-card__value--reason {
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        .return-card__footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.875rem 1.25rem;
            background: #fafafa;
            border-top: 1px solid #f0f0f0;
        }

        .return-card__amount-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            display: block;
            margin-bottom: 0.15rem;
        }

        .return-card__amount-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #dc3545;
        }

        .return-card__arrow {
            color: #ccc;
            font-size: 0.9rem;
        }

        .return-card-link:hover .return-card__arrow {
            color: #c9a227;
        }

        /* Status Badge */
        .return-status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.8rem;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .return-status-badge--sm {
            font-size: 0.72rem;
            padding: 0.25rem 0.6rem;
        }

        .return-status--pending {
            background: #fef3c7;
            color: #92400e;
        }

        .return-status--approved {
            background: #d1fae5;
            color: #047857;
        }

        .return-status--rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        .return-status--refunded {
            background: #ccfbf1;
            color: #0d9488;
        }

        /* Empty State */
        .return-empty {
            text-align: center;
            padding: 4rem 2rem;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            border: 1px solid #eee;
        }

        .return-empty__icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #fef9e7;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .return-empty__icon i {
            font-size: 2rem;
            color: #c9a227;
        }

        .return-empty__title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0 0 0.75rem 0;
        }

        .return-empty__desc {
            color: #666;
            font-size: 0.95rem;
            margin: 0 0 1.5rem 0;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .btn-return-empty {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.5rem;
            background: linear-gradient(135deg, #c9a227 0%, #a07d1c 100%);
            color: #fff;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-return-empty:hover {
            background: linear-gradient(135deg, #b8921f 0%, #8a6d17 100%);
            color: #fff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .return-card__info {
                grid-template-columns: 1fr;
            }

            .return-card__value--reason {
                max-width: 100%;
            }
        }
    </style>
</div>
