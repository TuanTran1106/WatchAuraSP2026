spring.application.name=watchaura

# SQL Server datasource (use env vars to avoid hardcoding secrets)
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=WATCHAURA_STORE2;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:123}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true


# Groq Configuration
openai.api.key=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
# URL cho Groq API
openai.api.url=https://api.groq.com/openai/v1/chat/completions

# Logging debug
logging.level.com.example.watchbot=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.org.example.datn=DEBUG
logging.level.com.example.watchaura.service.impl=DEBUG

# Session
# Giữ phiên đăng nhập trong 5 giờ
server.servlet.session.timeout=5h

# Thymeleaf: tắt cache khi dev để tránh template cũ; nếu gặp ERR_INCOMPLETE_CHUNKED_ENCODING thì xem log server có exception khi render /nguoidung
spring.thymeleaf.cache=false

