spring.application.name=watchaura

# SQL Server datasource (use env vars to avoid hardcoding secrets)
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=WATCHAURA_STORE2;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:110625}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Groq Configuration
openai.api.key=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
# URL cho Groq API
openai.api.url=https://api.groq.com/openai/v1/chat/completions

# Logging debug
logging.level.com.example.watchbot=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.org.example.datn=DEBUG


# Session
# Giữ phiên đăng nhập trong 5 giờ
server.servlet.session.timeout=5h

# Thymeleaf: tắt cache khi dev để tránh template cũ; nếu gặp ERR_INCOMPLETE_CHUNKED_ENCODING thì xem log server có exception khi render /nguoidung
spring.thymeleaf.cache=false

# VN Pay (Sandbox: https://sandbox.vnpayment.vn - đăng ký để lấy TMN Code và Hash Secret)
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.url=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}

# File Upload Configuration
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

